            React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap'}},
              [{id:'all',l:'All Questions',c:QUESTIONS.length},
               {id:'original',l:'Original',c:QUESTIONS.filter(q=>!q.practiceSet).length},
               {id:'extra',l:'Practice Set',c:QUESTIONS.filter(q=>q.practiceSet==='extra').length}
              ].map(p => React.createElement('button', {key:p.id, className:'filter-btn'+(testPool===p.id?' active':''), onClick:()=>setTestPool(p.id)}, p.l+' ('+p.c+')'))
            )
          ),
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Category'),
            React.createElement('div', {className:'filter-row'},
              CATEGORIES.filter(c=>c!=='Conversions').map(c => React.createElement('button', {key:c, className:'filter-btn'+(filter===c?' active':''), onClick:()=>setFilter(c)}, c))
            )
          ),
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Number of Questions'),
            React.createElement('div', {style:{display:'flex', gap:8}},
              [5,10,15,20].map(n => React.createElement('button', {key:n, className:'filter-btn'+(numQ===n?' active':''), onClick:()=>setNumQ(n)}, n))
            )
          ),
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Time Limit (minutes)'),
            React.createElement('div', {style:{display:'flex', gap:8}},
              [15,30,45,60].map(n => React.createElement('button', {key:n, className:'filter-btn'+(timeLimit===n?' active':''), onClick:()=>setTimeLimit(n)}, n + ' min'))
            )
          ),
          React.createElement('button', {className:'btn btn-primary', style:{marginTop:8}, onClick:startTest}, 'Start Test')
        )
      )
    );
  }

  // Results screen
  if (submitted) {
    const pct = Math.round(score / questions.length * 100);
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Test Results'),
      React.createElement('div', {className:'stats-row'},
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value', style:{color: pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)'}}, pct, '%'),
          React.createElement('div', {className:'stat-label'}, 'Score')
        ),
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value'}, score, '/', questions.length),
          React.createElement('div', {className:'stat-label'}, 'Correct')
        ),
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value'}, formatTime(timeLimit * 60 - timeLeft)),
          React.createElement('div', {className:'stat-label'}, 'Time Used')
        )
      ),
      questions.map((q, i) => {
        const ans = answers[q.id];
        const correct = checkAnswer(q, ans);
        return React.createElement('div', {key:q.id, className:'card', style:{borderLeft: '4px solid ' + (correct ? 'var(--green)' : 'var(--red)')}},
          React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}},
            React.createElement('div', {style:{display:'flex', gap:8, alignItems:'center'}},
              React.createElement('span', {style:{fontWeight:700}}, 'Q', i + 1),
              q.exam && React.createElement('span', {className:'exam-badge exam-badge-on'}, '\uD83C\uDFAF ON TEST'),

            ),
            React.createElement('span', {className: correct ? 'tag tag-green' : 'tag tag-red'}, correct ? 'Correct' : 'Incorrect')
          ),
          React.createElement('p', {style:{fontSize:'0.95rem', marginBottom:12}}, q.text),
          React.createElement('div', {style:{fontSize:'0.9rem'}},
            React.createElement('span', {style:{color:'var(--text3)'}}, 'Your answer: '),
            React.createElement('span', {style:{color: correct ? 'var(--green)' : 'var(--red)', fontWeight:600}},
              ans !== undefined ? (q.type === 'mc' ? q.options[ans] : ans + ' ' + (q.unit || '')) : 'No answer'
            ),
            !correct && React.createElement(React.Fragment, null,
              React.createElement('br', null),
              React.createElement('span', {style:{color:'var(--text3)'}}, 'Correct: '),
              React.createElement('span', {style:{color:'var(--green)', fontWeight:600}},
                q.type === 'mc' ? q.options[q.correct] : q.correct + ' ' + (q.unit || '')
              )
            )
          ),
          React.createElement('button', {className:'btn btn-outline btn-sm', style:{marginTop:10}, onClick:()=>setShowExplanation(p=>({...p,[q.id]:!p[q.id]}))}, showExplanation[q.id] ? 'Hide Steps' : 'Show Solution'),
          showExplanation[q.id] && React.createElement('div', {className:'explanation'},

            ))

  // Active test
  const q = questions[current];
  return React.createElement('div', null,

// ============================
// PERFORMANCE DASHBOARD
// ============================
function Dashboard({ progress }) {
  const stats = progress.questionStats || {};
  const testHist = progress.testHistory || [];
  const missed = progress.missedQuestions || [];

  // Category breakdown
  const catStats = {};
  CATEGORIES.filter(c => c !== 'All' && c !== 'Conversions').forEach(cat => {
    catStats[cat] = {attempts:0, correct:0};
  });
  QUESTIONS.forEach(q => {
    const s = stats[q.id];
    if (s && catStats[q.category]) {
      catStats[q.category].attempts += s.attempts;
      catStats[q.category].correct += s.correct;
    }
  });

  const totalAttempts = Object.values(stats).reduce((a, s) => a + s.attempts, 0);
  const totalCorrect = Object.values(stats).reduce((a, s) => a + s.correct, 0);
  const overallPct = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;
  const uniqueAttempted = Object.keys(stats).length;
  const uniqueCompleted = Object.values(stats).filter(s => s.lastCorrect).length;

  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:16}}, 'Performance Dashboard'),
    // Overview stats
    React.createElement('div', {className:'stats-row'},
      React.createElement('div', {className:'stat-box'},
        React.createElement('div', {className:'stat-value', style:{color: overallPct >= 80 ? 'var(--green)' : overallPct >= 60 ? 'var(--orange)' : totalAttempts === 0 ? 'var(--text3)' : 'var(--red)'}}, totalAttempts > 0 ? overallPct + '%' : '--'),
        React.createElement('div', {className:'stat-label'}, 'Overall Accuracy')
      ),
      React.createElement('div', {className:'stat-box'},
        React.createElement('div', {className:'stat-value'}, uniqueAttempted),

// ============================
// MISSED QUESTIONS BANK
// ============================
function MissedBank({ progress, setProgress }) {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [completed, setCompleted] = useState(false);
  const [showHints, setShowHints] = useState({});

  const missed = progress.missedQuestions || [];
  const missedQs = QUESTIONS.filter(q => missed.includes(q.id));

  const reset = (idx) => {
    setCurrentIdx(idx !== undefined ? idx : currentIdx);
    setStepInputs({}); setStepStatus({}); setActiveStep(0); setCompleted(false); setShowHints({});
  };

  if (missedQs.length === 0) {
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Missed Questions Bank'),
      React.createElement('div', {className:'card', style:{textAlign:'center', padding:'40px'}},
        React.createElement('div', {style:{fontSize:'2rem', marginBottom:12}}, '\u{1F389}'),
        React.createElement('h3', {style:{color:'var(--green)', marginBottom:8}}, 'All Clear!'),
        React.createElement('p', {style:{color:'var(--text2)'}}, 'You don\'t have any missed questions. Keep practicing — any question you get wrong will show up here for review.')
      )
    );
  }

  const q = missedQs[currentIdx] || missedQs[0];

  const checkStep = (i) => {
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isCorrect = !isNaN(numVal) && !isNaN(numExp) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5);
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        // Record correct attempt — removes from missed bank
        setProgress(p => recordAttempt(p, q.id, true));
      }
    }
  };

  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:4}}, 'Missed Questions Bank'),
    React.createElement('p', {style:{color:'var(--text2)', marginBottom:16, fontSize:'0.9rem'}}, missed.length, ' question', missed.length !== 1 ? 's' : '', ' to review. Get them right to remove them from the bank.'),
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}},
      React.createElement('span', {className:'tag tag-red'}, currentIdx + 1, ' of ', missedQs.length),
      React.createElement('div', {style:{display:'flex', gap:8}},
        React.createElement('span', {className:'tag tag-orange'}, q.difficulty),
        React.createElement('span', {className:'tag tag-blue'}, q.category)
      )
    ),
    React.createElement('div', {className:'question-box'},
      React.createElement('div', {className:'question-text'}, q.text)
    ),
    React.createElement('div', {className:'card'},
      React.createElement('h3', null, 'Work Through It Again'),
      q.steps.map((s, i) => {
        const status = stepStatus[i];
        const isActive = i === activeStep && !completed;
        const isLocked = i > activeStep && !completed;
        return React.createElement('div', {key:i, className:'step' + (status === 'correct' ? ' completed' : status === 'wrong' ? ' wrong' : isActive ? ' active' : ''), style: isLocked ? {opacity:0.4} : {}},
          React.createElement('div', {className:'step-header'},
            React.createElement('div', {className:'step-num'}, status === 'correct' ? '\u2713' : i + 1),
            React.createElement('span', {className:'step-label'}, s.label)
          ),
          !isLocked && React.createElement(React.Fragment, null,
            React.createElement('div', {className:'step-input-row'},
              React.createElement('input', {
                type:'text', placeholder:'Your answer...', value: stepInputs[i] || '',
                onChange: e => setStepInputs(p => ({...p, [i]: e.target.value})),
                onKeyDown: e => { if (e.key === 'Enter') checkStep(i); },
                disabled: status === 'correct'
              }),
              React.createElement('span', {style:{color:'var(--text3)', fontSize:'0.85rem', whiteSpace:'nowrap'}}, s.unit),
              status !== 'correct' && React.createElement('button', {className:'btn btn-primary btn-sm', onClick:()=>checkStep(i)}, 'Check')
            ),
            React.createElement('div', {style:{display:'flex', gap:8, marginTop:6}},
              !showHints[i] && status !== 'correct' && React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setShowHints(p=>({...p,[i]:true}))}, 'Show Hint'),
              status === 'wrong' && React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setStepInputs(p=>({...p,[i]:s.answer}))}, 'Show Answer')
            ),
            showHints[i] && React.createElement('div', {className:'step-hint'}, '\u{1F4A1} ', s.hint),
            status === 'correct' && React.createElement('div', {className:'step-feedback correct'}, '\u2713 Correct!'),
            status === 'wrong' && React.createElement('div', {className:'step-feedback incorrect'}, '\u2717 Not quite. Try again or show hint.')
          )
        );
      }),
      completed && React.createElement('div', {style:{textAlign:'center', padding:'16px 0'}},
        React.createElement('div', {style:{fontSize:'1.5rem', marginBottom:8}}, '\u{1F389}'),
        React.createElement('p', {style:{fontWeight:700, color:'var(--green)', marginBottom:4}}, 'Nailed it! Removed from missed bank.'),
        React.createElement('p', {style:{color:'var(--text3)', fontSize:'0.85rem', marginBottom:12}}, missed.length - 1 > 0 ? (missed.length - 1) + ' remaining' : 'Bank is clear!'),
        currentIdx < missedQs.length - 1 ?
          React.createElement('button', {className:'btn btn-primary', onClick:()=>reset(currentIdx)}, 'Next Missed Question \u2192') :
          missedQs.length > 1 && React.createElement('button', {className:'btn btn-primary', onClick:()=>reset(0)}, 'Back to Start')
      )
    ),
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', marginTop:12}},
      React.createElement('button', {className:'btn btn-outline', disabled:currentIdx===0, onClick:()=>reset(currentIdx-1)}, '\u2190 Previous'),
      React.createElement('button', {className:'btn btn-outline', disabled:currentIdx>=missedQs.length-1, onClick:()=>reset(currentIdx+1)}, 'Skip \u2192')
    ),
    React.createElement(QuestionNav, {
      questions:missedQs, currentIdx:currentIdx, onSelect:(i)=>reset(i),
      getStatus:() => 'wrong'
    })
  );
}

  {suffix:'-parin', drugClass:'Anticoagulant', example:'Heparin'},

  {suffix:'-one (steroids)', drugClass:'Corticosteroid', example:'Prednisone'},
];

// Highlight suffix in drug name
function highlightSuffix(name) {
  const suffixes = ['pril','sartan','olol','statin','pam','lam','parin','azide'];
  for (const suf of suffixes) {
    const idx = name.toLowerCase().lastIndexOf(suf);
    if (idx !== -1) {
      return React.createElement('span', null,
        name.slice(0, idx),
        React.createElement('span', {className:'suffix-hl'}, name.slice(idx)),
      );
    }
  }
  return name;
}

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// PHARM: REVERSE MODE

function PharmReverse() {
  const [deck, setDeck] = useState(() => shuffle(MEDS));
  const [idx, setIdx] = useState(0);
  const [options, setOptions] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState({correct:0, total:0});

  const setupQ = useCallback((index, d) => {
    const med = d[index];
    const wrong = shuffle(d.filter(m => m.name !== med.name)).slice(0, 3);
    setOptions(shuffle([med, ...wrong]));
    setChosen(null);
  }, []);

  useEffect(() => { setupQ(0, deck); }, []);

  const pick = (m) => {
    if (chosen !== null) return;
    setChosen(m.name);
    setScore(s => ({correct: s.correct + (m.name === deck[idx].name ? 1 : 0), total: s.total + 1}));
  };

  const next = () => {
    const ni = idx + 1;
    if (ni >= deck.length) {
      const nd = shuffle(MEDS);
      setDeck(nd);
      setIdx(0);
      setupQ(0, nd);
    } else {
      setIdx(ni);
      setupQ(ni, deck);
    }
  };

  const med = deck[idx];
  if (!med) return null;

  return React.createElement('div', null,
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}},
      React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem'}}, 'Card ', idx+1, ' / ', deck.length),
      React.createElement('div', {style:{fontWeight:700, color: score.total > 0 && score.correct/score.total >= 0.7 ? 'var(--green)' : 'var(--orange)'}},
        score.correct, '/', score.total, ' correct')
    ),
    React.createElement('div', {className:'reverse-card'},
      React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--accent2)', fontWeight:600, marginBottom:8}}, 'What medication is this?'),
      React.createElement('div', {className:'reverse-clue'}, med.indication),
      React.createElement('div', {className:'reverse-hint'},
        'Class: ', med.drugClass, ' \u2022 Routes: ', med.routes.join(', ')
      ),
      React.createElement('div', {style:{color:'var(--text3)', fontSize:'0.85rem', marginBottom:4}},
        'Side Effects: ', med.sideEffects.join(', ')
      ),
      React.createElement('div', {className:'reverse-options'},
        options.map(o => {
          let cls = 'reverse-opt';
          if (chosen) {
            if (o.name === med.name) cls += ' correct';
            else if (o.name === chosen) cls += ' wrong';
          }
          return React.createElement('div', {key:o.name, className:cls, onClick:()=>pick(o)}, o.name);
        })
      ),
      chosen && React.createElement('div', {style:{marginTop:16}},
        chosen === med.name ?
          React.createElement('div', {style:{color:'var(--green)', fontWeight:700, fontSize:'1.1rem'}}, '\u2705 Correct!') :
          React.createElement('div', {style:{color:'var(--red)', fontWeight:700, fontSize:'1.1rem'}}, '\u274C The answer is ', med.name),
        React.createElement('button', {className:'btn btn-primary', style:{marginTop:12}, onClick:next}, 'Next \u2192')
      )
    )
  );
}

// PHARM: SUFFIX MATCHING GAME
// ============================
function PharmSuffixGame() {
  const [pairs] = useState(() => shuffle(SUFFIX_MAP));
  const [classes] = useState(() => shuffle(SUFFIX_MAP.map(s => ({suffix:s.suffix, drugClass:s.drugClass}))));
  const [selectedSuffix, setSelectedSuffix] = useState(null);
  const [matched, setMatched] = useState({});
  const [wrongFlash, setWrongFlash] = useState(null);
  const [score, setScore] = useState(0);
  const [attempts, setAttempts] = useState(0);

  const allMatched = Object.keys(matched).length === SUFFIX_MAP.length;

  const pickSuffix = (suf) => {
    if (matched[suf]) return;
    setSelectedSuffix(suf);
    setWrongFlash(null);
  };

  const pickClass = (cls) => {
    if (!selectedSuffix || Object.values(matched).includes(cls)) return;
    setAttempts(a => a + 1);
    const correct = SUFFIX_MAP.find(s => s.suffix === selectedSuffix);
    if (correct && correct.drugClass === cls) {
      setMatched(p => ({...p, [selectedSuffix]: cls}));
      setScore(s => s + 1);
      setSelectedSuffix(null);
    } else {
      setWrongFlash(cls);
      setTimeout(() => setWrongFlash(null), 600);
    }
  };

  const reset = () => {
    setMatched({});
    setSelectedSuffix(null);
    setScore(0);
    setAttempts(0);
    setWrongFlash(null);
  };

  return React.createElement('div', {className:'suffix-game'},
    React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:16, textAlign:'center'}},
      'Match each suffix to its drug class. Click a suffix, then click the matching class.'
    ),
    React.createElement('div', {style:{textAlign:'center', marginBottom:16, fontWeight:700}},
      score, '/', SUFFIX_MAP.length, ' matched',
      attempts > 0 && React.createElement('span', {style:{color:'var(--text3)', fontWeight:400, marginLeft:12}}, '(', attempts, ' attempts)')
    ),
    allMatched ? React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'2rem', marginBottom:12}}, '\uD83C\uDF89'),
      React.createElement('div', {style:{fontSize:'1.3rem', fontWeight:700, color:'var(--green)', marginBottom:8}}, 'All Matched!'),
      React.createElement('div', {style:{color:'var(--text2)', marginBottom:16}}, 'You did it in ', attempts, ' attempts.'),
      React.createElement('button', {className:'btn btn-primary', onClick:reset}, 'Play Again')
    ) :
    React.createElement('div', {className:'suffix-cols'},
      React.createElement('div', null,
        React.createElement('h3', null, 'Suffixes'),
        pairs.map(p => {
          let cls = 'suffix-item';
          if (matched[p.suffix]) cls += ' matched';
          else if (selectedSuffix === p.suffix) cls += ' selected';
          return React.createElement('div', {key:p.suffix, className:cls, onClick:()=>pickSuffix(p.suffix)},
            p.suffix, matched[p.suffix] ? ' \u2713' : ''
          );
        })
      ),
      React.createElement('div', null,
        React.createElement('h3', null, 'Drug Classes'),
        classes.map(c => {
          let cls = 'suffix-item';
          if (Object.values(matched).includes(c.drugClass)) cls += ' matched';
          else if (wrongFlash === c.drugClass) cls += ' wrong-flash';
          return React.createElement('div', {key:c.drugClass, className:cls, onClick:()=>pickClass(c.drugClass)},
            c.drugClass, Object.values(matched).includes(c.drugClass) ? ' \u2713' : ''
          );
        })
      )
    )
  );
}

    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  };

  useEffect(() => {
    if (phase !== 'running') { clearInterval(timerRef.current); return; }
    timerRef.current = setInterval(() => {
      setTimer(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          // time's up — mark as missed
          setResults(r => [...r, {med:deck[idx], correct:false}]);
          setPhase('reveal');
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, idx]);

  const submit = () => {
    if (!answer.trim()) return;
    clearInterval(timerRef.current);
    const med = deck[idx];
    let target = field === 'name' ? med.name : field === 'class' ? med.drugClass : med.indication;
    const isCorrect = answer.trim().toLowerCase() === target.toLowerCase() ||
      target.toLowerCase().includes(answer.trim().toLowerCase());
    setResults(r => [...r, {med, correct:isCorrect}]);
    setPhase('reveal');
  };

  const nextCard = () => {
    const ni = idx + 1;
    if (ni >= deck.length) { setPhase('done'); return; }
    setIdx(ni);
    setPhase('running');
    setTimer(10);
    setAnswer('');
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  };

  const correctCount = results.filter(r => r.correct).length;
  const reviewPile = results.filter(r => !r.correct);

  if (phase === 'done') {
    return React.createElement('div', {style:{textAlign:'center', padding:20}},
      React.createElement('h2', {style:{marginBottom:12}}, '\uD83C\uDFC1 Round Complete!'),
      React.createElement('div', {style:{fontSize:'2rem', fontWeight:800, color: correctCount/results.length >= 0.7 ? 'var(--green)' : 'var(--orange)', marginBottom:8}},
        correctCount, ' / ', results.length

        Math.round(correctCount/results.length*100), '% accuracy'
      ),
      reviewPile.length > 0 && React.createElement('div', {className:'card', style:{textAlign:'left', marginBottom:16}},
        React.createElement('h3', {style:{color:'var(--red)', marginBottom:10}}, '\uD83D\uDCCB Must Review Pile (', reviewPile.length, ')'),
        reviewPile.map((r, i) => React.createElement('div', {key:i, style:{padding:'8px 0', borderBottom:'1px solid var(--surface2)'}},
          React.createElement('strong', null, r.med.name), ' — ', r.med.drugClass,
          React.createElement('div', {style:{color:'var(--text2)', fontSize:'0.85rem'}}, r.med.indication)
        ))
      ),
      React.createElement('button', {className:'btn btn-primary', onClick:startRound}, 'Go Again')
    );
  }

  if (phase === 'ready') {
    return React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'3rem', marginBottom:12}}, '\u26A1'),
      React.createElement('h2', {style:{marginBottom:8}}, 'Med-Pass Speed Round'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20}},
        '10 seconds per card. Identify the medication as fast as you can. Missed cards go into a Must Review pile.'
      ),
      React.createElement('div', {style:{marginBottom:20}},
        React.createElement('label', {style:{color:'var(--text2)', fontSize:'0.9rem', display:'block', marginBottom:8}}, 'What do you want to guess?'),
        React.createElement('div', {style:{display:'flex', gap:8, justifyContent:'center'}},
          ['name','class','indication'].map(f =>
            React.createElement('button', {key:f, className:'btn '+(field===f?'btn-primary':'btn-outline'), onClick:()=>setField(f)},
              f === 'name' ? 'Drug Name' : f === 'class' ? 'Drug Class' : 'Indication'
            )
          )
        )
      ),
      React.createElement('button', {className:'btn btn-primary', style:{fontSize:'1.1rem', padding:'14px 36px'}, onClick:startRound}, 'Start \u2192')
    );
  }

  const med = deck[idx];
  const pct = timer / 10 * 100;
  const barColor = timer > 5 ? 'var(--green)' : timer > 3 ? 'var(--orange)' : 'var(--red)';

  return React.createElement('div', null,
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{color:'var(--text2)'}}, 'Card ', idx+1, ' / ', deck.length),
      React.createElement('span', {style:{fontWeight:700}}, correctCount, ' correct')
    ),
    React.createElement('div', {className:'speed-card'},
      React.createElement('div', {className:'speed-timer'+(timer<=3?' danger':timer<=5?' warning':'')}, timer, 's'),
      React.createElement('div', {className:'speed-bar'},
        React.createElement('div', {className:'speed-bar-fill', style:{width:pct+'%', background:barColor}})
      ),
      phase === 'running' && React.createElement(React.Fragment, null,
        React.createElement('div', {style:{marginBottom:16}},
          field === 'name' && React.createElement(React.Fragment, null,
            React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--accent2)', fontWeight:600, marginBottom:4}}, 'Name this medication:'),
            React.createElement('div', {style:{fontSize:'1.2rem', fontWeight:700, marginBottom:4}}, med.indication),
            React.createElement('div', {style:{color:'var(--text2)', fontSize:'0.9rem'}}, 'Class: ', med.drugClass, ' \u2022 Routes: ', med.routes.join(', '))
          ),
          field === 'class' && React.createElement(React.Fragment, null,
            React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--accent2)', fontWeight:600, marginBottom:4}}, 'What class?'),
            React.createElement('div', {style:{fontSize:'1.4rem', fontWeight:700}}, med.name)
          ),
          field === 'indication' && React.createElement(React.Fragment, null,
            React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--accent2)', fontWeight:600, marginBottom:4}}, 'What is it used for?'),
            React.createElement('div', {style:{fontSize:'1.4rem', fontWeight:700}}, med.name),
            React.createElement('div', {style:{color:'var(--text2)', fontSize:'0.9rem'}}, med.drugClass)
          )
        ),
        React.createElement('div', {className:'speed-input-row'},
          React.createElement('input', {ref:inputRef, className:'speed-input', placeholder:'Type your answer...', value:answer,
            onChange:e=>setAnswer(e.target.value),

          }),
          React.createElement('button', {className:'btn btn-primary', onClick:submit}, 'Submit')
        )
      ),
      phase === 'reveal' && React.createElement('div', {style:{padding:'10px 0'}},
        results[results.length-1] && results[results.length-1].correct ?

          React.createElement('div', null,
            React.createElement('div', {style:{color:'var(--red)', fontSize:'1.1rem', fontWeight:700, marginBottom:4}}, timer === 0 ? '\u23F0 Time\'s Up!' : '\u274C Not quite'),
            React.createElement('div', {style:{fontSize:'1rem', color:'var(--text)', marginTop:4}},
              React.createElement('strong', null, med.name), ' — ', med.drugClass,
              React.createElement('div', {style:{color:'var(--text2)', fontSize:'0.9rem', marginTop:4}}, med.indication)

// ============================
// PHARM: CARD PULL SIMULATION
// ============================
function PharmCardPull() {
  const POSSIBLE_ROUTES = ['PO','IV','IM','SubQ','Topical','Rectal','Inhaled','SL','Transdermal'];
  const [phase, setPhase] = useState('intro'); // intro, card, class, indications, adverse, doseCheck, results
  const [deck, setDeck] = useState([]);
  const [idx, setIdx] = useState(0);
  const [currentCard, setCurrentCard] = useState(null);
  const [givenDose, setGivenDose] = useState('');
  const [givenRoute, setGivenRoute] = useState('');
  const [isDoseSafe, setIsDoseSafe] = useState(true);
  const [isRouteSafe, setIsRouteSafe] = useState(true);
  const [classInput, setClassInput] = useState('');
  const [classRevealed, setClassRevealed] = useState(false);
  const [classSelfScore, setClassSelfScore] = useState(null);
  const [indRevealed, setIndRevealed] = useState(false);
  const [indSelfScore, setIndSelfScore] = useState(null);
  const [advRevealed, setAdvRevealed] = useState(false);
  const [advSelfScore, setAdvSelfScore] = useState(null);
  const [doseAnswer, setDoseAnswer] = useState(null);
  const [doseRevealed, setDoseRevealed] = useState(false);
  const [results, setResults] = useState([]);
  const [showNursing, setShowNursing] = useState(false);

  // Generate a fake dose+route for a med (sometimes wrong)
  const generateDoseRoute = (med) => {
    // 70% chance dose is safe, 30% wrong
    const safeDose = Math.random() < 0.7;
    const safeRoute = Math.random() < 0.7;
    let dose = med.doseRange || 'See reference';
    if (!safeDose && dose !== 'See reference') {
      // Create an unsafe dose by multiplying the numbers
      dose = dose.replace(/(\d+)/g, (m) => String(Math.round(parseInt(m) * (2 + Math.random() * 3))));
      dose = dose + ' (generated)';
    } else {
      dose = dose.split(';')[0].trim(); // take first safe dose
    }
    let route;
    if (safeRoute && med.safeRoutes && med.safeRoutes.length > 0) {
      route = med.safeRoutes[Math.floor(Math.random() * med.safeRoutes.length)];
    } else {
      const unsafeRoutes = POSSIBLE_ROUTES.filter(r => !med.safeRoutes || !med.safeRoutes.includes(r));
      route = unsafeRoutes.length > 0 ? unsafeRoutes[Math.floor(Math.random() * unsafeRoutes.length)] : 'IV';
    }
    return { dose, route, isSafeDose: safeDose, isSafeRoute: safeRoute || (med.safeRoutes && med.safeRoutes.includes(route)) };
  };

  const startPull = (count) => {
    const d = shuffle(MEDS).slice(0, count || MEDS.length);
    const cards = d.map(m => {
      const dr = generateDoseRoute(m);
      return { med: m, ...dr };
    });
    setDeck(cards);
    setIdx(0);
    setResults([]);
    resetCardState();
    setPhase('card');
  };

  const resetCardState = () => {
    setClassInput('');
    setClassRevealed(false);
    setClassSelfScore(null);
    setIndRevealed(false);
    setIndSelfScore(null);
    setAdvRevealed(false);
    setAdvSelfScore(null);
    setDoseAnswer(null);
    setDoseRevealed(false);
    setShowNursing(false);
  };

  const nextCard = () => {
    // Save result
    const card = deck[idx];
    const score = {
      med: card.med.name,
      classScore: classSelfScore || 0,
      indScore: indSelfScore || 0,
      advScore: advSelfScore || 0,
      doseCorrect: doseAnswer === (card.isSafeDose && card.isSafeRoute),
    };
    setResults(r => [...r, score]);
    const ni = idx + 1;
    if (ni >= deck.length) {
      setPhase('results');
    } else {
      setIdx(ni);
      resetCardState();
    }
  };

  // INTRO
  if (phase === 'intro') {
    return React.createElement('div', {style:{textAlign:'center', padding:30}},
      React.createElement('div', {style:{fontSize:'3.5rem', marginBottom:12}}, '\uD83C\uDCCF'),
      React.createElement('h2', {style:{marginBottom:8}}, 'Card Pull Simulation'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20, maxWidth:500, margin:'0 auto 20px', lineHeight:1.6}},
        'Simulates drawing a random med card from your professor\'s desk. You\'ll see the drug name + a dose/route (which may or may not be safe). Identify the drug class, key indications, critical adverse effects, then evaluate if the dose/route is safe.'
      ),
      React.createElement('div', {style:{display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}},
        React.createElement('button', {className:'btn btn-primary', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startPull(5)}, '5 Cards'),
        React.createElement('button', {className:'btn btn-outline', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startPull(10)}, '10 Cards'),
        React.createElement('button', {className:'btn btn-outline', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startPull(MEDS.length)}, 'All ' + MEDS.length + ' Cards')
      )
    );
  }

  // RESULTS
  if (phase === 'results') {
    const totalPoints = results.reduce((s, r) => s + r.classScore + r.indScore + r.advScore + (r.doseCorrect ? 1 : 0), 0);
    const maxPoints = results.length * 4; // 1 each for class, ind, adv, dose
    const pct = Math.round(totalPoints / maxPoints * 100);
    const weak = results.filter(r => (r.classScore + r.indScore + r.advScore + (r.doseCorrect ? 1 : 0)) < 3);
    return React.createElement('div', {style:{textAlign:'center', padding:20}},
      React.createElement('div', {style:{fontSize:'2.5rem', marginBottom:12}}, pct >= 80 ? '\uD83C\uDF89' : pct >= 60 ? '\uD83D\uDCCA' : '\uD83D\uDCDA'),
      React.createElement('h2', {style:{marginBottom:8}}, 'Card Pull Complete'),
      React.createElement('div', {style:{fontSize:'2.2rem', fontWeight:800, color: pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)', marginBottom:4}},
        pct + '%'
      ),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20}}, totalPoints + ' / ' + maxPoints + ' points'),
      weak.length > 0 && React.createElement('div', {className:'card', style:{textAlign:'left', marginBottom:16, maxWidth:500, margin:'0 auto 16px'}},
        React.createElement('h3', {style:{color:'var(--red)', marginBottom:10, fontSize:'0.95rem'}}, '\uD83D\uDD34 Needs more study (' + weak.length + ')'),
        weak.map((r, i) => React.createElement('div', {key:i, style:{padding:'6px 0', borderBottom:'1px solid var(--surface2)', fontSize:'0.9rem'}},
          React.createElement('strong', null, r.med),
          ' — class:', r.classScore ? '\u2705' : '\u274C',
          ' ind:', r.indScore ? '\u2705' : '\u274C',
          ' adv:', r.advScore ? '\u2705' : '\u274C',
          ' dose:', r.doseCorrect ? '\u2705' : '\u274C'
        ))
      ),
      React.createElement('div', {style:{display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}},
        React.createElement('button', {className:'btn btn-primary', onClick:()=>startPull(results.length)}, 'Try Again (' + results.length + ' cards)'),
        React.createElement('button', {className:'btn btn-outline', onClick:()=>setPhase('intro')}, 'Back')
      )
    );
  }

  // ACTIVE CARD
  const card = deck[idx];
  if (!card) return null;
  const med = card.med;

  // Section builder helper
  const section = (title, emoji, revealed, setRevealed, selfScore, setSelfScore, content) => {
    return React.createElement('div', {className:'card', style:{marginBottom:12, border: selfScore === 1 ? '1px solid var(--green)' : selfScore === 0 ? '1px solid var(--red)' : '1px solid var(--surface2)'}},
      React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}},
        React.createElement('h3', {style:{fontSize:'0.95rem', margin:0}}, emoji + ' ' + title),
        !revealed && React.createElement('button', {className:'btn btn-primary', style:{padding:'6px 16px', fontSize:'0.85rem'}, onClick:()=>setRevealed(true)}, 'Reveal')
      ),
      revealed && React.createElement('div', {style:{marginTop:10}},
        content,
        selfScore === null && React.createElement('div', {style:{display:'flex', gap:8, marginTop:10, justifyContent:'center'}},
          React.createElement('button', {className:'btn', style:{background:'var(--green)', color:'white', padding:'6px 18px'}, onClick:()=>setSelfScore(1)}, '\u2713 Got it'),
          React.createElement('button', {className:'btn', style:{background:'var(--red)', color:'white', padding:'6px 18px'}, onClick:()=>setSelfScore(0)}, '\u2717 Missed it')
        ),
        selfScore !== null && React.createElement('div', {style:{textAlign:'center', color: selfScore ? 'var(--green)' : 'var(--red)', fontSize:'0.85rem', fontWeight:600, marginTop:6}},
          selfScore ? '\u2705 Marked as known' : '\u274C Marked for review'
        )
      )
    );
  };

  const allScored = classSelfScore !== null && indSelfScore !== null && advSelfScore !== null && doseRevealed;

  return React.createElement('div', null,
    // Progress bar
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}},
      React.createElement('span', {style:{color:'var(--text2)', fontSize:'0.9rem'}}, 'Card ' + (idx + 1) + ' / ' + deck.length),
      React.createElement('button', {className:'btn btn-outline', style:{padding:'4px 12px', fontSize:'0.8rem'}, onClick:()=>setPhase('intro')}, 'Exit')
    ),
    React.createElement('div', {style:{height:6, borderRadius:3, background:'var(--surface2)', marginBottom:16, overflow:'hidden'}},
      React.createElement('div', {style:{height:'100%', borderRadius:3, width: Math.round((idx/deck.length)*100)+'%', background:'linear-gradient(90deg, var(--accent), var(--accent2))', transition:'width 0.3s'}})
    ),

    // THE CARD — drug name + given dose/route
    React.createElement('div', {className:'card', style:{textAlign:'center', marginBottom:16, background:'linear-gradient(135deg, var(--surface), var(--bg))', border:'2px solid var(--accent2)'}},
      React.createElement('div', {style:{fontSize:'0.8rem', color:'var(--accent2)', textTransform:'uppercase', letterSpacing:2, marginBottom:8}}, 'Professor\'s Card'),
      React.createElement('div', {style:{fontSize:'2rem', fontWeight:800, marginBottom:8}}, highlightSuffix(med.name)),
      React.createElement('div', {style:{fontSize:'1.1rem', color:'var(--orange)', fontWeight:600}},
        card.dose + '  •  ' + card.route
      )
    ),

    // Step 1: Drug Class
    section('What drug class?', '\uD83C\uDFF7\uFE0F', classRevealed, setClassRevealed, classSelfScore, setClassSelfScore,
      React.createElement('div', {style:{fontSize:'1.15rem', fontWeight:700, color:'var(--accent2)', textAlign:'center', padding:'8px 0'}}, med.drugClass)
    ),

    // Step 2: Key Indications
    section('Key Indications', '\uD83C\uDFAF', indRevealed, setIndRevealed, indSelfScore, setIndSelfScore,
      React.createElement('div', null,
        (med.keyIndications || [med.indication]).map((ind, i) =>
          React.createElement('div', {key:i, style:{padding:'4px 0', fontSize:'0.95rem'}}, '\u2022 ' + ind)
        )
      )
    ),

    // Step 3: Critical Adverse Effects
    section('Critical Adverse Effects', '\u26A0\uFE0F', advRevealed, setAdvRevealed, advSelfScore, setAdvSelfScore,
      React.createElement('div', null,
        (med.criticalAdverse || med.sideEffects).map((ae, i) =>
          React.createElement('div', {key:i, style:{padding:'4px 0', fontSize:'0.95rem', color:'var(--red)'}}, '\u26A0 ' + ae)
        )
      )
    ),

    // Step 4: Dose/Route Safety Check
    React.createElement('div', {className:'card', style:{marginBottom:12, border: doseRevealed ? (doseAnswer === (card.isSafeDose && card.isSafeRoute) ? '1px solid var(--green)' : '1px solid var(--red)') : '1px solid var(--surface2)'}},
      React.createElement('h3', {style:{fontSize:'0.95rem', marginBottom:10}}, '\uD83D\uDC8A Is this dose & route safe?'),
      React.createElement('div', {style:{textAlign:'center', marginBottom:10, fontSize:'1rem', fontWeight:600, color:'var(--orange)'}},
        card.dose + '  •  ' + card.route
      ),
      !doseRevealed && React.createElement('div', {style:{display:'flex', gap:10, justifyContent:'center'}},
        React.createElement('button', {className:'btn', style:{background:'var(--green)', color:'white', padding:'10px 24px', fontSize:'1rem'}, onClick:()=>{setDoseAnswer(true);setDoseRevealed(true);}}, '\u2705 Safe'),
        React.createElement('button', {className:'btn', style:{background:'var(--red)', color:'white', padding:'10px 24px', fontSize:'1rem'}, onClick:()=>{setDoseAnswer(false);setDoseRevealed(true);}}, '\u274C Unsafe')
      ),
      doseRevealed && React.createElement('div', {style:{textAlign:'center'}},
        React.createElement('div', {style:{fontSize:'1.1rem', fontWeight:700, marginBottom:6,
          color: doseAnswer === (card.isSafeDose && card.isSafeRoute) ? 'var(--green)' : 'var(--red)'}},
          doseAnswer === (card.isSafeDose && card.isSafeRoute) ? '\u2705 Correct!' : '\u274C Incorrect'
        ),
        React.createElement('div', {style:{fontSize:'0.9rem', color:'var(--text2)', marginBottom:4}},
          'Actual: Dose is ' + (card.isSafeDose ? 'SAFE' : 'UNSAFE') + ', Route is ' + (card.isSafeRoute ? 'SAFE' : 'UNSAFE')
        ),
        React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--text3)'}},
          'Safe routes: ' + (med.safeRoutes || med.routes).join(', ') + ' | Dose range: ' + (med.doseRange || 'N/A')
        )
      )
    ),

    // Nursing tip (expandable)
    React.createElement('div', {className:'card', style:{marginBottom:12, cursor:'pointer'}, onClick:()=>setShowNursing(!showNursing)},
      React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}},
        React.createElement('h3', {style:{fontSize:'0.95rem', margin:0}}, '\uD83D\uDC69\u200D\u2695\uFE0F Nursing Considerations'),
        React.createElement('span', {style:{color:'var(--text3)', fontSize:'0.85rem'}}, showNursing ? '\u25B2' : '\u25BC')
      ),
      showNursing && React.createElement('div', {style:{marginTop:10, fontSize:'0.9rem', lineHeight:1.6}},
        React.createElement('div', {style:{marginBottom:6}}, React.createElement('strong', null, 'Monitor: '), med.monitor || 'See reference'),
        React.createElement('div', {style:{color:'var(--orange)'}}, React.createElement('strong', null, 'Key: '), med.nursing || 'See reference')
      )
    ),

    // Next button
    allScored && React.createElement('div', {style:{textAlign:'center', marginTop:16}},
      React.createElement('button', {className:'btn btn-primary', style:{padding:'12px 32px', fontSize:'1.05rem'}, onClick:nextCard},
        idx < deck.length - 1 ? 'Next Card \u2192' : 'See Results'
      )
    )
  );

  const [med, setMed] = useState(null);
  const [givenDose, setGivenDose] = useState('');
  const [givenRoute, setGivenRoute] = useState('');
  const [messages, setMessages] = useState([]);
  const [isListening, setIsListening] = useState(false);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [isThinking, setIsThinking] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [textInput, setTextInput] = useState('');
  const [useText, setUseText] = useState(false);
  const [sessionScore, setSessionScore] = useState(null);
  const [cardCount, setCardCount] = useState(0);
  const [totalCards, setTotalCards] = useState(5);
  const [deck, setDeck] = useState([]);
  const [sessionResults, setSessionResults] = useState([]);
  const [voices, setVoices] = useState([]);
  const [selectedVoice, setSelectedVoice] = useState(settings.simVoice || '');

  const recognitionRef = useRef(null);
  const synthRef = useRef(window.speechSynthesis);
  const messagesEndRef = useRef(null);
  const abortRef = useRef(null);

  // Load voices
  useEffect(() => {
    const loadVoices = () => {
      const v = synthRef.current.getVoices();
      if (v.length > 0) {
        setVoices(v);
        // Auto-select best voice
        if (!selectedVoice) {
          const preferred = ['Samantha', 'Karen', 'Moira', 'Tessa', 'Google US English', 'Microsoft Zira'];
          const found = v.find(voice => preferred.some(p => voice.name.includes(p)));
          if (found) setSelectedVoice(found.name);
          else if (v[0]) setSelectedVoice(v[0].name);
        }
      }
    };
    loadVoices();
    synthRef.current.onvoiceschanged = loadVoices;
  }, []);

  // Scroll to bottom of chat
  useEffect(() => {
    if (messagesEndRef.current) {
      messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [messages, isThinking]);

  // Build the system prompt for the AI instructor
  const buildSystemPrompt = (medication, dose, route) => {
    return `You are a clinical nursing instructor conducting a verbal medication competency exam. You are warm but professional, like a seasoned nurse educator. Keep responses conversational and concise (2-4 sentences max unless explaining something).

CURRENT MEDICATION CARD:
- Drug: ${medication.name}
- Drug Class: ${medication.drugClass}
- Key Indications: ${(medication.keyIndications || [medication.indication]).join(', ')}
- Critical Adverse Effects: ${(medication.criticalAdverse || medication.sideEffects).join(', ')}
- Side Effects: ${medication.sideEffects.join(', ')}
- Safe Routes: ${(medication.safeRoutes || medication.routes).join(', ')}
- Dose Range: ${medication.doseRange || 'See reference'}
- Monitoring: ${medication.monitor || 'Standard monitoring'}
- Nursing Considerations: ${medication.nursing || 'Standard care'}
- Given Dose on Card: ${dose}
- Given Route on Card: ${route}
- Is the given dose within safe range: ${dose.includes('generated') ? 'NO - dose is too high' : 'YES'}
- Is the given route safe: ${(medication.safeRoutes || medication.routes).includes(route) ? 'YES' : 'NO - not a safe route for this drug'}

YOUR ROLE:
1. Start by saying "Alright, you've drawn ${medication.name}. The card shows ${dose.replace(' (generated)','')} via ${route}. Let's start — what drug class does ${medication.name} belong to?"
2. After the student answers about drug class, ask about key indications
3. Then ask about critical adverse effects and what to monitor
4. Then ask if the dose and route on the card are safe
5. Throughout, if the student is wrong or incomplete, gently probe deeper — ask "what else?" or "are you sure about that?" or give hints
6. Be encouraging when they're right: "Good", "Exactly", "That's right"
7. If they're struggling, give small hints without giving away the answer
8. After covering all areas, give a brief summary of how they did and say "Ready for the next card?" or "That wraps up this card."
9. IMPORTANT: Never dump all the information at once. Ask ONE question at a time and wait for the student's response.
10. Keep track mentally of what the student got right vs wrong. At the end of the card, briefly note areas to review.

Remember: You're testing the student verbally, like a real clinical exam. Be conversational, not robotic.`;
  };

  // Generate a random dose/route (sometimes wrong)
  const POSSIBLE_ROUTES = ['PO','IV','IM','SubQ','Topical','Rectal','Inhaled','SL','Transdermal'];
  const generateDoseRoute = (medication) => {
    const safeDose = Math.random() < 0.65;
    const safeRoute = Math.random() < 0.65;
    let dose = medication.doseRange || '100 mg';
    if (!safeDose && dose !== 'See reference') {
      dose = dose.replace(/(\d+)/g, (m) => String(Math.round(parseInt(m) * (2.5 + Math.random() * 3))));
      dose = dose + ' (generated)';
    } else {
      dose = dose.split(';')[0].trim();
    }
    let route;
    if (safeRoute && medication.safeRoutes && medication.safeRoutes.length > 0) {
      route = medication.safeRoutes[Math.floor(Math.random() * medication.safeRoutes.length)];
    } else {
      const unsafeRoutes = POSSIBLE_ROUTES.filter(r => !medication.safeRoutes || !medication.safeRoutes.includes(r));
      route = unsafeRoutes.length > 0 ? unsafeRoutes[Math.floor(Math.random() * unsafeRoutes.length)] : 'IV';
    }
    return { dose: dose.replace(' (generated)',''), route, rawDose: dose };
  };

  // TTS: speak text
  const speak = (text) => {
    return new Promise((resolve) => {
      synthRef.current.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      const voice = voices.find(v => v.name === selectedVoice);
      if (voice) utt.voice = voice;
      utt.rate = 1.0;
      utt.pitch = 1.0;
      utt.onstart = () => setIsSpeaking(true);
      utt.onend = () => { setIsSpeaking(false); resolve(); };
      utt.onerror = () => { setIsSpeaking(false); resolve(); };
      synthRef.current.speak(utt);
    });
  };

  // STT: start listening
  // Ref to track all speech text (final + interim) so we never lose it
  const liveTranscriptRef = useRef('');

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setUseText(true);
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalTranscript = '';
    liveTranscriptRef.current = '';
    recognition.onresult = (event) => {
      let interim = '';
      finalTranscript = '';
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      const combined = (finalTranscript + interim).trim();
      liveTranscriptRef.current = combined;
      setTranscript(combined);
    };
    recognition.onend = () => {
      setIsListening(false);
      // Use whatever we captured — final or interim
      const text = liveTranscriptRef.current.trim();
      if (text) {
        sendMessage(text);
      }
      liveTranscriptRef.current = '';
      setTranscript('');
    };
    recognition.onerror = (e) => {
      setIsListening(false);
      if (e.error === 'not-allowed' || e.error === 'no-speech') {
        if (e.error === 'not-allowed') setUseText(true);
      }
    };
    recognitionRef.current = recognition;
    recognition.start();
    setIsListening(true);
    setTranscript('');
  };

  const stopListening = () => {
    if (recognitionRef.current) {
      try { recognitionRef.current.stop(); } catch(e) {}
    }
  };

  // Send message to OpenRouter
  const sendMessage = async (userText) => {
    if (!userText.trim() || isThinking) return;
    const newMessages = [...messages, { role: 'user', content: userText }];
    setMessages(newMessages);
    setIsThinking(true);
    setTextInput('');

    try {
      const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
      abortRef.current = new AbortController();
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + apiKey,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: buildSystemPrompt(med, givenDose, givenRoute) },
            ...apiMessages
          ],
          max_tokens: 300,
          temperature: 0.7,
        }),
        signal: abortRef.current.signal,
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || 'API error');
      const reply = data.choices[0].message.content;
      const updatedMessages = [...newMessages, { role: 'assistant', content: reply }];
      setMessages(updatedMessages);
      setIsThinking(false);

      // Speak the reply
      await speak(reply);

      // Check if this card is done (instructor says "next card" or "wraps up")
      const doneSignals = ['next card', 'wraps up', 'move on', 'ready for the next', 'well done on this one'];
      if (doneSignals.some(s => reply.toLowerCase().includes(s))) {
        // Don't auto-advance, let user click next
      }

      // Auto-start listening after speaking (if using voice)
      if (!useText) {
        setTimeout(() => startListening(), 400);
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        setMessages(m => [...m, { role: 'system', content: 'Error: ' + err.message }]);
      }
      setIsThinking(false);
    }
  };

  // Start a new card
  const pullCard = async (deckArr, index) => {
    const medication = deckArr ? deckArr[index] : shuffle(MEDS)[0];
    const dr = generateDoseRoute(medication);
    setMed(medication);
    setGivenDose(dr.dose);
    setGivenRoute(dr.route);
    setMessages([]);
    setPhase('active');
    setTranscript('');

    // Get the AI's opening line
    setIsThinking(true);
    try {
      abortRef.current = new AbortController();
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + apiKey,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: buildSystemPrompt(medication, dr.rawDose, dr.route) },
            { role: 'user', content: 'I just drew a card. Let\'s begin.' }
          ],
          max_tokens: 200,
          temperature: 0.7,
        }),
        signal: abortRef.current.signal,
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || 'API error');
      const reply = data.choices[0].message.content;
      setMessages([
        { role: 'user', content: '[Drew a card]' },
        { role: 'assistant', content: reply }
      ]);
      setIsThinking(false);
      await speak(reply);
      if (!useText) setTimeout(() => startListening(), 400);
    } catch (err) {
      setMessages([{ role: 'system', content: 'Error connecting to AI: ' + err.message }]);
      setIsThinking(false);
    }
  };

  // Start a full session
  const startSession = (count) => {
    const d = shuffle(MEDS).slice(0, count);
    setDeck(d);
    setTotalCards(count);
    setCardCount(0);
    setSessionResults([]);
    pullCard(d, 0);
  };

  // Next card in session
  const nextCard = () => {
    // Save current card result
    setSessionResults(r => [...r, { med: med.name, messageCount: messages.length }]);
    const ni = cardCount + 1;
    if (ni >= totalCards || ni >= deck.length) {
      setPhase('summary');
      setSessionResults(r => [...r, { med: med.name, messageCount: messages.length }]);
    } else {
      setCardCount(ni);
      pullCard(deck, ni);
    }
  };

  // Stop everything
  const endSession = () => {
    synthRef.current.cancel();
    if (recognitionRef.current) recognitionRef.current.abort();
    if (abortRef.current) abortRef.current.abort();
    setPhase('intro');
    setMessages([]);
    setIsListening(false);
    setIsSpeaking(false);
    setIsThinking(false);
  };

  // Skip speaking
  const skipSpeech = () => {
    synthRef.current.cancel();
    setIsSpeaking(false);
  };

  // NO API KEY
  if (!apiKey) {
    return React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'3rem', marginBottom:12}}, '\uD83C\uDF99\uFE0F'),
      React.createElement('h2', {style:{marginBottom:8}}, 'AI Clinical Instructor'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20, maxWidth:450, margin:'0 auto 20px', lineHeight:1.6}},
        'This mode uses AI to simulate a verbal clinical exam. You\'ll talk back and forth with an AI instructor about each medication — just like the real test.'
      ),
      React.createElement('div', {className:'card', style:{maxWidth:450, margin:'0 auto', textAlign:'left', border:'1px solid var(--orange)'}},
        React.createElement('div', {style:{display:'flex', alignItems:'center', gap:8, marginBottom:8}},
          React.createElement('span', {style:{fontSize:'1.3rem'}}, '\uD83D\uDD11'),
          React.createElement('strong', null, 'API Key Required')
        ),
        React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:12}},
          'You need an OpenRouter API key to use this feature. Go to Settings to add your key.'
        ),
        React.createElement('a', {href:'https://openrouter.ai/keys', target:'_blank', style:{color:'var(--accent)', fontSize:'0.85rem'}}, 'Get a key at openrouter.ai/keys \u2192')
      )
    );
  }

  // INTRO
  if (phase === 'intro') {
    return React.createElement('div', {style:{textAlign:'center', padding:30}},
      React.createElement('div', {style:{fontSize:'3.5rem', marginBottom:12}}, '\uD83C\uDF99\uFE0F'),
      React.createElement('h2', {style:{marginBottom:8}}, 'AI Clinical Instructor'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20, maxWidth:500, margin:'0 auto 20px', lineHeight:1.6}},
        'Pull a med card and talk through it with your AI instructor — just like the real exam. Speak into your mic or type. The instructor will question your knowledge, give hints, and push you to think deeper.'
      ),
      React.createElement('div', {style:{marginBottom:20}},
        React.createElement('label', {style:{color:'var(--text3)', fontSize:'0.85rem', display:'block', marginBottom:6}}, 'Instructor Voice'),
        React.createElement('select', {style:{padding:'8px 12px', background:'var(--surface)', border:'1px solid var(--surface2)', borderRadius:8, color:'var(--text)', fontSize:'0.85rem'},
          value:selectedVoice, onChange:e => { setSelectedVoice(e.target.value); setProgress(p => ({...p, settings:{...(p.settings||{}), simVoice: e.target.value}})); }},
          voices.map(v => React.createElement('option', {key:v.name, value:v.name}, v.name + (v.lang ? ' (' + v.lang + ')' : '')))
        ),
        React.createElement('button', {className:'btn btn-outline', style:{marginLeft:8, padding:'8px 12px', fontSize:'0.85rem'}, onClick:()=>speak('Hello! I\'m your clinical instructor. Let\'s test your medication knowledge today.')}, '\uD83D\uDD0A Test')
      ),
      React.createElement('div', {style:{display:'flex', gap:8, justifyContent:'center', marginBottom:12}},
        React.createElement('label', {style:{display:'flex', alignItems:'center', gap:6, color:'var(--text2)', fontSize:'0.85rem', cursor:'pointer'}},
          React.createElement('input', {type:'checkbox', checked:useText, onChange:()=>setUseText(!useText)}),
          'Type instead of speak'
        )
      ),
      React.createElement('div', {style:{display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}},
        React.createElement('button', {className:'btn btn-primary', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startSession(3)}, '3 Cards'),
        React.createElement('button', {className:'btn btn-outline', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startSession(5)}, '5 Cards'),
        React.createElement('button', {className:'btn btn-outline', style:{padding:'12px 28px', fontSize:'1rem'}, onClick:()=>startSession(10)}, '10 Cards')
      )
    );
  }

  // SUMMARY
  if (phase === 'summary') {
    return React.createElement('div', {style:{textAlign:'center', padding:20}},
      React.createElement('div', {style:{fontSize:'2.5rem', marginBottom:12}}, '\uD83C\uDF93'),
      React.createElement('h2', {style:{marginBottom:8}}, 'Simulation Complete'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20}}, 'You worked through ' + sessionResults.length + ' medication cards with the AI instructor.'),
      React.createElement('div', {className:'card', style:{maxWidth:500, margin:'0 auto 20px', textAlign:'left'}},
        React.createElement('h3', {style:{marginBottom:10, fontSize:'0.95rem'}}, 'Cards Reviewed'),
        sessionResults.map((r, i) => React.createElement('div', {key:i, style:{padding:'6px 0', borderBottom:'1px solid var(--surface2)', fontSize:'0.9rem', display:'flex', justifyContent:'space-between'}},
          React.createElement('strong', null, r.med),
          React.createElement('span', {style:{color:'var(--text3)'}}, r.messageCount + ' exchanges')
        ))
      ),
      React.createElement('div', {style:{display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}},
        React.createElement('button', {className:'btn btn-primary', onClick:()=>startSession(sessionResults.length)}, 'Go Again'),
        React.createElement('button', {className:'btn btn-outline', onClick:()=>setPhase('intro')}, 'Back')
      )
    );
  }

  // ACTIVE CONVERSATION
  return React.createElement('div', {className:'sim-container'},
    // Header
    React.createElement('div', {className:'sim-header'},
      React.createElement('div', {style:{display:'flex', alignItems:'center', gap:10}},
        React.createElement('span', {style:{fontSize:'1.4rem'}}, '\uD83C\uDF99\uFE0F'),
        React.createElement('div', null,
          React.createElement('div', {style:{fontWeight:700, fontSize:'1rem'}}, 'Clinical Sim'),
          React.createElement('div', {style:{color:'var(--text3)', fontSize:'0.8rem'}}, 'Card ' + (cardCount + 1) + ' / ' + totalCards)
        )
      ),
      React.createElement('div', {style:{display:'flex', gap:8}},
        isSpeaking && React.createElement('button', {className:'btn btn-outline', style:{padding:'4px 10px', fontSize:'0.8rem'}, onClick:skipSpeech}, 'Skip \u23E9'),
        React.createElement('button', {className:'btn', style:{padding:'4px 10px', fontSize:'0.8rem', background:'var(--red)', color:'white'}, onClick:endSession}, 'End')
      )
    ),

    // Medication card banner
    med && React.createElement('div', {className:'sim-med-banner'},
      React.createElement('span', {style:{fontWeight:700, fontSize:'1.05rem'}}, highlightSuffix(med.name)),
      React.createElement('span', {style:{color:'var(--orange)', fontWeight:600, fontSize:'0.9rem'}}, givenDose + ' \u2022 ' + givenRoute)
    ),

    // Chat messages
    React.createElement('div', {className:'sim-chat'},
      messages.filter(m => m.content !== '[Drew a card]').map((m, i) =>
        React.createElement('div', {key:i, className:'sim-msg ' + (m.role === 'user' ? 'sim-msg-user' : m.role === 'system' ? 'sim-msg-system' : 'sim-msg-ai')},
          m.role === 'assistant' && React.createElement('div', {className:'sim-msg-avatar'}, '\uD83D\uDC69\u200D\u2695\uFE0F'),
          React.createElement('div', {className:'sim-msg-bubble'}, m.content)
        )
      ),
      isThinking && React.createElement('div', {className:'sim-msg sim-msg-ai'},
        React.createElement('div', {className:'sim-msg-avatar'}, '\uD83D\uDC69\u200D\u2695\uFE0F'),
        React.createElement('div', {className:'sim-msg-bubble sim-thinking'}, '\u2022\u2022\u2022')
      ),
      React.createElement('div', {ref: messagesEndRef})
    ),

    // Live transcript
    (isListening || transcript) && React.createElement('div', {className:'sim-transcript'},
      React.createElement('span', {className:'sim-pulse'}), ' ',
      transcript || 'Listening...'
    ),

    // Input area
    React.createElement('div', {className:'sim-input-area'},
      !useText ? React.createElement(React.Fragment, null,
        React.createElement('button', {
          className:'sim-mic-btn' + (isListening ? ' listening' : ''),
          onClick: isListening ? stopListening : startListening,
          disabled: isSpeaking || isThinking
        },
          isListening ? '\uD83D\uDD34' : '\uD83C\uDF99\uFE0F',
          React.createElement('span', {style:{fontSize:'0.75rem', display:'block', marginTop:2}},
            isListening ? 'Tap to send' : isSpeaking ? 'Speaking...' : isThinking ? 'Thinking...' : 'Tap to talk'
          )
        ),
        React.createElement('button', {className:'sim-text-toggle', onClick:()=>setUseText(true), title:'Switch to typing'}, '\u2328\uFE0F')
      ) : React.createElement(React.Fragment, null,
        React.createElement('div', {style:{display:'flex', gap:8, flex:1}},
          React.createElement('input', {
            className:'sim-text-input',
            placeholder: isSpeaking ? 'Instructor speaking...' : isThinking ? 'Thinking...' : 'Type your response...',
            value: textInput,
            onChange: e => setTextInput(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter' && textInput.trim()) sendMessage(textInput.trim()); },
            disabled: isSpeaking || isThinking
          }),
          React.createElement('button', {className:'btn btn-primary', style:{padding:'8px 16px'}, onClick:() => { if (textInput.trim()) sendMessage(textInput.trim()); }, disabled: !textInput.trim() || isSpeaking || isThinking}, '\u27A4')
        ),
        React.createElement('button', {className:'sim-text-toggle', onClick:()=>setUseText(false), title:'Switch to voice'}, '\uD83C\uDF99\uFE0F')
      ),
      // Next card button (visible when conversation seems done)
      messages.length >= 6 && React.createElement('button', {className:'btn btn-primary', style:{padding:'8px 16px', fontSize:'0.85rem', marginLeft:8}, onClick:nextCard},
        cardCount < totalCards - 1 ? 'Next \u2192' : 'Finish'
      )
    )
  );
}

// ============================
// LAB DAY TEST
// ============================
function LabDayTest({ progress, setProgress, isSuperAdmin }) {
  const allLabQs = QUESTIONS.filter(q => q.exam || q.examSimilar);
  // Admin-only questions (actual exam) are hidden from students
  const labQs = isSuperAdmin ? allLabQs : allLabQs.filter(q => !q.adminOnly);
  const examQs = labQs.filter(q => q.exam);
  const similarQs = labQs.filter(q => q.examSimilar);
  const savedLab = progress.labDayPosition || {mode:'menu', qIdx:0, filterType:'all'};
  const [mode, setMode] = useState(savedLab.mode);
  const [qIdx, setQIdx] = useState(savedLab.qIdx);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [showHints, setShowHints] = useState({});
  const [completed, setCompleted] = useState(false);
  const [hlOn, setHlOn] = useState(false);
  const [filterType, setFilterType] = useState(savedLab.filterType);
  const [testAnswers, setTestAnswers] = useState({});
  const [testSubmitted, setTestSubmitted] = useState(false);

  // Save position whenever it changes
  useEffect(() => {
    setProgress(p => ({...p, labDayPosition: {mode, qIdx, filterType}}));
  }, [mode, qIdx, filterType]);

  const filtered = filterType === 'exam' ? examQs : filterType === 'similar' ? similarQs : labQs;

  const reset = (idx) => {
    setQIdx(idx !== undefined ? idx : 0);
    setStepInputs({});
    setStepStatus({});
    setActiveStep(0);
    setShowHints({});
    setCompleted(false);
  };

  const checkStep = (i) => {
    const q = filtered[qIdx];
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isStr = isNaN(numExp);
    const isCorrect = isStr ? val.toLowerCase() === expected.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (!isCorrect) setProgress(p => recordAttempt(p, q.id, false));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        setProgress(p => {
          let updated = recordAttempt(p, q.id, true);
          const done = [...(updated.completedQuestions || [])];
          if (!done.includes(q.id)) done.push(q.id);
          return {...updated, completedQuestions: done};
        });
      }
    }
  };

  const submitTest = () => {
    setTestSubmitted(true);
    filtered.forEach((q) => {
      const userAns = (testAnswers[q.id] || '').trim();
      const numVal = parseFloat(userAns);
      const numExp = parseFloat(q.correct);
      const isStr = isNaN(numExp);
      const isCorrect = isStr ? userAns.toLowerCase() === q.correct.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
      setProgress(p => recordAttempt(p, q.id, isCorrect));
    });
    // Save test history
    const results = filtered.map(q => {
      const userAns = (testAnswers[q.id] || '').trim();
      const numVal = parseFloat(userAns);
      const numExp = parseFloat(q.correct);
      const isStr = isNaN(numExp);
      const correct = isStr ? userAns.toLowerCase() === q.correct.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
      return {qId:q.id, correct, userAnswer:userAns};
    });
    const correctCount = results.filter(r=>r.correct).length;
    setProgress(p => ({...p, testHistory:[...(p.testHistory||[]), {date:new Date().toISOString(), score:correctCount, total:filtered.length, pct:Math.round(correctCount/filtered.length*100), category:'Lab Day', details:results}]}));
  };

  const examBadge = (q) => {

// SMART STUDY
// ============================
function SmartStudy({ progress, setProgress }) {
  const [tab, setTab] = useState('overview');
  const [practiceFilter, setPracticeFilter] = useState('weak');
  const [qIdx, setQIdx] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [showHints, setShowHints] = useState({});
  const [completed, setCompleted] = useState(false);
  const [hlOn, setHlOn] = useState(progress.settings?.defaultXRay || false);
  const [editFormula, setEditFormula] = useState(null);
  const [editNote, setEditNote] = useState('');
  const [editQNote, setEditQNote] = useState(null);
  const [editQText, setEditQText] = useState('');

  const stats = progress.questionStats || {};
  const notes = progress.approachNotes || {};
  const qNotes = progress.questionNotes || {};

  // Analyze learner profile
  const catStats = {};
  QUESTIONS.forEach(q => {
    if (!catStats[q.category]) catStats[q.category] = {attempts:0, correct:0};
    const s = stats[q.id];
    if (s) { catStats[q.category].attempts += s.attempts; catStats[q.category].correct += s.correct; }
  });

  const weakCats = Object.entries(catStats)
    .filter(([,s]) => s.attempts > 0 && (s.correct / s.attempts) < 0.7)
    .sort((a,b) => (a[1].correct/a[1].attempts) - (b[1].correct/b[1].attempts));

  const strongCats = Object.entries(catStats)
    .filter(([,s]) => s.attempts >= 3 && (s.correct / s.attempts) >= 0.8)
    .sort((a,b) => (b[1].correct/b[1].attempts) - (a[1].correct/a[1].attempts));

  // Questions sorted by weakness (most wrong first, then untried)
  const getWeakQuestions = () => {
    const scored = QUESTIONS.map(q => {
      const s = stats[q.id];
      if (!s) return {q, score: -1}; // untried = show after weak
      const pct = s.correct / s.attempts;
      return {q, score: pct};
    });
    return scored.sort((a,b) => a.score - b.score).map(s => s.q);
  };

  const getUntried = () => QUESTIONS.filter(q => !stats[q.id]);

  const getRecommended = () => {
    // Mix: weak questions, untried, then exam questions not mastered
    const weak = QUESTIONS.filter(q => { const s=stats[q.id]; return s && s.correct/s.attempts < 0.7; });
    const untried = QUESTIONS.filter(q => !stats[q.id]);
    const examNotMastered = QUESTIONS.filter(q => q.exam && (!stats[q.id] || stats[q.id].correct/stats[q.id].attempts < 0.9));
    const seen = new Set();
    const result = [];
    [...examNotMastered, ...weak, ...untried].forEach(q => { if (!seen.has(q.id)) { seen.add(q.id); result.push(q); }});
    return result;
  };

  const practiceQs = practiceFilter === 'weak' ? getWeakQuestions() :
    practiceFilter === 'untried' ? getUntried() :
    practiceFilter === 'recommended' ? getRecommended() : QUESTIONS;

  const reset = (idx) => {
    setQIdx(idx !== undefined ? idx : 0);
    setStepInputs({});
    setStepStatus({});
    setActiveStep(0);
    setShowHints({});
    setCompleted(false);
  };

  const checkStep = (i) => {
    const q = practiceQs[qIdx];
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isStr = isNaN(numExp);
    const isCorrect = isStr ? val.toLowerCase() === expected.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (!isCorrect) setProgress(p => recordAttempt(p, q.id, false));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        setProgress(p => {
          let updated = recordAttempt(p, q.id, true);
          const done = [...(updated.completedQuestions || [])];
          if (!done.includes(q.id)) done.push(q.id);
          return {...updated, completedQuestions: done};
        });
      }
    }
  };

  const saveFormulaNote = (fId) => {
    setProgress(p => ({...p, approachNotes: {...(p.approachNotes||{}), [fId]: editNote}}));
    setEditFormula(null);
    setEditNote('');
  };

  const saveQuestionNote = (qId) => {
    setProgress(p => ({...p, questionNotes: {...(p.questionNotes||{}), [qId]: editQText}}));
    setEditQNote(null);
    setEditQText('');
  };

  const tabs = [
    {id:'overview', label:'\uD83E\uDDE0 Overview'},
    {id:'practice', label:'\uD83C\uDFAF Adaptive Practice'},
    {id:'approaches', label:'\uD83D\uDCDD My Approaches'},
  ];

  // OVERVIEW TAB
  if (tab === 'overview') {
    const totalAttempted = Object.keys(stats).length;
    const totalCorrect = Object.values(stats).reduce((a,s) => a + s.correct, 0);
    const totalAttempts = Object.values(stats).reduce((a,s) => a + s.attempts, 0);
    const overallPct = totalAttempts > 0 ? Math.round(totalCorrect/totalAttempts*100) : 0;
    const recommendations = getRecommended();

  const settings = progress.settings || {};

    setProgress(p => ({...p, settings: {...(p.settings||{}), [key]: val}}));
  };

  const resetAllData = () => {
    if (confirm('This will erase ALL your progress, notes, and settings. Are you sure?')) {
      setProgress(getDefaultProgress());
    }
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(progress, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'medmaster_backup.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          setProgress({...getDefaultProgress(), ...data});
        } catch { alert('Invalid backup file.'); }
      };
      reader.readAsText(file);

// Initialize Firebase (called once when config is available)
let firebaseApp = null;
let firebaseDb = null;
let firebaseAuth = null;

function initFirebase(configStr) {
  if (firebaseApp) return true;
  try {
    const config = typeof configStr === 'string' ? JSON.parse(configStr) : configStr;
    if (!config || !config.apiKey) return false;
    firebaseApp = firebase.initializeApp(config);
    firebaseDb = firebase.database();
    firebaseAuth = firebase.auth();
    return true;
  } catch(e) {
    console.error('Firebase init failed:', e);
    return false;
  }
}
