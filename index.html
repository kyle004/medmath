<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedMaster</title>
<meta name="app-version" content="16">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --accent: #3b82f6; --accent2: #8b5cf6; --green: #22c55e; --red: #ef4444;
    --orange: #f59e0b; --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  .app { display:flex; min-height:100vh; }
  .app-main { flex:1; padding:20px 24px; max-width:1100px; margin:0 auto; width:100%; overflow-y:auto; }

  /* SIDEBAR */
  .sidebar { width:240px; background:var(--surface); border-right:1px solid var(--surface2); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform 0.25s ease; }
  .sidebar-brand { padding:20px 18px 12px; display:flex; align-items:center; justify-content:space-between; }
  .sidebar-brand h1 { font-size:1.3rem; font-weight:800; background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; }
  .sidebar-user { padding:0 18px 16px; font-size:0.8rem; color:var(--text3); }
  .sidebar-section { padding:6px 12px; font-size:0.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); font-weight:700; margin-top:8px; }
  .sidebar-nav { flex:1; overflow-y:auto; padding:0 8px; }
  .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; cursor:pointer; font-size:0.88rem; font-weight:500; color:var(--text2); transition:all 0.15s; border:none; background:none; width:100%; text-align:left; }
  .sidebar-item:hover { background:var(--surface2); color:var(--text); }
  .sidebar-item.active { background:rgba(59,130,246,0.15); color:var(--accent); font-weight:600; }
  .sidebar-item .si-icon { width:22px; text-align:center; font-size:1rem; flex-shrink:0; }
  .sidebar-item .si-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sidebar-item .si-badge { margin-left:auto; background:var(--red); color:white; font-size:0.7rem; font-weight:700; padding:2px 7px; border-radius:10px; }
  .sidebar-bottom { padding:12px; border-top:1px solid var(--surface2); }
  .sidebar-spacer { width:240px; flex-shrink:0; }

  /* Mobile sidebar */
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; backdrop-filter:blur(2px); }
  .sidebar-toggle { display:none; position:fixed; top:12px; left:12px; z-index:98; background:var(--surface); border:1px solid var(--surface2); border-radius:10px; padding:8px 12px; cursor:pointer; color:var(--text); font-size:1.2rem; }
  @media (max-width: 768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.open { display:block; }
    .sidebar-toggle { display:block; }
    .sidebar-spacer { display:none; }
    .app-main { padding:16px; padding-top:52px; }
  }

  /* OLD NAV — kept for compatibility but hidden */
  .nav { display:none; }
  .nav-brand { font-size:1.3rem; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto; }
  .nav-btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.2s; background:var(--surface); color:var(--text2); }
  .nav-btn:hover { background:var(--surface2); color:var(--text); }
  .nav-btn.active { background:var(--accent); color:white; }

  /* CARDS */
  .card { background:var(--surface); border-radius:12px; padding:24px; margin-bottom:16px; border:1px solid var(--surface2); }
  .card h2 { font-size:1.2rem; margin-bottom:12px; }
  .card h3 { font-size:1rem; margin-bottom:8px; color:var(--accent); }

  /* FORMULA CARDS */
  .formula-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }
  .formula-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--surface2); cursor:pointer; transition:all 0.2s; }
  .formula-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .formula-card.flipped { border-color:var(--green); }
  .formula-title { font-weight:700; font-size:1rem; margin-bottom:8px; }
  .formula-category { font-size:0.75rem; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .formula-front { font-size:1.4rem; text-align:center; padding:20px 0; color:var(--orange); font-family: 'Courier New', monospace; font-weight:700; }
  .formula-back { font-size:0.9rem; color:var(--text2); line-height:1.6; }
  .formula-back .example { background:var(--bg); padding:12px; border-radius:8px; margin-top:8px; font-size:0.85rem; }
  .flip-hint { text-align:center; font-size:0.75rem; color:var(--text3); margin-top:8px; }

  /* BUTTONS */
  .btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#2563eb; }
  .btn-success { background:var(--green); color:white; }
  .btn-danger { background:var(--red); color:white; }
  .btn-outline { background:transparent; border:2px solid var(--surface2); color:var(--text2); }
  .btn-outline:hover { border-color:var(--accent); color:var(--text); }
  .btn-sm { padding:6px 12px; font-size:0.8rem; }

  /* INPUTS */
  input[type="text"], input[type="number"] { background:var(--bg); border:2px solid var(--surface2); border-radius:8px; padding:10px 14px; color:var(--text); font-size:1rem; width:100%; outline:none; transition:border 0.2s; }
  input:focus { border-color:var(--accent); }

  /* QUESTION */
  .question-box { background:var(--bg); border-radius:12px; padding:20px; margin-bottom:16px; border-left:4px solid var(--accent); }
  .question-text { font-size:1.05rem; line-height:1.7; }

  /* HIGHLIGHT SYSTEM */
  .highlight-key { background:rgba(34,197,94,0.2); padding:1px 4px; border-radius:3px; color:var(--green); font-weight:600; }
  .highlight-trap { background:rgba(239,68,68,0.15); padding:1px 4px; border-radius:3px; color:var(--red); text-decoration:line-through; opacity:0.7; }
  .highlight-convert { background:rgba(245,158,11,0.2); padding:1px 4px; border-radius:3px; color:var(--orange); font-weight:600; }

  /* STEPS */
  .step { background:var(--bg); border-radius:10px; padding:16px; margin-bottom:12px; border:2px solid var(--surface2); transition:border 0.2s; }
  .step.active { border-color:var(--accent); }
  .step.completed { border-color:var(--green); }
  .step.wrong { border-color:var(--red); }
  .step-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .step-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; background:var(--surface2); color:var(--text2); flex-shrink:0; }
  .step.completed .step-num { background:var(--green); color:white; }
  .step.active .step-num { background:var(--accent); color:white; }
  .step-label { font-weight:600; font-size:0.95rem; }
  .step-input-row { display:flex; gap:10px; align-items:center; margin-top:8px; }
  .step-input-row input { max-width:200px; }
  .step-hint { font-size:0.8rem; color:var(--text3); margin-top:6px; }
  .step-feedback { font-size:0.85rem; margin-top:6px; padding:8px 12px; border-radius:6px; }
  .step-feedback.correct { background:rgba(34,197,94,0.15); color:var(--green); }
  .step-feedback.incorrect { background:rgba(239,68,68,0.15); color:var(--red); }

  /* CHALLENGE HINTS */
  .hint-summary { cursor:pointer; padding:10px 14px; background:var(--bg); border-radius:8px; border:1px solid var(--surface2); font-weight:600; font-size:0.9rem; color:var(--text2); display:flex; align-items:center; gap:8px; list-style:none; transition:all 0.2s; }
  .hint-summary:hover { border-color:var(--accent); color:var(--text); }
  .hint-summary::-webkit-details-marker { display:none; }
  .hint-summary::before { content:'\25B6'; font-size:0.7rem; color:var(--text3); transition:transform 0.2s; }
  details[open] > .hint-summary::before { transform:rotate(90deg); }
  .hint-summary.hint-formula { color:var(--orange); border-color:rgba(245,158,11,0.3); }
  .hint-content { padding:12px 14px; margin-top:4px; background:var(--surface); border-radius:0 0 8px 8px; border:1px solid var(--surface2); border-top:none; }

  /* MULTIPLE CHOICE */
  .mc-options { display:grid; gap:10px; margin-top:12px; }
  .mc-option { padding:14px 18px; border-radius:10px; border:2px solid var(--surface2); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px; }
  .mc-option:hover { border-color:var(--accent); background:rgba(59,130,246,0.05); }
  .mc-option.selected { border-color:var(--accent); background:rgba(59,130,246,0.1); }
  .mc-option.correct { border-color:var(--green); background:rgba(34,197,94,0.1); }
  .mc-option.wrong { border-color:var(--red); background:rgba(239,68,68,0.1); }
  .mc-letter { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; background:var(--surface2); font-size:0.85rem; flex-shrink:0; }

  /* CALCULATOR */
  .calc-toggle { position:fixed; bottom:20px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1.4rem; box-shadow:0 4px 20px rgba(59,130,246,0.4); z-index:100; display:flex; align-items:center; justify-content:center; }
  .calculator { position:fixed; bottom:90px; right:20px; width:280px; background:var(--surface); border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:100; overflow:hidden; border:1px solid var(--surface2); }
  .calc-display { padding:16px; text-align:right; }
  .calc-expr { font-size:0.8rem; color:var(--text3); min-height:20px; }
  .calc-value { font-size:1.8rem; font-weight:700; font-family:'Courier New',monospace; word-break:break-all; }
  .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; padding:2px; }
  .calc-btn { padding:14px; border:none; cursor:pointer; font-size:1rem; font-weight:600; background:var(--bg); color:var(--text); transition:background 0.1s; }
  .calc-btn:hover { background:var(--surface2); }
  .calc-btn.op { color:var(--accent); }
  .calc-btn.eq { background:var(--accent); color:white; }
  .calc-btn.clear { color:var(--red); }

  /* PROGRESS BAR */
  .progress-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:16px; }
  .progress-fill { height:100%; border-radius:3px; transition:width 0.3s; background:linear-gradient(90deg, var(--accent), var(--green)); }

  /* STATS */
  .stats-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .stat-box { background:var(--bg); border-radius:10px; padding:14px 20px; flex:1; min-width:120px; text-align:center; }
  .stat-value { font-size:1.5rem; font-weight:800; }
  .stat-label { font-size:0.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

  /* TAGS */
  .tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .tag-green { background:rgba(34,197,94,0.15); color:var(--green); }
  .tag-red { background:rgba(239,68,68,0.15); color:var(--red); }
  .tag-blue { background:rgba(59,130,246,0.15); color:var(--accent); }
  .tag-orange { background:rgba(245,158,11,0.15); color:var(--orange); }

  /* CATEGORY FILTER */
  .filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--surface2); background:transparent; color:var(--text2); cursor:pointer; font-size:0.8rem; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

  /* TIMER */
  .timer { font-family:'Courier New',monospace; font-size:1.2rem; font-weight:700; }
  .timer.warning { color:var(--orange); }
  .timer.danger { color:var(--red); }

  /* RESULTS */
  .result-correct { color:var(--green); }
  .result-wrong { color:var(--red); }

  /* BREAKDOWN ANALYSIS */
  .analysis-section { margin-top:16px; }
  .analysis-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--surface2); }
  .analysis-icon { font-size:1.2rem; flex-shrink:0; margin-top:2px; }
  .analysis-content { flex:1; }
  .analysis-label { font-weight:600; font-size:0.85rem; margin-bottom:2px; }
  .analysis-desc { font-size:0.85rem; color:var(--text2); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }

  /* HOME CARDS */
  .home-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:16px; margin-top:20px; }
  .home-card { background:var(--surface); border-radius:14px; padding:24px; border:1px solid var(--surface2); cursor:pointer; transition:all 0.2s; text-align:center; }
  .home-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .home-icon { font-size:2.5rem; margin-bottom:12px; }
  .home-card h3 { font-size:1.1rem; margin-bottom:8px; }
  .home-card p { font-size:0.85rem; color:var(--text2); line-height:1.5; }

  /* EXPLANATION BOX */
  .explanation { background:var(--bg); border-radius:10px; padding:16px; margin-top:12px; border-left:3px solid var(--green); }
  .explanation h4 { color:var(--green); margin-bottom:8px; font-size:0.9rem; }
  .explanation p { font-size:0.88rem; color:var(--text2); line-height:1.6; }
  .explanation .math { font-family:'Courier New',monospace; color:var(--orange); font-weight:600; }

  /* ACCURACY BAR */
  .acc-bar-wrap { margin-bottom:14px; }
  .acc-bar-label { display:flex; justify-content:space-between; margin-bottom:4px; font-size:0.85rem; }
  .acc-bar-label span:first-child { font-weight:600; }
  .acc-bar { height:10px; background:var(--surface2); border-radius:5px; overflow:hidden; }
  .acc-bar-fill { height:100%; border-radius:5px; transition:width 0.5s; }
  .acc-bar-fill.great { background:var(--green); }
  .acc-bar-fill.ok { background:var(--orange); }
  .acc-bar-fill.weak { background:var(--red); }

  /* HISTORY TABLE */
  .history-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .history-table th { text-align:left; padding:8px 12px; border-bottom:2px solid var(--surface2); color:var(--text3); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; }
  .history-table td { padding:8px 12px; border-bottom:1px solid var(--surface2); }

  /* SAVE INDICATOR */
  .save-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; background:rgba(34,197,94,0.12); color:var(--green); }

  /* CLEAR BTN */
  .btn-ghost { background:transparent; border:none; color:var(--text3); cursor:pointer; font-size:0.8rem; padding:4px 8px; }
  .btn-ghost:hover { color:var(--red); }

  /* TOGGLE SWITCH */
  .toggle-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:12px 16px; background:var(--surface); border-radius:10px; border:1px solid var(--surface2); }
  .toggle-label { font-size:0.9rem; font-weight:600; }
  .toggle-sub { font-size:0.75rem; color:var(--text3); }
  .toggle-switch { position:relative; width:48px; height:26px; flex-shrink:0; cursor:pointer; }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-track { position:absolute; top:0; left:0; right:0; bottom:0; background:var(--surface2); border-radius:13px; transition:background 0.3s; }
  .toggle-switch input:checked + .toggle-track { background:var(--accent); }
  .toggle-knob { position:absolute; top:3px; left:3px; width:20px; height:20px; background:white; border-radius:50%; transition:transform 0.3s; }
  .toggle-switch input:checked ~ .toggle-knob { transform:translateX(22px); }

  /* HIGHLIGHT LEGEND */
  .hl-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:8px; padding:10px 14px; background:var(--bg); border-radius:8px; }
  .hl-legend-item { display:flex; align-items:center; gap:6px; font-size:0.8rem; }
  .hl-swatch { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
  .hl-swatch-key { background:rgba(34,197,94,0.35); border:1px solid var(--green); }
  .hl-swatch-trap { background:rgba(239,68,68,0.2); border:1px solid var(--red); }
  .hl-swatch-convert { background:rgba(245,158,11,0.25); border:1px solid var(--orange); }

  /* HIGHLIGHTED TEXT */
  .hl-key { background:rgba(34,197,94,0.2); padding:2px 5px; border-radius:4px; color:var(--green); font-weight:600; border-bottom:2px solid var(--green); }
  .hl-trap { background:rgba(239,68,68,0.12); padding:2px 5px; border-radius:4px; color:var(--red); opacity:0.6; text-decoration:line-through; }
  .hl-convert { background:rgba(245,158,11,0.2); padding:2px 5px; border-radius:4px; color:var(--orange); font-weight:600; border-bottom:2px dashed var(--orange); }

  /* QUESTION NAVIGATOR */
  .qnav-toggle { position:fixed; right:16px; top:50%; transform:translateY(-50%); z-index:90; width:40px; height:40px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1.1rem; font-weight:700; box-shadow:0 2px 10px rgba(59,130,246,0.4); display:flex; align-items:center; justify-content:center; }
  .qnav-panel { position:fixed; right:0; top:0; bottom:0; width:260px; background:var(--surface); border-left:1px solid var(--surface2); z-index:95; padding:16px; overflow-y:auto; transform:translateX(100%); transition:transform 0.3s ease; box-shadow:-4px 0 20px rgba(0,0,0,0.3); }
  .qnav-panel.open { transform:translateX(0); }
  .qnav-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:12px; }
  .qnav-dot { width:38px; height:38px; border-radius:8px; border:2px solid var(--surface2); background:var(--bg); color:var(--text2); font-size:0.8rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .qnav-dot:hover { border-color:var(--accent); color:var(--text); }
  .qnav-dot.current { background:var(--accent); border-color:var(--accent); color:white; }
  .qnav-dot.done { background:rgba(34,197,94,0.15); border-color:var(--green); color:var(--green); }
  .qnav-dot.wrong { background:rgba(239,68,68,0.1); border-color:var(--red); color:var(--red); }
  .qnav-dot.answered { background:rgba(59,130,246,0.1); border-color:var(--accent); color:var(--accent); }
  .qnav-dot.exam-dot { box-shadow:0 0 0 2px rgba(239,68,68,0.3); }
  .qnav-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:1.2rem; }
  .qnav-legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; padding-top:12px; border-top:1px solid var(--surface2); }
  .qnav-legend-item { display:flex; align-items:center; gap:4px; font-size:0.7rem; color:var(--text3); }
  .qnav-legend-dot { width:10px; height:10px; border-radius:3px; }

  /* SMART STUDY */
  .smart-card { background:var(--surface); border-radius:12px; padding:20px; margin-bottom:14px; border:1px solid var(--surface2); }
  .smart-card h3 { font-size:1rem; margin-bottom:10px; }
  .approach-textarea { width:100%; min-height:80px; padding:12px; border:2px solid var(--surface2); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.9rem; resize:vertical; font-family:inherit; }
  .approach-textarea:focus { border-color:var(--accent); outline:none; }
  .approach-textarea::placeholder { color:var(--text3); }
  .weak-bar { height:8px; border-radius:4px; background:var(--surface2); overflow:hidden; margin-top:6px; }
  .weak-bar-fill { height:100%; border-radius:4px; transition:width 0.5s; }
  .smart-rec { padding:12px 16px; background:var(--bg); border-radius:10px; margin-bottom:8px; border-left:3px solid var(--accent); display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
  .smart-rec:hover { background:var(--surface2); }

  /* SETTINGS */
  .settings-section { margin-bottom:24px; }

// DATA: ALL FORMULAS

const FORMULAS = [
  {

// ============================
// PROGRESS / SAVE SYSTEM
// ============================
const SAVE_KEY = 'medmath_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return getDefaultProgress();
    return {...getDefaultProgress(), ...JSON.parse(raw)};
  } catch { return getDefaultProgress(); }
}

function saveProgress(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
}

function getDefaultProgress() {
  return {
    guidedPosition: {filter:'All', qIdx:0},
    completedQuestions: [],
    testHistory: [],
    questionStats: {},
    missedQuestions: [],
    // Smart Study: approach notes per formula/question
    approachNotes: {},    // {formulaId: "user's approach text"}
    questionNotes: {},    // {qId: "user's note for this question"}
    // Settings
    settings: {
      defaultXRay: false,
      timerSeconds: 10,        // speed round timer
      testTimeLimit: 30,       // test mode default minutes
      testNumQuestions: 10,
      showFormulaHints: true,
      autoProceed: false,      // auto-advance on correct in guided
      darkMode: true,          // already dark, but placeholder
      questionNavSide: 'right',
      openRouterKey: '',
      simVoice: '',           // preferred TTS voice name
      simModel: 'openai/gpt-4o-mini',  // OpenRouter model for sim
      firebaseConfig: '',     // JSON string of Firebase config
      adminUid: '',           // Firebase Auth UID of the admin
    }
  };
}

// Global progress context via a custom hook
function useProgress() {
  const [progress, setProgressState] = useState(() => loadProgress());
  const setProgress = useCallback((updater) => {
    setProgressState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveProgress(next);
      return next;
    });
  }, []);
  return [progress, setProgress];
}

// Helper to record a question attempt
function recordAttempt(progress, qId, wasCorrect) {
  const stats = {...(progress.questionStats || {})};
  const prev = stats[qId] || {attempts:0, correct:0, lastAttempt:null, lastCorrect:false};
  stats[qId] = {
    attempts: prev.attempts + 1,
    correct: prev.correct + (wasCorrect ? 1 : 0),
    lastAttempt: Date.now(),
    lastCorrect: wasCorrect
  };
  let missed = [...(progress.missedQuestions || [])];
  if (!wasCorrect && !missed.includes(qId)) missed.push(qId);
  if (wasCorrect) missed = missed.filter(id => id !== qId);
  return {...progress, questionStats: stats, missedQuestions: missed};
}

// ============================
// CALCULATOR COMPONENT
// ============================
function Calculator({ show, onToggle }) {
  const [display, setDisplay] = useState('0');
  const [history, setHistory] = useState('');
  const [prevValue, setPrevValue] = useState(null);
  const [operator, setOperator] = useState(null);
  const [newNum, setNewNum] = useState(true);

  const doMath = (a, op, b) => {
    const na = parseFloat(a);
    const nb = parseFloat(b);
    if (isNaN(na) || isNaN(nb)) return 'Error';
    switch(op) {
      case '+': return na + nb;
      case '-': return na - nb;
      case '×': return na * nb;
      case '÷': return nb === 0 ? 'Error' : na / nb;
      default: return nb;
    }
  };

  const press = (val) => {
    if (val === 'C') {
      setDisplay('0'); setHistory(''); setPrevValue(null); setOperator(null); setNewNum(true);
      return;
    }
    if (val === '=') {
      if (prevValue !== null && operator) {
        const result = doMath(prevValue, operator, display);
        const rounded = typeof result === 'number' ? Math.round(result * 10000) / 10000 : result;
        setHistory(prevValue + ' ' + operator + ' ' + display + ' =');
        setDisplay(String(rounded));
        setPrevValue(null);
        setOperator(null);
        setNewNum(true);
      }
      return;
    }
    if (['+','-','×','÷'].includes(val)) {
      if (prevValue !== null && operator && !newNum) {
        const result = doMath(prevValue, operator, display);
        const rounded = typeof result === 'number' ? Math.round(result * 10000) / 10000 : result;
        setHistory(String(rounded) + ' ' + val);
        setDisplay(String(rounded));
        setPrevValue(String(rounded));
      } else {
        setHistory(display + ' ' + val);
        setPrevValue(display);
      }
      setOperator(val);
      setNewNum(true);
      return;
    }
    if (val === '.' && display.includes('.') && !newNum) return;
    if (newNum) {
      setDisplay(val === '.' ? '0.' : val);
      setNewNum(false);
    } else {
      setDisplay(display === '0' && val !== '.' ? val : display + val);
    }
  };

  const buttons = ['C','÷','×','-','7','8','9','+','4','5','6','=','1','2','3','.','0',''];

  if (!show) return React.createElement('button', {className:'calc-toggle', onClick:onToggle}, '\u{1F5A9}');

  return React.createElement(React.Fragment, null,
    React.createElement('button', {className:'calc-toggle', onClick:onToggle}, '\u2715'),
    React.createElement('div', {className:'calculator'},
      React.createElement('div', {className:'calc-display'},
        React.createElement('div', {className:'calc-expr'}, history || '\u00A0'),
        React.createElement('div', {className:'calc-value'}, display)
      ),
      React.createElement('div', {className:'calc-grid'},
        buttons.map((b, i) => b ?
          React.createElement('button', {
            key:i, className:'calc-btn' + (['+','-','×','÷'].includes(b) ? ' op' : b === '=' ? ' eq' : b === 'C' ? ' clear' : ''),
            onClick:() => press(b), style: b === '0' ? {gridColumn:'span 2'} : {}
          }, b) : null
        )
      )
    )
  );
}

function postActivity(authUser, type, detail) {
  if (!firebaseDb || !authUser) return;
  firebaseDb.ref('activityFeed').push({
    uid: authUser.uid,
    username: authUser.displayName || 'Anonymous',
    type: type, // 'test_score' | 'streak' | 'milestone' | 'study'
    detail: detail, // e.g. { score: 85, questions: 10 }
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  // Keep feed trimmed: remove entries older than 3 days
  const cutoff = Date.now() - 3 * 86400000;
  firebaseDb.ref('activityFeed').orderByChild('timestamp').endAt(cutoff).once('value', snap => {
    snap.forEach(child => child.ref.remove());
  });
}

function ActivityFeed() {

  useEffect(() => {
    if (!firebaseDb) return;
    const ref = firebaseDb.ref('activityFeed').orderByChild('timestamp').limitToLast(20);
    const onVal = ref.on('value', snap => {
      const data = snap.val() || {};

      setItems(list);

    return () => ref.off('value', onVal);

    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';

  const getIcon = (type) => {
    switch(type) {
      case 'test_score': return '\uD83D\uDCDD';
      case 'streak': return '\uD83D\uDD25';
      case 'milestone': return '\uD83C\uDFC6';
      case 'study': return '\uD83D\uDCDA';
      default: return '\u2728';

  const getText = (item) => {
    const d = item.detail || {};
    switch(item.type) {
      case 'test_score': return 'scored ' + (d.score || 0) + '% on a ' + (d.questions || '?') + '-question test';
      case 'streak': return 'is on a ' + (d.days || 0) + '-day study streak!';
      case 'milestone': return d.text || 'hit a milestone!';
      case 'study': return 'started studying ' + (d.page || '');
      default: return 'did something awesome';

  return React.createElement('div', {style:{marginBottom:20}},
    React.createElement('h3', {style:{fontSize:'1rem', marginBottom:12, display:'flex', alignItems:'center', gap:8}},
      '\uD83D\uDCE1', React.createElement('span', null, 'Classmate Activity')
    ),
    React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:6}},
      items.slice(0, 8).map(item =>
        React.createElement('div', {key:item.id, style:{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--surface)', borderRadius:10, fontSize:'0.88rem'}},

          React.createElement('span', null,
            React.createElement('strong', {style:{color:'var(--accent)'}}, item.username),
            ' ' + getText(item)

          React.createElement('span', {style:{marginLeft:'auto', color:'var(--text3)', fontSize:'0.75rem', whiteSpace:'nowrap'}}, timeAgo(item.timestamp))

const RoomCrypto = {
  async generateRoomKey() {
    const key = await crypto.subtle.generateKey(
      { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
    );
    const raw = await crypto.subtle.exportKey('raw', key);
    return btoa(String.fromCharCode(...new Uint8Array(raw)));
  },

  async importKey(base64) {
    const raw = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    return crypto.subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt', 'decrypt']);
  },

  async encrypt(plaintext, keyBase64) {
    const key = await this.importKey(keyBase64);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    const combined = new Uint8Array(iv.length + ct.byteLength);
    combined.set(iv, 0);
    combined.set(new Uint8Array(ct), iv.length);
    return btoa(String.fromCharCode(...combined));
  },

  async decrypt(ciphertext64, keyBase64) {
    try {
      const key = await this.importKey(keyBase64);
      const data = Uint8Array.from(atob(ciphertext64), c => c.charCodeAt(0));
      const iv = data.slice(0, 12);
      const ct = data.slice(12);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    } catch (e) {
      return '[encrypted]';
    }
  }
};

const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

function useVoiceChat(roomId, myId, myName, db) {
  const [inVoice, setInVoice] = useState(false);
  const [voiceParticipants, setVoiceParticipants] = useState([]);
  const [isMuted, setIsMuted] = useState(false);
  const [audioError, setAudioError] = useState(null);

  const peersRef = useRef({});
  const streamRef = useRef(null);
  const audioEls = useRef({});
  const listenersRef = useRef([]);
  const mountedRef = useRef(true);

  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

  const bp = useCallback(() => 'rooms/' + roomId + '/voice', [roomId]);

  const cleanup = useCallback(() => {
    listenersRef.current.forEach(fn => fn());
    listenersRef.current = [];
    Object.values(peersRef.current).forEach(pc => pc.close());
    peersRef.current = {};
    Object.values(audioEls.current).forEach(el => { el.pause(); el.srcObject = null; el.remove(); });
    audioEls.current = {};
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  }, []);

  const addFBListener = useCallback((ref, event, cb) => {
    ref.on(event, cb);
    listenersRef.current.push(() => ref.off(event, cb));
  }, []);

  const createPeer = useCallback((remoteUid, isInitiator) => {
    if (peersRef.current[remoteUid]) return peersRef.current[remoteUid];
    const pc = new RTCPeerConnection(ICE_CONFIG);
    peersRef.current[remoteUid] = pc;

    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => pc.addTrack(t, streamRef.current));
    }

    pc.onicecandidate = (e) => {
      if (e.candidate) {
        db.ref(bp() + '/signals/' + myId + '_' + remoteUid).push({
          type: 'candidate', data: e.candidate.toJSON(), timestamp: Date.now()
        });
      }
    };

    pc.ontrack = (e) => {
      if (!audioEls.current[remoteUid]) {
        const el = document.createElement('audio');
        el.autoplay = true;
        el.style.display = 'none';
        document.body.appendChild(el);
        audioEls.current[remoteUid] = el;
      }
      audioEls.current[remoteUid].srcObject = e.streams[0];
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        pc.close();
        delete peersRef.current[remoteUid];
        if (audioEls.current[remoteUid]) { audioEls.current[remoteUid].pause(); audioEls.current[remoteUid].remove(); delete audioEls.current[remoteUid]; }
      }
    };

    if (isInitiator) {
      pc.createOffer().then(offer => {
        pc.setLocalDescription(offer);
        db.ref(bp() + '/signals/' + myId + '_' + remoteUid).push({
          type: 'offer', data: offer, timestamp: Date.now()
        });
      });
    }

    const sigRef = db.ref(bp() + '/signals/' + remoteUid + '_' + myId);
    const onSig = sigRef.on('child_added', async (snap) => {
      const msg = snap.val();
      if (!msg || !peersRef.current[remoteUid]) return;
      const peer = peersRef.current[remoteUid];
      try {
        if (msg.type === 'offer') {
          await peer.setRemoteDescription(new RTCSessionDescription(msg.data));
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          db.ref(bp() + '/signals/' + myId + '_' + remoteUid).push({
            type: 'answer', data: answer, timestamp: Date.now()
          });
        } else if (msg.type === 'answer') {
          if (peer.signalingState === 'have-local-offer') {
            await peer.setRemoteDescription(new RTCSessionDescription(msg.data));
          }
        } else if (msg.type === 'candidate') {
          if (peer.remoteDescription) {
            await peer.addIceCandidate(new RTCIceCandidate(msg.data));
          }
        }
      } catch (e) { console.warn('Signal error:', e); }
    });
    listenersRef.current.push(() => sigRef.off('child_added', onSig));
    return pc;
  }, [bp, myId, db]);

  const joinVoice = useCallback(async () => {
    if (inVoice || !db) return;
    setAudioError(null);
    try {
      streamRef.current = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      setAudioError('Microphone access denied. Check browser permissions.');
      return;
    }
    setInVoice(true);
    setIsMuted(false);

    const partRef = db.ref(bp() + '/participants/' + myId);
    partRef.set({ name: myName, joinedAt: Date.now() });
    partRef.onDisconnect().remove();

    const allPartRef = db.ref(bp() + '/participants');
    addFBListener(allPartRef, 'value', (snap) => {
      const val = snap.val() || {};
      if (mountedRef.current) setVoiceParticipants(Object.entries(val).map(([uid, d]) => ({ uid, name: d.name })));
    });

    const onAdded = allPartRef.on('child_added', (snap) => {
      const uid = snap.key;
      if (uid === myId || peersRef.current[uid]) return;
      createPeer(uid, myId < uid);
    });
    listenersRef.current.push(() => allPartRef.off('child_added', onAdded));

    const onRemoved = allPartRef.on('child_removed', (snap) => {
      const uid = snap.key;
      if (peersRef.current[uid]) { peersRef.current[uid].close(); delete peersRef.current[uid]; }
      if (audioEls.current[uid]) { audioEls.current[uid].pause(); audioEls.current[uid].remove(); delete audioEls.current[uid]; }
      db.ref(bp() + '/signals/' + uid + '_' + myId).remove();
      db.ref(bp() + '/signals/' + myId + '_' + uid).remove();
    });
    listenersRef.current.push(() => allPartRef.off('child_removed', onRemoved));
  }, [inVoice, myId, myName, db, bp, addFBListener, createPeer]);

  const leaveVoice = useCallback(() => {
    if (!inVoice || !db) return;
    db.ref(bp() + '/participants/' + myId).remove();
    db.ref(bp() + '/participants/' + myId).onDisconnect().cancel();
    Object.keys(peersRef.current).forEach(uid => {
      db.ref(bp() + '/signals/' + myId + '_' + uid).remove();
      db.ref(bp() + '/signals/' + uid + '_' + myId).remove();
    });
    cleanup();
    setInVoice(false);
    setVoiceParticipants([]);
    setIsMuted(false);
  }, [inVoice, myId, db, bp, cleanup]);

  const toggleMute = useCallback(() => {
    if (!streamRef.current) return;
    const newMuted = !isMuted;
    streamRef.current.getAudioTracks().forEach(t => { t.enabled = !newMuted; });
    setIsMuted(newMuted);
  }, [isMuted]);

  useEffect(() => {
    return () => {
      if (inVoice && db) {
        db.ref(bp() + '/participants/' + myId).remove();
        Object.keys(peersRef.current).forEach(uid => {
          db.ref(bp() + '/signals/' + myId + '_' + uid).remove();
          db.ref(bp() + '/signals/' + uid + '_' + myId).remove();
        });
      }
      cleanup();
    };
  }, [roomId]);

  return { inVoice, voiceParticipants, isMuted, joinVoice, leaveVoice, toggleMute, audioError };
}

function StudyRooms({ authUser, isAdmin }) {
  const [rooms, setRooms] = useState({});
  const [newRoomName, setNewRoomName] = useState('');
  const [activeRoom, setActiveRoom] = useState(null);
  const [chatMsg, setChatMsg] = useState('');
  const [chatMessages, setChatMessages] = useState([]);
  const [roomKey, setRoomKey] = useState(null); // encryption key for active room
  const [typing, setTyping] = useState({}); // typing indicators
  const chatEndRef = useRef(null);
  const myId = authUser ? authUser.uid : null;
  const myName = authUser ? (authUser.displayName || 'Anonymous') : '';

  // Voice chat hook
  const voice = useVoiceChat(activeRoom, myId, myName, firebaseDb);

  // Listen to rooms
  useEffect(() => {
    if (!firebaseDb) return;
    const ref = firebaseDb.ref('rooms');
    const onVal = ref.on('value', snap => setRooms(snap.val() || {}));
    return () => ref.off('value', onVal);
  }, []);

  // Load encryption key when entering a room
  useEffect(() => {
    if (!firebaseDb || !activeRoom) { setRoomKey(null); return; }
    const keyRef = firebaseDb.ref('rooms/' + activeRoom + '/encKey');
    keyRef.once('value').then(snap => {
      const k = snap.val();
      if (k) setRoomKey(k);
    });
  }, [activeRoom]);

  // Listen to chat in active room (decrypt messages)
  useEffect(() => {
    if (!firebaseDb || !activeRoom) { setChatMessages([]); return; }
    const ref = firebaseDb.ref('rooms/' + activeRoom + '/chat').orderByChild('timestamp').limitToLast(50);
    const onVal = ref.on('value', async (snap) => {
      const data = snap.val() || {};
      const msgs = Object.entries(data).map(([k, v]) => ({id: k, ...v})).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      // Decrypt messages if we have the key and messages are encrypted
      if (roomKey) {
        for (let m of msgs) {
          if (m.encrypted && m.text) {
            m.text = await RoomCrypto.decrypt(m.text, roomKey);
          }
        }
      }
      setChatMessages(msgs);
    });
    return () => ref.off('value', onVal);
  }, [activeRoom, roomKey]);

  // Auto-scroll chat
  useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [chatMessages]);

  // Typing indicator
  useEffect(() => {
    if (!firebaseDb || !activeRoom) return;
    const ref = firebaseDb.ref('rooms/' + activeRoom + '/typing');
    const onVal = ref.on('value', snap => setTyping(snap.val() || {}));
    return () => ref.off('value', onVal);
  }, [activeRoom]);

  const setMyTyping = useCallback((isTyping) => {
    if (!firebaseDb || !activeRoom || !myId) return;
    if (isTyping) {
      firebaseDb.ref('rooms/' + activeRoom + '/typing/' + myId).set({ name: myName, t: Date.now() });
      firebaseDb.ref('rooms/' + activeRoom + '/typing/' + myId).onDisconnect().remove();
    } else {
      firebaseDb.ref('rooms/' + activeRoom + '/typing/' + myId).remove();
    }
  }, [activeRoom, myId, myName]);

  const createRoom = async () => {
    if (!newRoomName.trim() || !firebaseDb) return;
    const roomId = 'room_' + Date.now();
    // Generate encryption key for the room
    const encKey = await RoomCrypto.generateRoomKey();
    firebaseDb.ref('rooms/' + roomId).set({
      name: newRoomName.trim(),
      createdBy: myName,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      encKey: encKey,
      members: {[myId]: {name: myName, joinedAt: firebase.database.ServerValue.TIMESTAMP}}
    });
    setNewRoomName('');
    setRoomKey(encKey);
    setActiveRoom(roomId);
  };

  const joinRoom = (roomId) => {
    if (!firebaseDb || !myId) return;
    // Check if room is locked (non-admins blocked)
    firebaseDb.ref('rooms/' + roomId + '/locked').once('value', snap => {
      if (snap.val() && !isAdmin) {
        alert('This room is locked by an admin.');
        return;
      }
      firebaseDb.ref('rooms/' + roomId + '/members/' + myId).set({name: myName, joinedAt: firebase.database.ServerValue.TIMESTAMP});
      setActiveRoom(roomId);
    });
  };

  const leaveRoom = (roomId) => {
    if (!firebaseDb || !myId) return;
    // Leave voice first if in it
    if (voice.inVoice) voice.leaveVoice();
    firebaseDb.ref('rooms/' + roomId + '/members/' + myId).remove();
    firebaseDb.ref('rooms/' + roomId + '/typing/' + myId).remove();
    if (activeRoom === roomId) { setActiveRoom(null); setRoomKey(null); }
  };

  const sendChat = async () => {
    if (!chatMsg.trim() || !firebaseDb || !activeRoom) return;
    setMyTyping(false);
    const msgText = chatMsg.trim();
    setChatMsg('');
    // Encrypt if we have a room key
    if (roomKey) {
      const encrypted = await RoomCrypto.encrypt(msgText, roomKey);
      firebaseDb.ref('rooms/' + activeRoom + '/chat').push({
        uid: myId, username: myName, text: encrypted, encrypted: true,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });
    } else {
      firebaseDb.ref('rooms/' + activeRoom + '/chat').push({
        uid: myId, username: myName, text: msgText,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });
    }
  };

  const roomList = Object.entries(rooms).map(([id, r]) => ({id, ...r}));
  const activeRoomData = activeRoom ? rooms[activeRoom] : null;
  const activeMembers = activeRoomData ? Object.entries(activeRoomData.members || {}).map(([uid, m]) => ({uid, ...m})) : [];

  const timeAgo = (ts) => {
    if (!ts) return '';
    const mins = Math.floor((Date.now() - ts) / 60000);
    if (mins < 1) return 'now';
    if (mins < 60) return mins + 'm';
    return Math.floor(mins / 60) + 'h';
  };

  // Typing indicator text
  const typingUsers = Object.entries(typing).filter(([uid]) => uid !== myId).map(([uid, d]) => d.name);
  const typingText = typingUsers.length === 0 ? null : typingUsers.length === 1 ? typingUsers[0] + ' is typing...' : typingUsers.slice(0, 2).join(', ') + ' are typing...';

  // Active room view
  if (activeRoom && activeRoomData) {
    return React.createElement('div', null,
      React.createElement('div', {style:{display:'flex', alignItems:'center', gap:12, marginBottom:12}},
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>{if(voice.inVoice) voice.leaveVoice(); setActiveRoom(null);}}, '\u2190 Back'),
        React.createElement('h2', {style:{flex:1, margin:0}}, activeRoomData.name),
        roomKey && React.createElement('span', {style:{fontSize:'0.75rem', color:'var(--green)', display:'flex', alignItems:'center', gap:4}}, '\uD83D\uDD12 Encrypted'),
        React.createElement('span', {style:{fontSize:'0.85rem', color:'var(--green)'}}, activeMembers.length + ' in room')
      ),

      // Admin toolbar
      isAdmin && React.createElement('div', {style:{display:'flex', gap:6, flexWrap:'wrap', marginBottom:8, padding:'8px 12px', background:'rgba(99,102,241,0.08)', borderRadius:8, border:'1px solid rgba(99,102,241,0.2)'}},
        React.createElement('span', {style:{fontSize:'0.8rem', color:'var(--accent)', fontWeight:600, marginRight:4}}, '\uD83D\uDD12 Admin:'),
        React.createElement('button', {className:'btn btn-outline btn-sm', style:{fontSize:'0.75rem', padding:'3px 8px'},
          onClick:()=>firebaseDb.ref('rooms/' + activeRoom + '/locked').set(!(activeRoomData.locked || false))},

function FlashcardHub({ progress, setProgress }) {
  const [decks, setDecks] = useState(progress.flashcardDecks || []);
  const [view, setView] = useState('list'); // 'list' | 'create' | 'import' | 'study'
  const [activeDeckIdx, setActiveDeckIdx] = useState(null);
  const [editDeck, setEditDeck] = useState({name:'', description:'', cards:[]});
  const [importText, setImportText] = useState('');
  const [importName, setImportName] = useState('');

  // Persist decks to progress
  const saveDecks = (newDecks) => {
    setDecks(newDecks);
    setProgress(p => ({...p, flashcardDecks: newDecks}));
  };

  // CREATE DECK
  const addCard = () => setEditDeck(d => ({...d, cards:[...d.cards, {term:'', definition:''}]}));
  const updateCard = (i, field, val) => setEditDeck(d => {
    const cards = [...d.cards];
    cards[i] = {...cards[i], [field]: val};
    return {...d, cards};
  });
  const removeCard = (i) => setEditDeck(d => ({...d, cards: d.cards.filter((_, idx) => idx !== i)}));

  const saveDeck = () => {
    if (!editDeck.name.trim() || editDeck.cards.length === 0) return;
    const validCards = editDeck.cards.filter(c => c.term.trim() && c.definition.trim());
    if (validCards.length === 0) return;
    const deck = {
      id: 'deck_' + Date.now(),
      name: editDeck.name.trim(),
      description: editDeck.description.trim(),
      cards: validCards,
      createdAt: Date.now(),
      studied: 0
    };
    saveDecks([...decks, deck]);
    setEditDeck({name:'', description:'', cards:[]});
    setView('list');
  };

  // IMPORT
  const handleImport = () => {
    if (!importText.trim()) return;
    const lines = importText.trim().split('\n').filter(l => l.trim());
    const cards = [];
    for (const line of lines) {
      // Try tab-separated first (Quizlet export), then semicolon, then comma
      let parts = line.split('\t');
      if (parts.length < 2) parts = line.split(';');
      if (parts.length < 2) parts = line.split(',');
      if (parts.length >= 2) {
        cards.push({term: parts[0].trim(), definition: parts.slice(1).join(',').trim()});
      }
    }
    if (cards.length === 0) return;
    const deck = {
      id: 'deck_' + Date.now(),
      name: importName.trim() || 'Imported Deck',
      description: 'Imported ' + cards.length + ' cards',
      cards,
      createdAt: Date.now(),
      studied: 0
    };
    saveDecks([...decks, deck]);
    setImportText('');
    setImportName('');
    setView('list');
  };

  const deleteDeck = (idx) => {
    if (!confirm('Delete this deck and all its cards?')) return;
    saveDecks(decks.filter((_, i) => i !== idx));
  };

  // STUDY MODE
  if (view === 'study' && activeDeckIdx !== null && decks[activeDeckIdx]) {
    return React.createElement(FlashcardStudy, {
      deck: decks[activeDeckIdx],
      onBack: () => { setView('list'); setActiveDeckIdx(null); },
      onComplete: () => {
        const updated = [...decks];
        updated[activeDeckIdx] = {...updated[activeDeckIdx], studied: (updated[activeDeckIdx].studied || 0) + 1, lastStudied: Date.now()};
        saveDecks(updated);
        setView('list');
        setActiveDeckIdx(null);
      }
    });
  }

  // CREATE VIEW
  if (view === 'create') {
    return React.createElement('div', null,
      React.createElement('div', {style:{display:'flex', alignItems:'center', gap:12, marginBottom:16}},
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setView('list')}, '\u2190 Back'),
        React.createElement('h2', null, 'Create Deck')
      ),
      React.createElement('input', {type:'text', placeholder:'Deck name', value:editDeck.name, maxLength:50, style:{marginBottom:8},
        onChange:e=>setEditDeck(d=>({...d, name:e.target.value}))}),
      React.createElement('input', {type:'text', placeholder:'Description (optional)', value:editDeck.description, maxLength:100, style:{marginBottom:16},
        onChange:e=>setEditDeck(d=>({...d, description:e.target.value}))}),
      editDeck.cards.map((c, i) =>
        React.createElement('div', {key:i, style:{display:'flex', gap:8, marginBottom:8, alignItems:'center'}},
          React.createElement('input', {type:'text', placeholder:'Term', value:c.term, style:{flex:1},
            onChange:e=>updateCard(i, 'term', e.target.value)}),
          React.createElement('input', {type:'text', placeholder:'Definition', value:c.definition, style:{flex:2},
            onChange:e=>updateCard(i, 'definition', e.target.value)}),
          React.createElement('button', {className:'btn btn-outline btn-sm', style:{color:'var(--red)', padding:'6px 10px'}, onClick:()=>removeCard(i)}, '\u2715')
        )
      ),
      React.createElement('div', {style:{display:'flex', gap:8, marginTop:8}},
        React.createElement('button', {className:'btn btn-outline', onClick:addCard}, '+ Add Card'),
        editDeck.cards.length > 0 && React.createElement('button', {className:'btn btn-primary', onClick:saveDeck}, 'Save Deck (' + editDeck.cards.filter(c=>c.term.trim()&&c.definition.trim()).length + ' cards)')
      )
    );
  }

  // IMPORT VIEW
  if (view === 'import') {
    return React.createElement('div', null,
      React.createElement('div', {style:{display:'flex', alignItems:'center', gap:12, marginBottom:16}},
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setView('list')}, '\u2190 Back'),
        React.createElement('h2', null, 'Import Flashcards')
      ),
      React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:12}}, 'Paste exported data from Quizlet (tab-separated) or Anki (semicolon/comma-separated). One card per line: term[tab]definition'),
      React.createElement('input', {type:'text', placeholder:'Deck name', value:importName, maxLength:50, style:{marginBottom:8},
        onChange:e=>setImportName(e.target.value)}),
      React.createElement('textarea', {placeholder:'Paste your cards here...\nterm1\\tdefinition1\nterm2\\tdefinition2', value:importText,
        style:{width:'100%', minHeight:200, padding:12, background:'var(--bg)', border:'2px solid var(--surface2)', borderRadius:8, color:'var(--text)', fontSize:'0.9rem', fontFamily:'monospace', resize:'vertical'},
        onChange:e=>setImportText(e.target.value)}),
      React.createElement('div', {style:{marginTop:8, fontSize:'0.85rem', color:'var(--text3)'}},
        importText.trim() ? importText.trim().split('\n').filter(l=>l.trim()).length + ' lines detected' : 'Supports: Quizlet export, Anki export, any tab/semicolon/comma separated format'
      ),
      React.createElement('button', {className:'btn btn-primary', style:{marginTop:12}, onClick:handleImport,
        disabled:!importText.trim()}, 'Import Cards')
    );
  }

  // DECK LIST VIEW
  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:4}}, '\uD83D\uDCDD Flashcards'),
    React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:16}}, 'Create your own decks or import from Quizlet/Anki.'),
    React.createElement('div', {style:{display:'flex', gap:8, marginBottom:20}},
      React.createElement('button', {className:'btn btn-primary', onClick:()=>{setEditDeck({name:'',description:'',cards:[{term:'',definition:''}]}); setView('create');}}, '+ Create Deck'),
      React.createElement('button', {className:'btn btn-outline', onClick:()=>setView('import')}, '\u2B07 Import')
    ),
    decks.length === 0
      ? React.createElement('div', {style:{textAlign:'center', padding:40, color:'var(--text3)'}},
          React.createElement('div', {style:{fontSize:'2rem', marginBottom:8}}, '\uD83D\uDCDD'),
          'No decks yet. Create one or import from Quizlet!'
        )
      : decks.map((deck, i) =>
          React.createElement('div', {key:deck.id, className:'card', style:{display:'flex', alignItems:'center', gap:12, cursor:'pointer'}, onClick:()=>{setActiveDeckIdx(i); setView('study');}},
            React.createElement('div', {style:{flex:1}},
              React.createElement('div', {style:{fontWeight:700, fontSize:'1.05rem', marginBottom:2}}, deck.name),
              React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--text3)'}},
                deck.cards.length + ' cards \u2022 Studied ' + (deck.studied || 0) + 'x' +
                (deck.lastStudied ? ' \u2022 Last: ' + new Date(deck.lastStudied).toLocaleDateString() : '')
              ),
              deck.description && React.createElement('div', {style:{fontSize:'0.8rem', color:'var(--text3)', marginTop:2}}, deck.description)
            ),
            React.createElement('button', {className:'btn btn-outline btn-sm', style:{color:'var(--red)'}, onClick:e=>{e.stopPropagation(); deleteDeck(i);}}, '\uD83D\uDDD1\uFE0F')
          )
        )
  );
}

function FlashcardStudy({ deck, onBack, onComplete }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState([]);
  const [unknown, setUnknown] = useState([]);
  const cards = deck.cards;
  const current = cards[idx];

  if (idx >= cards.length) {
    // Summary
    return React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'3rem', marginBottom:12}}, '\uD83C\uDF89'),
      React.createElement('h2', null, 'Deck Complete!'),
      React.createElement('p', {style:{color:'var(--text2)', marginTop:8, marginBottom:16}}, deck.name + ' \u2022 ' + cards.length + ' cards'),
      React.createElement('div', {style:{display:'flex', justifyContent:'center', gap:24, marginBottom:24}},
        React.createElement('div', {style:{textAlign:'center'}},
          React.createElement('div', {style:{fontSize:'2rem', fontWeight:700, color:'var(--green)'}}, known.length),
          React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--text3)'}}, 'Knew it')
        ),
        React.createElement('div', {style:{textAlign:'center'}},
          React.createElement('div', {style:{fontSize:'2rem', fontWeight:700, color:'var(--red)'}}, unknown.length),
          React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--text3)'}}, 'Review again')
        )
      ),
      React.createElement('div', {style:{display:'flex', gap:8, justifyContent:'center'}},
        unknown.length > 0 && React.createElement('button', {className:'btn btn-outline', onClick:()=>{setIdx(0); setFlipped(false); setKnown([]); setUnknown([]);}}, 'Study Again'),
        React.createElement('button', {className:'btn btn-primary', onClick:onComplete}, 'Done')
      )
    );
  }

  const markKnown = () => { setKnown(k=>[...k, idx]); setFlipped(false); setIdx(i=>i+1); };
  const markUnknown = () => { setUnknown(k=>[...k, idx]); setFlipped(false); setIdx(i=>i+1); };

  return React.createElement('div', null,
    React.createElement('div', {style:{display:'flex', alignItems:'center', gap:12, marginBottom:16}},
      React.createElement('button', {className:'btn btn-outline btn-sm', onClick:onBack}, '\u2190 Back'),
      React.createElement('h2', {style:{flex:1}}, deck.name),
      React.createElement('span', {style:{color:'var(--text3)', fontSize:'0.9rem'}}, (idx + 1) + ' / ' + cards.length)
    ),
    // Progress bar
    React.createElement('div', {style:{height:4, background:'var(--surface2)', borderRadius:2, marginBottom:20, overflow:'hidden'}},
      React.createElement('div', {style:{height:'100%', width:Math.round((idx / cards.length) * 100) + '%', background:'linear-gradient(90deg, var(--accent), var(--green))', transition:'width 0.3s'}})
    ),
    // Card
    React.createElement('div', {onClick:()=>setFlipped(f=>!f), style:{background:'var(--surface)', borderRadius:16, padding:40, minHeight:200, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', border:'2px solid ' + (flipped ? 'var(--green)' : 'var(--surface2)'), textAlign:'center', transition:'border-color 0.2s'}},
      React.createElement('div', null,
        React.createElement('div', {style:{fontSize:'0.75rem', color:'var(--text3)', marginBottom:8, textTransform:'uppercase', letterSpacing:1}}, flipped ? 'Definition' : 'Term'),
        React.createElement('div', {style:{fontSize: flipped ? '1.1rem' : '1.4rem', fontWeight: flipped ? 400 : 700, color: flipped ? 'var(--text2)' : 'var(--text)', lineHeight:1.5}},
          flipped ? current.definition : current.term
        ),
        !flipped && React.createElement('div', {style:{fontSize:'0.8rem', color:'var(--text3)', marginTop:12}}, 'Tap to reveal')
      )
    ),
    // Actions
    flipped && React.createElement('div', {style:{display:'flex', gap:12, justifyContent:'center', marginTop:20}},
      React.createElement('button', {className:'btn', style:{background:'rgba(239,68,68,0.15)', color:'var(--red)', padding:'12px 32px', fontSize:'1rem'}, onClick:markUnknown}, '\u274C Don\'t know'),
      React.createElement('button', {className:'btn', style:{background:'rgba(34,197,94,0.15)', color:'var(--green)', padding:'12px 32px', fontSize:'1rem'}, onClick:markKnown}, '\u2705 Got it')
    )
  );
}

function Leaderboard({ authUser }) {
  const [board, setBoard] = useState([]);
  const [sortBy, setSortBy] = useState('accuracy'); // 'accuracy' | 'streak' | 'questions'
  const myId = authUser ? authUser.uid : null;

  useEffect(() => {
    if (!firebaseDb) return;
    firebaseDb.ref('userStats').once('value', snap => {
      const data = snap.val() || {};
      setBoard(Object.entries(data).map(([uid, s]) => ({uid, ...s})));
    });
  }, []);

  const sorted = [...board].filter(u => (u.totalAttempts || 0) > 0).sort((a, b) => {
    if (sortBy === 'accuracy') return (b.accuracy || 0) - (a.accuracy || 0);
    if (sortBy === 'streak') return (b.studyStreak || 0) - (a.studyStreak || 0);
    return (b.questionsAttempted || 0) - (a.questionsAttempted || 0);
  });

  const medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];

  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:4}}, '\uD83C\uDFC6 Leaderboard'),
    React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:16}}, 'See how you stack up against your classmates.'),
    React.createElement('div', {style:{display:'flex', gap:8, marginBottom:16}},
      ['accuracy', 'streak', 'questions'].map(s =>
        React.createElement('button', {key:s, className:'btn ' + (sortBy===s ? 'btn-primary' : 'btn-outline') + ' btn-sm',
          onClick:()=>setSortBy(s)},
          s === 'accuracy' ? '\uD83C\uDFAF Accuracy' : s === 'streak' ? '\uD83D\uDD25 Streak' : '\uD83D\uDCDA Questions'
        )
      )
    ),
    sorted.length === 0
      ? React.createElement('div', {style:{textAlign:'center', padding:40, color:'var(--text3)'}}, 'No data yet. Start studying to appear on the leaderboard!')
      : sorted.map((u, i) => {
          const isMe = u.uid === myId;
          return React.createElement('div', {key:u.uid, style:{display:'flex', alignItems:'center', gap:12, padding:'12px 16px', background: isMe ? 'rgba(59,130,246,0.1)' : (i % 2 === 0 ? 'var(--surface)' : 'transparent'), borderRadius:10, marginBottom:4}},
            React.createElement('span', {style:{width:30, textAlign:'center', fontSize: i < 3 ? '1.2rem' : '0.9rem', fontWeight:700, color:'var(--text3)'}}, i < 3 ? medals[i] : (i + 1)),
            React.createElement('div', {style:{flex:1}},
              React.createElement('div', {style:{fontWeight:600, color: isMe ? 'var(--accent)' : 'var(--text)'}}, (u.username || 'Anonymous') + (isMe ? ' (you)' : '')),
              React.createElement('div', {style:{fontSize:'0.8rem', color:'var(--text3)'}},
                (u.questionsAttempted || 0) + ' questions \u2022 ' + (u.testsCompleted || 0) + ' tests'
              )
            ),

const ce = React.createElement;

const SOLVE_METHODS = [
  { id:'formula', name:'Formula Method', type:'formula', description:'Use D/H x Q or the standard formula for each problem type', icon:'\uD83D\uDCD0' },
  { id:'dimensional_analysis', name:'Dimensional Analysis', type:'dimensional_analysis', description:'Train-track / factor-label method: chain conversion fractions', icon:'\uD83D\uDE82' },
  { id:'ratio_proportion', name:'Ratio & Proportion', type:'ratio_proportion', description:'H:Q :: D:X \u2014 set up proportion, cross-multiply, solve', icon:'\u2696\uFE0F' }
];

const FORMULA_VARS = {D:'Desired/Ordered dose',H:'Have/On Hand',Q:'Quantity/Volume',W:'Weight (kg)',W_lb:'Weight (lbs)',C:'Concentration',V:'Volume',T:'Time',DF:'Drop Factor'};

function safeEval(expr, vars) {
  let s = String(expr).trim();
  const allowed = Object.keys(vars);
  allowed.sort((a,b) => b.length - a.length).forEach(k => {
    s = s.replace(new RegExp('\\b' + k.replace('_','_') + '\\b', 'g'), String(vars[k]));
  });
  if (/[a-zA-Z_]/.test(s)) return NaN;
  if (!/^[\d\s+\-*/().]+$/.test(s)) return NaN;
  try { return new Function('return ' + s)(); } catch(e) { return NaN; }
}

function pNum(v) { return parseFloat(String(v).replace(/,/g,'')); }

function generateDASteps(question) {
  const q = question, s = q.steps;
  if (!s || !s.length) return [];
  const f = q.formula;

  if (f === 'weight-based-dose') {
    const steps = [];
    const hasLbConvert = s.find(st => /lbs?\s*(to|.*kg)/i.test(st.label) || /convert.*kg/i.test(st.label));
    if (hasLbConvert) {
      const lbs = pNum(hasLbConvert.hint.split(/[\u00f7\/]/)[0]);
      const kg = pNum(hasLbConvert.answer);
      steps.push({ label:'Convert weight', numerator: lbs + ' lb', denominator:'1', result: kg + ' kg', resultUnit:'kg',
        hint: lbs + ' lb \u00D7 (1 kg / 2.2 lb) = ' + kg + ' kg', numerator2:'1 kg', denominator2:'2.2 lb' });
    }
    const calcStep = s.find(st => /total|calculate|multiply/i.test(st.label));
    if (calcStep) {
      const ans = pNum(calcStep.answer);
      const parts = calcStep.hint.replace(/[\u00d7x]/gi,'*').split('*').map(p=>p.trim());
      steps.push({ label:'Apply dose rate', numerator: (parts[0]||'').trim(), denominator:'1', result: ans + ' ' + calcStep.unit, resultUnit: calcStep.unit,
        hint: calcStep.hint.replace(/\u00d7/g,'\u00D7') + ' = ' + ans + ' ' + calcStep.unit,
        numerator2: parts[0], denominator2: '1 ' + (steps.length ? steps[steps.length-1].resultUnit : 'kg') });
    }
    const convertStep = s.find(st => /convert.*m[cg]/i.test(st.label));
    if (convertStep) {
      const ans = pNum(convertStep.answer);
      steps.push({ label:'Convert units', numerator:'1 ' + convertStep.unit, denominator:'1000 mcg', result: ans + ' ' + convertStep.unit, resultUnit: convertStep.unit,
        hint: convertStep.hint + ' = ' + ans + ' ' + convertStep.unit, numerator2:'1 mg', denominator2:'1000 mcg' });
    }
    if (steps.length) return steps;
  }

  if (f === 'desired-over-have') {
    const steps = [];
    s.forEach((st,i) => {
      const ans = pNum(st.answer);
      steps.push({ label: st.label, numerator: st.hint.split(/[\u00f7\/\u00d7x*]/i)[0].trim(), denominator: (st.hint.split(/[\u00f7\/\u00d7x*]/i)[1]||'1').trim(),
        result: ans + ' ' + st.unit, resultUnit: st.unit, hint: st.hint + ' = ' + ans + ' ' + st.unit,
        numerator2: st.hint.split(/[\u00f7\/\u00d7x*]/i)[0].trim(), denominator2: (st.hint.split(/[\u00f7\/\u00d7x*]/i)[1]||'1').trim() });
    });
    return steps;
  }

  if (f === 'iv-ml-hr' || f === 'gtt-min' || f === 'heparin-infusion' || f === 'mcg-kg-min' || f === 'daily-dose-divided' || f === 'weight-conversion') {
    return s.map(st => {
      const parts = st.hint.replace(/[\u00d7x]/gi,'*').replace(/\u00f7/g,'/').split(/[*/]/).map(p=>p.trim());
      return { label: st.label, numerator: parts[0] || st.hint, denominator: parts[1] || '1',
        result: pNum(st.answer) + ' ' + st.unit, resultUnit: st.unit,
        hint: st.hint + ' = ' + st.answer + ' ' + st.unit,
        numerator2: parts[0] || '', denominator2: parts[1] || '1' };
    });
  }

  return s.map(st => ({
    label: st.label, numerator: st.hint, denominator:'1',
    result: st.answer + ' ' + st.unit, resultUnit: st.unit,
    hint: st.hint + ' = ' + st.answer + ' ' + st.unit,
    numerator2: st.hint, denominator2:'1'
  }));
}

function generateRPSteps(question) {
  const q = question, s = q.steps;
  if (!s || !s.length) return [];

  if (q.formula === 'desired-over-have' && s.length >= 1) {
    const finalStep = s[s.length - 1];
    const ans = pNum(finalStep.answer);
    return [
      { label:'Set up proportion', proportion:'H : Q :: D : X', math:'Known ratio equals desired ratio', answer:'', unit:'', hint:'H = Have, Q = Quantity, D = Desired dose' },
      { label:'Cross multiply', proportion:'H \u00D7 X = Q \u00D7 D', math: finalStep.hint, answer:'', unit:'', hint:'Multiply the means and extremes' },
      { label:'Solve for X', proportion:'X = ' + finalStep.hint, math: finalStep.hint + ' = ' + ans, answer: String(ans), unit: finalStep.unit, hint: 'X = ' + ans + ' ' + finalStep.unit }
    ];
  }

  return s.map((st, i) => {
    const ans = pNum(st.answer);
    return { label: st.label, proportion: st.hint.replace(/[\u00f7\/]/g,' : ').replace(/[\u00d7x*]/gi,' :: '),
      math: st.hint + ' = ' + ans, answer: String(ans), unit: st.unit, hint: st.hint };
  });
}

function StepByStepSolver({ question, progress, customFormulas, onStepCheck, onComplete }) {
  const [method, setMethod] = useState('formula');
  const [activeStep, setActiveStep] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [showHints, setShowHints] = useState({});
  const [completed, setCompleted] = useState(false);

  const stepsForMethod = useMemo(() => {
    if (method === 'formula') return question.steps || [];
    if (method === 'dimensional_analysis') return generateDASteps(question);
    if (method === 'ratio_proportion') return generateRPSteps(question);
    const cf = (customFormulas || []).find(c => c.id === method);
    if (cf) {
      return cf.steps.map(s => {
        const vars = {};
        (question.steps || []).forEach(qs => { const v = pNum(qs.answer); if (!isNaN(v)) vars['step' + qs.unit] = v; });
        const result = s.math ? safeEval(s.math, vars) : NaN;
        return { label: s.label, hint: s.math || '', answer: isNaN(result) ? '' : String(Math.round(result*1000)/1000), unit: s.unit };
      });
    }
    return question.steps || [];
  }, [method, question]);

  useEffect(() => { setActiveStep(0); setStepInputs({}); setStepStatus({}); setShowHints({}); setCompleted(false); }, [method, question.id]);

  function checkStep(i) {
    const step = stepsForMethod[i];
    if (!step) return;
    const userVal = (stepInputs[i] || '').trim();
    const expected = step.answer || (step.result ? String(pNum(step.result)) : '');
    if (!expected) { setStepStatus(p => ({...p, [i]:'correct'})); advance(i); return; }
    const userNum = pNum(userVal);
    const expNum = pNum(expected);
    const isCorrect = !isNaN(userNum) && !isNaN(expNum) && Math.abs(userNum - expNum) < (expNum * 0.02 + 0.5);
    if (isCorrect) {
      setStepStatus(p => ({...p, [i]:'correct'}));
      if (onStepCheck) onStepCheck(i, true);
      advance(i);
    } else {
      setStepStatus(p => ({...p, [i]:'wrong'}));
      if (onStepCheck) onStepCheck(i, false);
    }
  }

  function advance(i) {
    if (i >= stepsForMethod.length - 1) { setCompleted(true); if (onComplete) onComplete(); }
    else { setActiveStep(i + 1); }
  }

  function showAnswer(i) {
    const step = stepsForMethod[i];
    const ans = step.answer || (step.result ? String(pNum(step.result)) : '');
    setStepInputs(p => ({...p, [i]: ans}));
  }

  const methodVis = method === 'dimensional_analysis'
    ? ce(DATrainTrack, { steps: stepsForMethod, activeStep })
    : method === 'ratio_proportion'
    ? ce(RPDisplay, { steps: stepsForMethod, activeStep })
    : null;

  return ce('div', null,
    ce('div', {style:{marginBottom:12}},
      ce('div', {style:{fontSize:'0.8rem', color:'var(--text3)', marginBottom:6, fontWeight:600}}, 'SOLVE METHOD'),
      ce(MethodSelector, { currentMethod: method, onSelect: setMethod, customFormulas })
    ),
    methodVis,
    ce('div', null,
      stepsForMethod.map((s, i) => {
        const status = stepStatus[i];
        const isActive = i === activeStep && !completed;
        const isLocked = i > activeStep && !completed;
        const lbl = s.label || ('Step ' + (i+1));
        const unitStr = s.unit || s.resultUnit || '';
        const hintStr = s.hint || '';
        const ansStr = s.answer || (s.result ? String(pNum(s.result)) : '');

        return ce('div', { key: method + '-' + i, className:'step' + (status === 'correct' ? ' completed' : status === 'wrong' ? ' wrong' : isActive ? ' active' : ''),
          style: isLocked ? {opacity:0.4} : {} },
          ce('div', { className:'step-header' },
            ce('div', { className:'step-num' }, status === 'correct' ? '\u2713' : i+1),
            ce('span', { className:'step-label' }, lbl)
          ),
          !isLocked && ce(React.Fragment, null,
            ansStr && ce('div', { className:'step-input-row' },
              ce('input', { type:'text', placeholder:'Your answer...', value: stepInputs[i] || '',
                onChange: e => setStepInputs(p => ({...p, [i]: e.target.value})),
                onKeyDown: e => { if (e.key === 'Enter') checkStep(i); },
                disabled: status === 'correct'
              }),
              unitStr && ce('span', { style:{color:'var(--text3)', fontSize:'0.85rem', whiteSpace:'nowrap'} }, unitStr),
              status !== 'correct' && ce('button', { className:'btn btn-primary btn-sm', onClick:()=>checkStep(i) }, 'Check')
            ),
            !ansStr && status !== 'correct' && ce('div', { style:{fontSize:'0.85rem', color:'var(--text2)', marginTop:4} }, hintStr),
            ce('div', { style:{display:'flex', gap:8, marginTop:6} },
              !showHints[i] && status !== 'correct' && hintStr && ansStr && ce('button', { className:'btn btn-outline btn-sm', onClick:()=>setShowHints(p=>({...p,[i]:true})) }, 'Show Hint'),
              status === 'wrong' && ansStr && ce('button', { className:'btn btn-outline btn-sm', onClick:()=>showAnswer(i) }, 'Show Answer')
            ),
            showHints[i] && hintStr && ce('div', { className:'step-hint' }, '\uD83D\uDCA1 ', hintStr),
            status === 'correct' && ce('div', { className:'step-feedback correct' }, '\u2713 Correct!'),
            status === 'wrong' && ce('div', { className:'step-feedback incorrect' }, '\u2717 Not quite. Try again or show hint.')
          )
        );
      })
    ),
    completed && ce('div', { style:{textAlign:'center', padding:'20px 0'} },
      ce('div', { style:{fontSize:'1.5rem', marginBottom:8} }, '\uD83C\uDF89'),
      ce('p', { style:{fontWeight:700, color:'var(--green)', marginBottom:8} }, 'Problem Complete!'),
      ce('p', { style:{fontSize:'0.85rem', color:'var(--text2)'} }, 'Solved using: ', (SOLVE_METHODS.find(m=>m.id===method)||{name:method}).name)
    )
  );
}

// Highlight rendering: takes question text + phrase arrays, returns React elements
function renderHighlightedText(text, keyPhrases, trapPhrases, convertPhrases) {
  if (!keyPhrases && !trapPhrases && !convertPhrases) return text;
  const allPhrases = [];
  (keyPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'key'}));
  (trapPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'trap'}));
  (convertPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'convert'}));
  // Sort longest first so longer matches take priority
  allPhrases.sort((a, b) => b.phrase.length - a.phrase.length);

  // Build a list of {start, end, type} ranges, no overlaps
  const ranges = [];
  const used = new Array(text.length).fill(false);
  allPhrases.forEach(({phrase, type}) => {
    let searchFrom = 0;
    while (true) {
      const idx = text.indexOf(phrase, searchFrom);
      if (idx === -1) break;
      const end = idx + phrase.length;
      // Check overlap
      let overlap = false;
      for (let i = idx; i < end; i++) { if (used[i]) { overlap = true; break; } }
      if (!overlap) {
        ranges.push({start:idx, end, type});
        for (let i = idx; i < end; i++) used[i] = true;
      }
      searchFrom = idx + 1;
    }
  });
  ranges.sort((a, b) => a.start - b.start);

  const parts = [];
  let cursor = 0;
  ranges.forEach((r, i) => {
    if (r.start > cursor) parts.push(React.createElement('span', {key:'n'+i}, text.slice(cursor, r.start)));
    parts.push(React.createElement('span', {key:'h'+i, className:'hl-' + r.type}, text.slice(r.start, r.end)));
    cursor = r.end;
  });
  if (cursor < text.length) parts.push(React.createElement('span', {key:'end'}, text.slice(cursor)));
  return parts;
}

// ============================
function TestMode({ progress, setProgress }) {
  const [started, setStarted] = useState(false);
  const [numQ, setNumQ] = useState(10);
  const [timeLimit, setTimeLimit] = useState(30);
  const [filter, setFilter] = useState('All');
  const [testPool, setTestPool] = useState('all'); // 'all', 'original', 'extra'
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);
  const [showExplanation, setShowExplanation] = useState({});

  useEffect(() => {
    if (!started || submitted) return;
    if (timeLeft <= 0) { setSubmitted(true); return; }
    const t = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, started, submitted]);

  const startTest = () => {
    let pool = QUESTIONS.filter(q => filter === 'All' || q.category === filter);
    if (testPool === 'original') pool = pool.filter(q => !q.practiceSet);
    else if (testPool === 'extra') pool = pool.filter(q => q.practiceSet === 'extra');
    const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, numQ);
    setQuestions(shuffled);
    setCurrent(0);
    setAnswers({});
    setSubmitted(false);
    setTimeLeft(timeLimit * 60);
    setShowExplanation({});
    setStarted(true);
  };

  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
  };

  const selectAnswer = (qId, val) => {
    if (submitted) return;
    setAnswers(p => ({...p, [qId]: val}));
  };

  const checkAnswer = (q, ans) => {
    if (ans === undefined || ans === null || ans === '') return false;
    if (q.type === 'mc') return ans === q.correct;
    const numAns = parseFloat(ans);
    const numCorrect = parseFloat(q.correct);
    if (isNaN(numAns)) return false;
    return Math.abs(numAns - numCorrect) < (Math.abs(numCorrect) * 0.02 + 0.3);
  };

  const score = questions.reduce((acc, q) => acc + (checkAnswer(q, answers[q.id]) ? 1 : 0), 0);

  // Save test results when submitted
  useEffect(() => {
    if (!submitted || questions.length === 0) return;
    const details = questions.map(q => ({qId:q.id, correct:checkAnswer(q, answers[q.id]), userAnswer:answers[q.id]}));
    const pct = Math.round(score / questions.length * 100);
    const timeUsed = formatTime(timeLimit * 60 - timeLeft);
    setProgress(p => {
      let updated = {...p};
      // Record each question attempt
      details.forEach(d => { updated = recordAttempt(updated, d.qId, d.correct); });
      // Add to test history
      const hist = [...(updated.testHistory || []), {date:Date.now(), score, total:questions.length, pct, category:filter, timeUsed, details}];
      return {...updated, testHistory: hist};
    });
  }, [submitted]);

  // Setup screen
  if (!started) {
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Test Mode'),
      React.createElement('div', {className:'card'},
