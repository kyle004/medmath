<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedMaster</title>
<meta name="app-version" content="1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --accent: #3b82f6; --accent2: #8b5cf6; --green: #22c55e; --red: #ef4444;
    --orange: #f59e0b; --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  .app { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* NAV */
  .nav { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .nav-brand { font-size:1.3rem; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto; }
  .nav-btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.2s; background:var(--surface); color:var(--text2); }
  .nav-btn:hover { background:var(--surface2); color:var(--text); }
  .nav-btn.active { background:var(--accent); color:white; }

  /* CARDS */
  .card { background:var(--surface); border-radius:12px; padding:24px; margin-bottom:16px; border:1px solid var(--surface2); }
  .card h2 { font-size:1.2rem; margin-bottom:12px; }
  .card h3 { font-size:1rem; margin-bottom:8px; color:var(--accent); }

  /* FORMULA CARDS */
  .formula-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }
  .formula-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--surface2); cursor:pointer; transition:all 0.2s; }
  .formula-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .formula-card.flipped { border-color:var(--green); }
  .formula-title { font-weight:700; font-size:1rem; margin-bottom:8px; }
  .formula-category { font-size:0.75rem; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .formula-front { font-size:1.4rem; text-align:center; padding:20px 0; color:var(--orange); font-family: 'Courier New', monospace; font-weight:700; }
  .formula-back { font-size:0.9rem; color:var(--text2); line-height:1.6; }
  .formula-back .example { background:var(--bg); padding:12px; border-radius:8px; margin-top:8px; font-size:0.85rem; }
  .flip-hint { text-align:center; font-size:0.75rem; color:var(--text3); margin-top:8px; }

  /* BUTTONS */
  .btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#2563eb; }
  .btn-success { background:var(--green); color:white; }
  .btn-danger { background:var(--red); color:white; }
  .btn-outline { background:transparent; border:2px solid var(--surface2); color:var(--text2); }
  .btn-outline:hover { border-color:var(--accent); color:var(--text); }
  .btn-sm { padding:6px 12px; font-size:0.8rem; }

  /* INPUTS */
  input[type="text"], input[type="number"] { background:var(--bg); border:2px solid var(--surface2); border-radius:8px; padding:10px 14px; color:var(--text); font-size:1rem; width:100%; outline:none; transition:border 0.2s; }
  input:focus { border-color:var(--accent); }

  /* QUESTION */
  .question-box { background:var(--bg); border-radius:12px; padding:20px; margin-bottom:16px; border-left:4px solid var(--accent); }
  .question-text { font-size:1.05rem; line-height:1.7; }

  /* HIGHLIGHT SYSTEM */
  .highlight-key { background:rgba(34,197,94,0.2); padding:1px 4px; border-radius:3px; color:var(--green); font-weight:600; }
  .highlight-trap { background:rgba(239,68,68,0.15); padding:1px 4px; border-radius:3px; color:var(--red); text-decoration:line-through; opacity:0.7; }
  .highlight-convert { background:rgba(245,158,11,0.2); padding:1px 4px; border-radius:3px; color:var(--orange); font-weight:600; }

  /* STEPS */
  .step { background:var(--bg); border-radius:10px; padding:16px; margin-bottom:12px; border:2px solid var(--surface2); transition:border 0.2s; }
  .step.active { border-color:var(--accent); }
  .step.completed { border-color:var(--green); }
  .step.wrong { border-color:var(--red); }
  .step-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .step-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; background:var(--surface2); color:var(--text2); flex-shrink:0; }
  .step.completed .step-num { background:var(--green); color:white; }
  .step.active .step-num { background:var(--accent); color:white; }
  .step-label { font-weight:600; font-size:0.95rem; }
  .step-input-row { display:flex; gap:10px; align-items:center; margin-top:8px; }
  .step-input-row input { max-width:200px; }
  .step-hint { font-size:0.8rem; color:var(--text3); margin-top:6px; }
  .step-feedback { font-size:0.85rem; margin-top:6px; padding:8px 12px; border-radius:6px; }
  .step-feedback.correct { background:rgba(34,197,94,0.15); color:var(--green); }
  .step-feedback.incorrect { background:rgba(239,68,68,0.15); color:var(--red); }

  /* MULTIPLE CHOICE */
  .mc-options { display:grid; gap:10px; margin-top:12px; }
  .mc-option { padding:14px 18px; border-radius:10px; border:2px solid var(--surface2); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px; }
  .mc-option:hover { border-color:var(--accent); background:rgba(59,130,246,0.05); }
  .mc-option.selected { border-color:var(--accent); background:rgba(59,130,246,0.1); }
  .mc-option.correct { border-color:var(--green); background:rgba(34,197,94,0.1); }
  .mc-option.wrong { border-color:var(--red); background:rgba(239,68,68,0.1); }
  .mc-letter { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; background:var(--surface2); font-size:0.85rem; flex-shrink:0; }

  /* CALCULATOR */
  .calc-toggle { position:fixed; bottom:20px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1.4rem; box-shadow:0 4px 20px rgba(59,130,246,0.4); z-index:100; display:flex; align-items:center; justify-content:center; }
  .calculator { position:fixed; bottom:90px; right:20px; width:280px; background:var(--surface); border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:100; overflow:hidden; border:1px solid var(--surface2); }
  .calc-display { padding:16px; text-align:right; }
  .calc-expr { font-size:0.8rem; color:var(--text3); min-height:20px; }
  .calc-value { font-size:1.8rem; font-weight:700; font-family:'Courier New',monospace; word-break:break-all; }
  .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; padding:2px; }
  .calc-btn { padding:14px; border:none; cursor:pointer; font-size:1rem; font-weight:600; background:var(--bg); color:var(--text); transition:background 0.1s; }
  .calc-btn:hover { background:var(--surface2); }
  .calc-btn.op { color:var(--accent); }
  .calc-btn.eq { background:var(--accent); color:white; }
  .calc-btn.clear { color:var(--red); }

  /* PROGRESS BAR */
  .progress-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:16px; }
  .progress-fill { height:100%; border-radius:3px; transition:width 0.3s; background:linear-gradient(90deg, var(--accent), var(--green)); }

  /* STATS */
  .stats-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .stat-box { background:var(--bg); border-radius:10px; padding:14px 20px; flex:1; min-width:120px; text-align:center; }
  .stat-value { font-size:1.5rem; font-weight:800; }
  .stat-label { font-size:0.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

  /* TAGS */
  .tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .tag-green { background:rgba(34,197,94,0.15); color:var(--green); }
  .tag-red { background:rgba(239,68,68,0.15); color:var(--red); }
  .tag-blue { background:rgba(59,130,246,0.15); color:var(--accent); }
  .tag-orange { background:rgba(245,158,11,0.15); color:var(--orange); }

  /* CATEGORY FILTER */
  .filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--surface2); background:transparent; color:var(--text2); cursor:pointer; font-size:0.8rem; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

  /* TIMER */
  .timer { font-family:'Courier New',monospace; font-size:1.2rem; font-weight:700; }
  .timer.warning { color:var(--orange); }
  .timer.danger { color:var(--red); }

  /* RESULTS */
  .result-correct { color:var(--green); }
  .result-wrong { color:var(--red); }

  /* BREAKDOWN ANALYSIS */
  .analysis-section { margin-top:16px; }
  .analysis-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--surface2); }
  .analysis-icon { font-size:1.2rem; flex-shrink:0; margin-top:2px; }
  .analysis-content { flex:1; }
  .analysis-label { font-weight:600; font-size:0.85rem; margin-bottom:2px; }
  .analysis-desc { font-size:0.85rem; color:var(--text2); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }

  /* HOME CARDS */
  .home-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:16px; margin-top:20px; }
  .home-card { background:var(--surface); border-radius:14px; padding:24px; border:1px solid var(--surface2); cursor:pointer; transition:all 0.2s; text-align:center; }
  .home-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .home-icon { font-size:2.5rem; margin-bottom:12px; }
  .home-card h3 { font-size:1.1rem; margin-bottom:8px; }
  .home-card p { font-size:0.85rem; color:var(--text2); line-height:1.5; }

  /* EXPLANATION BOX */
  .explanation { background:var(--bg); border-radius:10px; padding:16px; margin-top:12px; border-left:3px solid var(--green); }
  .explanation h4 { color:var(--green); margin-bottom:8px; font-size:0.9rem; }
  .explanation p { font-size:0.88rem; color:var(--text2); line-height:1.6; }
  .explanation .math { font-family:'Courier New',monospace; color:var(--orange); font-weight:600; }

  /* ACCURACY BAR */
  .acc-bar-wrap { margin-bottom:14px; }
  .acc-bar-label { display:flex; justify-content:space-between; margin-bottom:4px; font-size:0.85rem; }
  .acc-bar-label span:first-child { font-weight:600; }
  .acc-bar { height:10px; background:var(--surface2); border-radius:5px; overflow:hidden; }
  .acc-bar-fill { height:100%; border-radius:5px; transition:width 0.5s; }
  .acc-bar-fill.great { background:var(--green); }
  .acc-bar-fill.ok { background:var(--orange); }
  .acc-bar-fill.weak { background:var(--red); }

  /* HISTORY TABLE */
  .history-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .history-table th { text-align:left; padding:8px 12px; border-bottom:2px solid var(--surface2); color:var(--text3); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; }
  .history-table td { padding:8px 12px; border-bottom:1px solid var(--surface2); }

  /* SAVE INDICATOR */
  .save-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; background:rgba(34,197,94,0.12); color:var(--green); }

  /* CLEAR BTN */
  .btn-ghost { background:transparent; border:none; color:var(--text3); cursor:pointer; font-size:0.8rem; padding:4px 8px; }
  .btn-ghost:hover { color:var(--red); }

  /* TOGGLE SWITCH */
  .toggle-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:12px 16px; background:var(--surface); border-radius:10px; border:1px solid var(--surface2); }
  .toggle-label { font-size:0.9rem; font-weight:600; }
  .toggle-sub { font-size:0.75rem; color:var(--text3); }
  .toggle-switch { position:relative; width:48px; height:26px; flex-shrink:0; cursor:pointer; }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-track { position:absolute; top:0; left:0; right:0; bottom:0; background:var(--surface2); border-radius:13px; transition:background 0.3s; }
  .toggle-switch input:checked + .toggle-track { background:var(--accent); }
  .toggle-knob { position:absolute; top:3px; left:3px; width:20px; height:20px; background:white; border-radius:50%; transition:transform 0.3s; }
  .toggle-switch input:checked ~ .toggle-knob { transform:translateX(22px); }

  /* HIGHLIGHT LEGEND */
  .hl-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:8px; padding:10px 14px; background:var(--bg); border-radius:8px; }
  .hl-legend-item { display:flex; align-items:center; gap:6px; font-size:0.8rem; }
  .hl-swatch { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
  .hl-swatch-key { background:rgba(34,197,94,0.35); border:1px solid var(--green); }
  .hl-swatch-trap { background:rgba(239,68,68,0.2); border:1px solid var(--red); }
  .hl-swatch-convert { background:rgba(245,158,11,0.25); border:1px solid var(--orange); }

  /* HIGHLIGHTED TEXT */
  .hl-key { background:rgba(34,197,94,0.2); padding:2px 5px; border-radius:4px; color:var(--green); font-weight:600; border-bottom:2px solid var(--green); }
  .hl-trap { background:rgba(239,68,68,0.12); padding:2px 5px; border-radius:4px; color:var(--red); opacity:0.6; text-decoration:line-through; }
  .hl-convert { background:rgba(245,158,11,0.2); padding:2px 5px; border-radius:4px; color:var(--orange); font-weight:600; border-bottom:2px dashed var(--orange); }

  /* QUESTION NAVIGATOR */
  .qnav-toggle { position:fixed; right:16px; top:50%; transform:translateY(-50%); z-index:90; width:40px; height:40px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1.1rem; font-weight:700; box-shadow:0 2px 10px rgba(59,130,246,0.4); display:flex; align-items:center; justify-content:center; }
  .qnav-panel { position:fixed; right:0; top:0; bottom:0; width:260px; background:var(--surface); border-left:1px solid var(--surface2); z-index:95; padding:16px; overflow-y:auto; transform:translateX(100%); transition:transform 0.3s ease; box-shadow:-4px 0 20px rgba(0,0,0,0.3); }
  .qnav-panel.open { transform:translateX(0); }
  .qnav-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:12px; }
  .qnav-dot { width:38px; height:38px; border-radius:8px; border:2px solid var(--surface2); background:var(--bg); color:var(--text2); font-size:0.8rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .qnav-dot:hover { border-color:var(--accent); color:var(--text); }
  .qnav-dot.current { background:var(--accent); border-color:var(--accent); color:white; }
  .qnav-dot.done { background:rgba(34,197,94,0.15); border-color:var(--green); color:var(--green); }
  .qnav-dot.wrong { background:rgba(239,68,68,0.1); border-color:var(--red); color:var(--red); }
  .qnav-dot.answered { background:rgba(59,130,246,0.1); border-color:var(--accent); color:var(--accent); }
  .qnav-dot.exam-dot { box-shadow:0 0 0 2px rgba(239,68,68,0.3); }
  .qnav-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:1.2rem; }
  .qnav-legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; padding-top:12px; border-top:1px solid var(--surface2); }
  .qnav-legend-item { display:flex; align-items:center; gap:4px; font-size:0.7rem; color:var(--text3); }
  .qnav-legend-dot { width:10px; height:10px; border-radius:3px; }

  /* SMART STUDY */
  .smart-card { background:var(--surface); border-radius:12px; padding:20px; margin-bottom:14px; border:1px solid var(--surface2); }
  .smart-card h3 { font-size:1rem; margin-bottom:10px; }
  .approach-textarea { width:100%; min-height:80px; padding:12px; border:2px solid var(--surface2); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.9rem; resize:vertical; font-family:inherit; }
  .approach-textarea:focus { border-color:var(--accent); outline:none; }
  .approach-textarea::placeholder { color:var(--text3); }
  .weak-bar { height:8px; border-radius:4px; background:var(--surface2); overflow:hidden; margin-top:6px; }
  .weak-bar-fill { height:100%; border-radius:4px; transition:width 0.5s; }
  .smart-rec { padding:12px 16px; background:var(--bg); border-radius:10px; margin-bottom:8px; border-left:3px solid var(--accent); display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
  .smart-rec:hover { background:var(--surface2); }

  /* SETTINGS */
  .settings-section { margin-bottom:24px; }
  .settings-section h3 { font-size:1rem; color:var(--text2); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--surface2); }
  .setting-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--surface); border-radius:10px; margin-bottom:8px; }
  .setting-label { font-weight:600; font-size:0.9rem; }
  .setting-desc { font-size:0.8rem; color:var(--text3); margin-top:2px; }
  .setting-select { padding:6px 12px; border:1px solid var(--surface2); border-radius:8px; background:var(--bg); color:var(--text); font-size:0.85rem; }
  .danger-btn { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.9rem; }
  .danger-btn:hover { background:rgba(239,68,68,0.25); }

  /* EXAM BADGE */
  .exam-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .exam-badge-on { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
  .exam-badge-similar { background:rgba(245,158,11,0.15); color:var(--orange); border:1px solid rgba(245,158,11,0.3); }
  .exam-glow { box-shadow:0 0 0 2px rgba(239,68,68,0.2), 0 0 12px rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3) !important; }

  /* LAB DAY SECTION */
  .labday-card { background:var(--surface); border-radius:12px; padding:20px; margin-bottom:12px; border:1px solid var(--surface2); position:relative; }
  .labday-card.exam-card { border-left:3px solid var(--red); }
  .labday-card.similar-card { border-left:3px solid var(--orange); }
  .labday-num { font-size:0.8rem; color:var(--text3); font-weight:600; margin-bottom:6px; }

  /* PHARM SECTION */
  .pharm-subnav { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .pharm-subnav button { padding:7px 14px; border:none; border-radius:8px; cursor:pointer; font-size:0.82rem; font-weight:600; background:var(--bg); color:var(--text2); transition:all 0.2s; }
  .pharm-subnav button:hover { color:var(--text); background:var(--surface2); }
  .pharm-subnav button.active { background:var(--accent2); color:white; }

  .med-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--surface2); cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; }
  .med-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 16px rgba(59,130,246,0.15); }
  .med-card.flipped { background:var(--bg); }
  .med-card-name { font-size:1.15rem; font-weight:700; margin-bottom:6px; }
  .med-card-class { font-size:0.85rem; color:var(--accent2); font-weight:600; margin-bottom:10px; }
  .med-card-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .med-tag { padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .med-tag-route { background:rgba(59,130,246,0.15); color:var(--accent); }
  .med-tag-system { background:rgba(139,92,246,0.15); color:var(--accent2); }
  .suffix-hl { background:rgba(245,158,11,0.3); color:var(--orange); padding:1px 4px; border-radius:4px; font-weight:700; }
  .med-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }

  /* Reverse mode */
  .reverse-card { background:var(--surface); border-radius:12px; padding:28px; border:1px solid var(--surface2); text-align:center; max-width:600px; margin:0 auto; }

  .reverse-opt.wrong { border-color:var(--red); background:rgba(239,68,68,0.1); color:var(--red); }

  /* Suffix game */
  .suffix-game { max-width:700px; margin:0 auto; }
  .suffix-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .suffix-col h3 { text-align:center; margin-bottom:12px; font-size:0.95rem; color:var(--text2); }
  .suffix-item { padding:12px 16px; border:2px solid var(--surface2); border-radius:10px; margin-bottom:8px; cursor:pointer; font-weight:600; font-size:1rem; text-align:center; transition:all 0.2s; background:var(--surface); }
  .suffix-item:hover { border-color:var(--accent); }
  .suffix-item.selected { border-color:var(--accent); background:rgba(59,130,246,0.15); color:var(--accent); }
  .suffix-item.matched { border-color:var(--green); background:rgba(34,197,94,0.12); color:var(--green); opacity:0.7; pointer-events:none; }
  .suffix-item.wrong-flash { border-color:var(--red); background:rgba(239,68,68,0.15); color:var(--red); animation:shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* Speed rounds */
  .speed-card { background:var(--surface); border-radius:16px; padding:32px; border:1px solid var(--surface2); text-align:center; max-width:550px; margin:0 auto; position:relative; }
  .speed-timer { font-size:3rem; font-weight:800; margin-bottom:4px; }
  .speed-timer.warning { color:var(--orange); }
  .speed-timer.danger { color:var(--red); animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .speed-bar { height:6px; border-radius:3px; background:var(--surface2); overflow:hidden; margin-bottom:20px; }
  .speed-bar-fill { height:100%; border-radius:3px; transition:width 0.3s linear; }
  .speed-input-row { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .speed-input { padding:10px 16px; border:2px solid var(--surface2); border-radius:10px; background:var(--bg); color:var(--text); font-size:1rem; text-align:center; width:200px; }
  .speed-input:focus { border-color:var(--accent); outline:none; }
  .speed-pile { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
  .speed-pile-tag { padding:4px 10px; border-radius:16px; font-size:0.75rem; font-weight:600; }
  .speed-pile-tag.ok { background:rgba(34,197,94,0.15); color:var(--green); }

  .update-banner { position:fixed; top:0; left:0; right:0; z-index:10000; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; text-align:center; padding:10px 16px; font-size:0.9rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.4); animation:slideDown 0.4s ease; }
  .update-banner:hover { filter:brightness(1.1); }
  @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

  /* Responsive */
  @media (max-width:600px) {
    .formula-grid { grid-template-columns:1fr; }
    .home-grid { grid-template-columns:1fr; }
    .stats-row { flex-direction:column; }
  }

// ============================
// PROGRESS / SAVE SYSTEM
// ============================
const SAVE_KEY = 'medmath_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return getDefaultProgress();
    return {...getDefaultProgress(), ...JSON.parse(raw)};
  } catch { return getDefaultProgress(); }
}

function saveProgress(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
}

function getDefaultProgress() {
  return {
    guidedPosition: {filter:'All', qIdx:0},
    completedQuestions: [],
    testHistory: [],
    questionStats: {},
    missedQuestions: [],
    // Smart Study: approach notes per formula/question
    approachNotes: {},    // {formulaId: "user's approach text"}
    questionNotes: {},    // {qId: "user's note for this question"}
    // Settings
    settings: {
      defaultXRay: false,
      timerSeconds: 10,        // speed round timer
      testTimeLimit: 30,       // test mode default minutes
      testNumQuestions: 10,
      showFormulaHints: true,
      autoProceed: false,      // auto-advance on correct in guided
      darkMode: true,          // already dark, but placeholder
      questionNavSide: 'right',
    }
  };
}

// Global progress context via a custom hook
function useProgress() {
  const [progress, setProgressState] = useState(() => loadProgress());
  const setProgress = useCallback((updater) => {
    setProgressState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveProgress(next);
      return next;
    });
  }, []);
  return [progress, setProgress];
}

// Helper to record a question attempt
function recordAttempt(progress, qId, wasCorrect) {
  const stats = {...(progress.questionStats || {})};
  const prev = stats[qId] || {attempts:0, correct:0, lastAttempt:null, lastCorrect:false};
  stats[qId] = {
    attempts: prev.attempts + 1,
    correct: prev.correct + (wasCorrect ? 1 : 0),
    lastAttempt: Date.now(),
    lastCorrect: wasCorrect
  };
  let missed = [...(progress.missedQuestions || [])];
  if (!wasCorrect && !missed.includes(qId)) missed.push(qId);
  if (wasCorrect) missed = missed.filter(id => id !== qId);
  return {...progress, questionStats: stats, missedQuestions: missed};
}

// ============================
// CALCULATOR COMPONENT
// ============================
function Calculator({ show, onToggle }) {
  const [display, setDisplay] = useState('0');
  const [history, setHistory] = useState('');
  const [prevValue, setPrevValue] = useState(null);
  const [operator, setOperator] = useState(null);
  const [newNum, setNewNum] = useState(true);

  const doMath = (a, op, b) => {
    const na = parseFloat(a);
    const nb = parseFloat(b);
    if (isNaN(na) || isNaN(nb)) return 'Error';
    switch(op) {
      case '+': return na + nb;
      case '-': return na - nb;
      case '×': return na * nb;
      case '÷': return nb === 0 ? 'Error' : na / nb;
      default: return nb;
    }
  };

  const press = (val) => {
    if (val === 'C') {
      setDisplay('0'); setHistory(''); setPrevValue(null); setOperator(null); setNewNum(true);
      return;
    }
    if (val === '=') {
      if (prevValue !== null && operator) {
        const result = doMath(prevValue, operator, display);
        const rounded = typeof result === 'number' ? Math.round(result * 10000) / 10000 : result;
        setHistory(prevValue + ' ' + operator + ' ' + display + ' =');
        setDisplay(String(rounded));
        setPrevValue(null);
        setOperator(null);
        setNewNum(true);
      }
      return;
    }
    if (['+','-','×','÷'].includes(val)) {
      if (prevValue !== null && operator && !newNum) {
        const result = doMath(prevValue, operator, display);
        const rounded = typeof result === 'number' ? Math.round(result * 10000) / 10000 : result;
        setHistory(String(rounded) + ' ' + val);
        setDisplay(String(rounded));
        setPrevValue(String(rounded));
      } else {
        setHistory(display + ' ' + val);
        setPrevValue(display);
      }
      setOperator(val);
      setNewNum(true);
      return;
    }
    if (val === '.' && display.includes('.') && !newNum) return;
    if (newNum) {
      setDisplay(val === '.' ? '0.' : val);
      setNewNum(false);
    } else {
      setDisplay(display === '0' && val !== '.' ? val : display + val);
    }
  };

  const buttons = ['C','÷','×','-','7','8','9','+','4','5','6','=','1','2','3','.','0',''];

  if (!show) return React.createElement('button', {className:'calc-toggle', onClick:onToggle}, '\u{1F5A9}');

  return React.createElement(React.Fragment, null,
    React.createElement('button', {className:'calc-toggle', onClick:onToggle}, '\u2715'),
    React.createElement('div', {className:'calculator'},
      React.createElement('div', {className:'calc-display'},
        React.createElement('div', {className:'calc-expr'}, history || '\u00A0'),
        React.createElement('div', {className:'calc-value'}, display)
      ),
      React.createElement('div', {className:'calc-grid'},
        buttons.map((b, i) => b ?
          React.createElement('button', {
            key:i, className:'calc-btn' + (['+','-','×','÷'].includes(b) ? ' op' : b === '=' ? ' eq' : b === 'C' ? ' clear' : ''),
            onClick:() => press(b), style: b === '0' ? {gridColumn:'span 2'} : {}
          }, b) : null
        )
      )
    )
  );
}

// Highlight rendering: takes question text + phrase arrays, returns React elements
function renderHighlightedText(text, keyPhrases, trapPhrases, convertPhrases) {
  if (!keyPhrases && !trapPhrases && !convertPhrases) return text;
  const allPhrases = [];
  (keyPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'key'}));
  (trapPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'trap'}));
  (convertPhrases || []).forEach(p => allPhrases.push({phrase:p, type:'convert'}));
  // Sort longest first so longer matches take priority
  allPhrases.sort((a, b) => b.phrase.length - a.phrase.length);

  // Build a list of {start, end, type} ranges, no overlaps
  const ranges = [];
  const used = new Array(text.length).fill(false);
  allPhrases.forEach(({phrase, type}) => {
    let searchFrom = 0;
    while (true) {
      const idx = text.indexOf(phrase, searchFrom);
      if (idx === -1) break;
      const end = idx + phrase.length;
      // Check overlap
      let overlap = false;
      for (let i = idx; i < end; i++) { if (used[i]) { overlap = true; break; } }
      if (!overlap) {
        ranges.push({start:idx, end, type});
        for (let i = idx; i < end; i++) used[i] = true;
      }
      searchFrom = idx + 1;
    }
  });
  ranges.sort((a, b) => a.start - b.start);

  const parts = [];
  let cursor = 0;
  ranges.forEach((r, i) => {
    if (r.start > cursor) parts.push(React.createElement('span', {key:'n'+i}, text.slice(cursor, r.start)));
    parts.push(React.createElement('span', {key:'h'+i, className:'hl-' + r.type}, text.slice(r.start, r.end)));
    cursor = r.end;
  });
  if (cursor < text.length) parts.push(React.createElement('span', {key:'end'}, text.slice(cursor)));
  return parts;
}

  const filtered = QUESTIONS.filter(q => filter === 'All' || q.category === filter);
  const q = filtered[qIdx];

  // Save position whenever it changes
  useEffect(() => {
    setProgress(p => ({...p, guidedPosition: {filter, qIdx}}));
  }, [filter, qIdx]);

  const reset = (idx) => {
    setQIdx(idx !== undefined ? idx : qIdx);
    setStepInputs({});

    setActiveStep(0);
    setShowHints({});
    setCompleted(false);

  const checkStep = (i) => {
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isCorrect = !isNaN(numVal) && !isNaN(numExp) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5);
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (!isCorrect) {
      // Record wrong attempt
      setProgress(p => recordAttempt(p, q.id, false));
    }
    if (isCorrect && i === activeStep) {

          let updated = recordAttempt(p, q.id, true);
          const done = [...(updated.completedQuestions || [])];
          if (!done.includes(q.id)) done.push(q.id);
          return {...updated, completedQuestions: done};

      }
    }

function TestMode({ progress, setProgress }) {
  const [started, setStarted] = useState(false);
  const [numQ, setNumQ] = useState(10);
  const [timeLimit, setTimeLimit] = useState(30);
  const [filter, setFilter] = useState('All');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);
  const [showExplanation, setShowExplanation] = useState({});

  useEffect(() => {
    if (!started || submitted) return;
    if (timeLeft <= 0) { setSubmitted(true); return; }
    const t = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, started, submitted]);

  const startTest = () => {
    const pool = QUESTIONS.filter(q => filter === 'All' || q.category === filter);
    const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, numQ);
    setQuestions(shuffled);
    setCurrent(0);
    setAnswers({});
    setSubmitted(false);
    setTimeLeft(timeLimit * 60);
    setShowExplanation({});
    setStarted(true);
  };

  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
  };

  const selectAnswer = (qId, val) => {
    if (submitted) return;
    setAnswers(p => ({...p, [qId]: val}));
  };

  const checkAnswer = (q, ans) => {
    if (ans === undefined || ans === null || ans === '') return false;
    if (q.type === 'mc') return ans === q.correct;
    const numAns = parseFloat(ans);
    const numCorrect = parseFloat(q.correct);
    if (isNaN(numAns)) return false;
    return Math.abs(numAns - numCorrect) < (Math.abs(numCorrect) * 0.02 + 0.3);
  };

  const score = questions.reduce((acc, q) => acc + (checkAnswer(q, answers[q.id]) ? 1 : 0), 0);

  // Save test results when submitted
  useEffect(() => {
    if (!submitted || questions.length === 0) return;
    const details = questions.map(q => ({qId:q.id, correct:checkAnswer(q, answers[q.id]), userAnswer:answers[q.id]}));
    const pct = Math.round(score / questions.length * 100);
    const timeUsed = formatTime(timeLimit * 60 - timeLeft);
    setProgress(p => {
      let updated = {...p};
      // Record each question attempt
      details.forEach(d => { updated = recordAttempt(updated, d.qId, d.correct); });
      // Add to test history
      const hist = [...(updated.testHistory || []), {date:Date.now(), score, total:questions.length, pct, category:filter, timeUsed, details}];
      return {...updated, testHistory: hist};
    });
  }, [submitted]);

  // Setup screen
  if (!started) {
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Test Mode'),
      React.createElement('div', {className:'card'},
        React.createElement('h3', null, 'Configure Your Test'),
        React.createElement('div', {style:{display:'grid', gap:16, maxWidth:400, marginTop:16}},
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Category'),
            React.createElement('div', {className:'filter-row'},
              CATEGORIES.filter(c=>c!=='Conversions').map(c => React.createElement('button', {key:c, className:'filter-btn'+(filter===c?' active':''), onClick:()=>setFilter(c)}, c))
            )
          ),
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Number of Questions'),
            React.createElement('div', {style:{display:'flex', gap:8}},
              [5,10,15,20].map(n => React.createElement('button', {key:n, className:'filter-btn'+(numQ===n?' active':''), onClick:()=>setNumQ(n)}, n))
            )
          ),
          React.createElement('div', null,
            React.createElement('label', {style:{fontSize:'0.85rem', color:'var(--text2)', marginBottom:4, display:'block'}}, 'Time Limit (minutes)'),
            React.createElement('div', {style:{display:'flex', gap:8}},
              [15,30,45,60].map(n => React.createElement('button', {key:n, className:'filter-btn'+(timeLimit===n?' active':''), onClick:()=>setTimeLimit(n)}, n + ' min'))
            )
          ),
          React.createElement('button', {className:'btn btn-primary', style:{marginTop:8}, onClick:startTest}, 'Start Test')
        )
      )
    );
  }

  // Results screen
  if (submitted) {
    const pct = Math.round(score / questions.length * 100);
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Test Results'),
      React.createElement('div', {className:'stats-row'},
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value', style:{color: pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)'}}, pct, '%'),
          React.createElement('div', {className:'stat-label'}, 'Score')
        ),
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value'}, score, '/', questions.length),
          React.createElement('div', {className:'stat-label'}, 'Correct')
        ),
        React.createElement('div', {className:'stat-box'},
          React.createElement('div', {className:'stat-value'}, formatTime(timeLimit * 60 - timeLeft)),
          React.createElement('div', {className:'stat-label'}, 'Time Used')
        )
      ),
      questions.map((q, i) => {
        const ans = answers[q.id];
        const correct = checkAnswer(q, ans);
        return React.createElement('div', {key:q.id, className:'card', style:{borderLeft: '4px solid ' + (correct ? 'var(--green)' : 'var(--red)')}},
          React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}},
            React.createElement('div', {style:{display:'flex', gap:8, alignItems:'center'}},
              React.createElement('span', {style:{fontWeight:700}}, 'Q', i + 1),
              q.exam && React.createElement('span', {className:'exam-badge exam-badge-on'}, '\uD83C\uDFAF ON TEST'),
              q.examSimilar && React.createElement('span', {className:'exam-badge exam-badge-similar'}, '\u223C SIMILAR')
            ),
            React.createElement('span', {className: correct ? 'tag tag-green' : 'tag tag-red'}, correct ? 'Correct' : 'Incorrect')
          ),
          React.createElement('p', {style:{fontSize:'0.95rem', marginBottom:12}}, q.text),
          React.createElement('div', {style:{fontSize:'0.9rem'}},
            React.createElement('span', {style:{color:'var(--text3)'}}, 'Your answer: '),
            React.createElement('span', {style:{color: correct ? 'var(--green)' : 'var(--red)', fontWeight:600}},

function Dashboard({ progress }) {

    catStats[cat] = {attempts:0, correct:0};

  QUESTIONS.forEach(q => {
    const s = stats[q.id];

function MissedBank({ progress, setProgress }) {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [completed, setCompleted] = useState(false);
  const [showHints, setShowHints] = useState({});

  const missed = progress.missedQuestions || [];
  const missedQs = QUESTIONS.filter(q => missed.includes(q.id));

  const reset = (idx) => {
    setCurrentIdx(idx !== undefined ? idx : currentIdx);
    setStepInputs({}); setStepStatus({}); setActiveStep(0); setCompleted(false); setShowHints({});
  };

  if (missedQs.length === 0) {
    return React.createElement('div', null,
      React.createElement('h2', {style:{marginBottom:16}}, 'Missed Questions Bank'),
      React.createElement('div', {className:'card', style:{textAlign:'center', padding:'40px'}},
        React.createElement('div', {style:{fontSize:'2rem', marginBottom:12}}, '\u{1F389}'),
        React.createElement('h3', {style:{color:'var(--green)', marginBottom:8}}, 'All Clear!'),
        React.createElement('p', {style:{color:'var(--text2)'}}, 'You don\'t have any missed questions. Keep practicing — any question you get wrong will show up here for review.')
      )
    );
  }

  const q = missedQs[currentIdx] || missedQs[0];

  const checkStep = (i) => {
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isCorrect = !isNaN(numVal) && !isNaN(numExp) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5);
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        // Record correct attempt — removes from missed bank
        setProgress(p => recordAttempt(p, q.id, true));
      }
    }
  };

  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:4}}, 'Missed Questions Bank'),
    React.createElement('p', {style:{color:'var(--text2)', marginBottom:16, fontSize:'0.9rem'}}, missed.length, ' question', missed.length !== 1 ? 's' : '', ' to review. Get them right to remove them from the bank.'),
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}},
      React.createElement('span', {className:'tag tag-red'}, currentIdx + 1, ' of ', missedQs.length),
      React.createElement('div', {style:{display:'flex', gap:8}},
        React.createElement('span', {className:'tag tag-orange'}, q.difficulty),
        React.createElement('span', {className:'tag tag-blue'}, q.category)
      )
    ),
    React.createElement('div', {className:'question-box'},
      React.createElement('div', {className:'question-text'}, q.text)
    ),
    React.createElement('div', {className:'card'},
      React.createElement('h3', null, 'Work Through It Again'),
      q.steps.map((s, i) => {
        const status = stepStatus[i];
        const isActive = i === activeStep && !completed;
        const isLocked = i > activeStep && !completed;
        return React.createElement('div', {key:i, className:'step' + (status === 'correct' ? ' completed' : status === 'wrong' ? ' wrong' : isActive ? ' active' : ''), style: isLocked ? {opacity:0.4} : {}},
          React.createElement('div', {className:'step-header'},
            React.createElement('div', {className:'step-num'}, status === 'correct' ? '\u2713' : i + 1),
            React.createElement('span', {className:'step-label'}, s.label)
          ),
          !isLocked && React.createElement(React.Fragment, null,
            React.createElement('div', {className:'step-input-row'},
              React.createElement('input', {
                type:'text', placeholder:'Your answer...', value: stepInputs[i] || '',
                onChange: e => setStepInputs(p => ({...p, [i]: e.target.value})),
                onKeyDown: e => { if (e.key === 'Enter') checkStep(i); },
                disabled: status === 'correct'
              }),
              React.createElement('span', {style:{color:'var(--text3)', fontSize:'0.85rem', whiteSpace:'nowrap'}}, s.unit),
              status !== 'correct' && React.createElement('button', {className:'btn btn-primary btn-sm', onClick:()=>checkStep(i)}, 'Check')
            ),
            React.createElement('div', {style:{display:'flex', gap:8, marginTop:6}},
              !showHints[i] && status !== 'correct' && React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setShowHints(p=>({...p,[i]:true}))}, 'Show Hint'),
              status === 'wrong' && React.createElement('button', {className:'btn btn-outline btn-sm', onClick:()=>setStepInputs(p=>({...p,[i]:s.answer}))}, 'Show Answer')
            ),
            showHints[i] && React.createElement('div', {className:'step-hint'}, '\u{1F4A1} ', s.hint),
            status === 'correct' && React.createElement('div', {className:'step-feedback correct'}, '\u2713 Correct!'),
            status === 'wrong' && React.createElement('div', {className:'step-feedback incorrect'}, '\u2717 Not quite. Try again or show hint.')
          )
        );
      }),
      completed && React.createElement('div', {style:{textAlign:'center', padding:'16px 0'}},
        React.createElement('div', {style:{fontSize:'1.5rem', marginBottom:8}}, '\u{1F389}'),
        React.createElement('p', {style:{fontWeight:700, color:'var(--green)', marginBottom:4}}, 'Nailed it! Removed from missed bank.'),
        React.createElement('p', {style:{color:'var(--text3)', fontSize:'0.85rem', marginBottom:12}}, missed.length - 1 > 0 ? (missed.length - 1) + ' remaining' : 'Bank is clear!'),
        currentIdx < missedQs.length - 1 ?
          React.createElement('button', {className:'btn btn-primary', onClick:()=>reset(currentIdx)}, 'Next Missed Question \u2192') :
          missedQs.length > 1 && React.createElement('button', {className:'btn btn-primary', onClick:()=>reset(0)}, 'Back to Start')
      )
    ),
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', marginTop:12}},
      React.createElement('button', {className:'btn btn-outline', disabled:currentIdx===0, onClick:()=>reset(currentIdx-1)}, '\u2190 Previous'),
      React.createElement('button', {className:'btn btn-outline', disabled:currentIdx>=missedQs.length-1, onClick:()=>reset(currentIdx+1)}, 'Skip \u2192')
    ),
    React.createElement(QuestionNav, {
      questions:missedQs, currentIdx:currentIdx, onSelect:(i)=>reset(i),
      getStatus:() => 'wrong'
    })
  );
}

  {suffix:'-pril', drugClass:'ACE Inhibitor', example:'Enalapril'},

  {suffix:'-pam/-lam', drugClass:'Benzodiazepine', example:'Lorazepam'},
  {suffix:'-parin', drugClass:'Anticoagulant', example:'Heparin'},
  {suffix:'-azide', drugClass:'Thiazide Diuretic', example:'Hydrochlorothiazide'},
  {suffix:'-one (steroids)', drugClass:'Corticosteroid', example:'Prednisone'},
];

// Highlight suffix in drug name
function highlightSuffix(name) {
  const suffixes = ['pril','sartan','olol','statin','pam','lam','parin','azide'];
  for (const suf of suffixes) {
    const idx = name.toLowerCase().lastIndexOf(suf);
    if (idx !== -1) {
      return React.createElement('span', null,
        name.slice(0, idx),
        React.createElement('span', {className:'suffix-hl'}, name.slice(idx)),
      );
    }
  }
  return name;
}

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function PharmReverse() {
  const [deck, setDeck] = useState(() => shuffle(MEDS));
  const [idx, setIdx] = useState(0);
  const [options, setOptions] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState({correct:0, total:0});

  const setupQ = useCallback((index, d) => {
    const med = d[index];
    const wrong = shuffle(d.filter(m => m.name !== med.name)).slice(0, 3);
    setOptions(shuffle([med, ...wrong]));
    setChosen(null);
  }, []);

  useEffect(() => { setupQ(0, deck); }, []);

  const pick = (m) => {
    if (chosen !== null) return;
    setChosen(m.name);
    setScore(s => ({correct: s.correct + (m.name === deck[idx].name ? 1 : 0), total: s.total + 1}));
  };

  const next = () => {
    const ni = idx + 1;
    if (ni >= deck.length) {
      const nd = shuffle(MEDS);
      setDeck(nd);
      setIdx(0);
      setupQ(0, nd);
    } else {
      setIdx(ni);
      setupQ(ni, deck);
    }
  };

  const med = deck[idx];
  if (!med) return null;

  return React.createElement('div', null,
    React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}},
      React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem'}}, 'Card ', idx+1, ' / ', deck.length),
      React.createElement('div', {style:{fontWeight:700, color: score.total > 0 && score.correct/score.total >= 0.7 ? 'var(--green)' : 'var(--orange)'}},
        score.correct, '/', score.total, ' correct')
    ),
    React.createElement('div', {className:'reverse-card'},
      React.createElement('div', {style:{fontSize:'0.85rem', color:'var(--accent2)', fontWeight:600, marginBottom:8}}, 'What medication is this?'),
      React.createElement('div', {className:'reverse-clue'}, med.indication),
      React.createElement('div', {className:'reverse-hint'},
        'Class: ', med.drugClass, ' \u2022 Routes: ', med.routes.join(', ')
      ),
      React.createElement('div', {style:{color:'var(--text3)', fontSize:'0.85rem', marginBottom:4}},
        'Side Effects: ', med.sideEffects.join(', ')
      ),
      React.createElement('div', {className:'reverse-options'},
        options.map(o => {
          let cls = 'reverse-opt';
          if (chosen) {
            if (o.name === med.name) cls += ' correct';
            else if (o.name === chosen) cls += ' wrong';
          }
          return React.createElement('div', {key:o.name, className:cls, onClick:()=>pick(o)}, o.name);
        })
      ),
      chosen && React.createElement('div', {style:{marginTop:16}},
        chosen === med.name ?
          React.createElement('div', {style:{color:'var(--green)', fontWeight:700, fontSize:'1.1rem'}}, '\u2705 Correct!') :
          React.createElement('div', {style:{color:'var(--red)', fontWeight:700, fontSize:'1.1rem'}}, '\u274C The answer is ', med.name),
        React.createElement('button', {className:'btn btn-primary', style:{marginTop:12}, onClick:next}, 'Next \u2192')
      )
    )
  );
}

// PHARM: SUFFIX MATCHING GAME
// ============================
function PharmSuffixGame() {
  const [pairs] = useState(() => shuffle(SUFFIX_MAP));
  const [classes] = useState(() => shuffle(SUFFIX_MAP.map(s => ({suffix:s.suffix, drugClass:s.drugClass}))));
  const [selectedSuffix, setSelectedSuffix] = useState(null);
  const [matched, setMatched] = useState({});
  const [wrongFlash, setWrongFlash] = useState(null);
  const [score, setScore] = useState(0);
  const [attempts, setAttempts] = useState(0);

  const allMatched = Object.keys(matched).length === SUFFIX_MAP.length;

  const pickSuffix = (suf) => {
    if (matched[suf]) return;
    setSelectedSuffix(suf);
    setWrongFlash(null);
  };

  const pickClass = (cls) => {
    if (!selectedSuffix || Object.values(matched).includes(cls)) return;
    setAttempts(a => a + 1);
    const correct = SUFFIX_MAP.find(s => s.suffix === selectedSuffix);
    if (correct && correct.drugClass === cls) {
      setMatched(p => ({...p, [selectedSuffix]: cls}));
      setScore(s => s + 1);
      setSelectedSuffix(null);
    } else {
      setWrongFlash(cls);
      setTimeout(() => setWrongFlash(null), 600);
    }
  };

  const reset = () => {
    setMatched({});
    setSelectedSuffix(null);
    setScore(0);
    setAttempts(0);
    setWrongFlash(null);
  };

  return React.createElement('div', {className:'suffix-game'},
    React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:16, textAlign:'center'}},
      'Match each suffix to its drug class. Click a suffix, then click the matching class.'
    ),
    React.createElement('div', {style:{textAlign:'center', marginBottom:16, fontWeight:700}},
      score, '/', SUFFIX_MAP.length, ' matched',
      attempts > 0 && React.createElement('span', {style:{color:'var(--text3)', fontWeight:400, marginLeft:12}}, '(', attempts, ' attempts)')
    ),
    allMatched ? React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'2rem', marginBottom:12}}, '\uD83C\uDF89'),
      React.createElement('div', {style:{fontSize:'1.3rem', fontWeight:700, color:'var(--green)', marginBottom:8}}, 'All Matched!'),
      React.createElement('div', {style:{color:'var(--text2)', marginBottom:16}}, 'You did it in ', attempts, ' attempts.'),
      React.createElement('button', {className:'btn btn-primary', onClick:reset}, 'Play Again')
    ) :
    React.createElement('div', {className:'suffix-cols'},
      React.createElement('div', null,
        React.createElement('h3', null, 'Suffixes'),
        pairs.map(p => {
          let cls = 'suffix-item';
          if (matched[p.suffix]) cls += ' matched';
          else if (selectedSuffix === p.suffix) cls += ' selected';
          return React.createElement('div', {key:p.suffix, className:cls, onClick:()=>pickSuffix(p.suffix)},
            p.suffix, matched[p.suffix] ? ' \u2713' : ''
          );
        })
      ),
      React.createElement('div', null,
        React.createElement('h3', null, 'Drug Classes'),
        classes.map(c => {
          let cls = 'suffix-item';
          if (Object.values(matched).includes(c.drugClass)) cls += ' matched';
          else if (wrongFlash === c.drugClass) cls += ' wrong-flash';
          return React.createElement('div', {key:c.drugClass, className:cls, onClick:()=>pickClass(c.drugClass)},
            c.drugClass, Object.values(matched).includes(c.drugClass) ? ' \u2713' : ''
          );
        })
      )
    )
  );
}

function PharmSpeed() {
  const [deck, setDeck] = useState(() => shuffle(MEDS));
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState('ready'); // ready, running, reveal, done
  const [timer, setTimer] = useState(10);
  const [answer, setAnswer] = useState('');
  const [field, setField] = useState('name'); // what to guess: name, class, indication
  const [results, setResults] = useState([]);
  const timerRef = useRef(null);
  const inputRef = useRef(null);

  const startRound = () => {
    const nd = shuffle(MEDS);
    setDeck(nd);
    setIdx(0);
    setResults([]);
    setPhase('running');
    setTimer(10);
    setAnswer('');
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  };

  useEffect(() => {
    if (phase !== 'running') { clearInterval(timerRef.current); return; }
    timerRef.current = setInterval(() => {
      setTimer(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          // time's up — mark as missed
          setResults(r => [...r, {med:deck[idx], correct:false}]);
          setPhase('reveal');
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, idx]);

  const submit = () => {
    if (!answer.trim()) return;
    clearInterval(timerRef.current);
    const med = deck[idx];
    let target = field === 'name' ? med.name : field === 'class' ? med.drugClass : med.indication;
    const isCorrect = answer.trim().toLowerCase() === target.toLowerCase() ||
      target.toLowerCase().includes(answer.trim().toLowerCase());
    setResults(r => [...r, {med, correct:isCorrect}]);
    setPhase('reveal');
  };

  const nextCard = () => {
    const ni = idx + 1;
    if (ni >= deck.length) { setPhase('done'); return; }
    setIdx(ni);
    setPhase('running');
    setTimer(10);
    setAnswer('');
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  };

  const correctCount = results.filter(r => r.correct).length;
  const reviewPile = results.filter(r => !r.correct);

  if (phase === 'done') {
    return React.createElement('div', {style:{textAlign:'center', padding:20}},
      React.createElement('h2', {style:{marginBottom:12}}, '\uD83C\uDFC1 Round Complete!'),
      React.createElement('div', {style:{fontSize:'2rem', fontWeight:800, color: correctCount/results.length >= 0.7 ? 'var(--green)' : 'var(--orange)', marginBottom:8}},
        correctCount, ' / ', results.length
      ),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:16}},
        Math.round(correctCount/results.length*100), '% accuracy'
      ),
      reviewPile.length > 0 && React.createElement('div', {className:'card', style:{textAlign:'left', marginBottom:16}},
        React.createElement('h3', {style:{color:'var(--red)', marginBottom:10}}, '\uD83D\uDCCB Must Review Pile (', reviewPile.length, ')'),
        reviewPile.map((r, i) => React.createElement('div', {key:i, style:{padding:'8px 0', borderBottom:'1px solid var(--surface2)'}},
          React.createElement('strong', null, r.med.name), ' — ', r.med.drugClass,
          React.createElement('div', {style:{color:'var(--text2)', fontSize:'0.85rem'}}, r.med.indication)
        ))
      ),
      React.createElement('button', {className:'btn btn-primary', onClick:startRound}, 'Go Again')
    );
  }

  if (phase === 'ready') {
    return React.createElement('div', {style:{textAlign:'center', padding:40}},
      React.createElement('div', {style:{fontSize:'3rem', marginBottom:12}}, '\u26A1'),
      React.createElement('h2', {style:{marginBottom:8}}, 'Med-Pass Speed Round'),
      React.createElement('p', {style:{color:'var(--text2)', marginBottom:20}},
        '10 seconds per card. Identify the medication as fast as you can. Missed cards go into a Must Review pile.'
      ),
      React.createElement('div', {style:{marginBottom:20}},
        React.createElement('label', {style:{color:'var(--text2)', fontSize:'0.9rem', display:'block', marginBottom:8}}, 'What do you want to guess?'),

function LabDayTest({ progress, setProgress }) {
  const labQs = QUESTIONS.filter(q => q.exam || q.examSimilar);
  const examQs = labQs.filter(q => q.exam);
  const similarQs = labQs.filter(q => q.examSimilar);
  const [mode, setMode] = useState('menu'); // menu, practice, test
  const [qIdx, setQIdx] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [showHints, setShowHints] = useState({});
  const [completed, setCompleted] = useState(false);
  const [hlOn, setHlOn] = useState(false);
  const [filterType, setFilterType] = useState('all'); // all, exam, similar
  const [testAnswers, setTestAnswers] = useState({});
  const [testSubmitted, setTestSubmitted] = useState(false);

  const filtered = filterType === 'exam' ? examQs : filterType === 'similar' ? similarQs : labQs;

  const reset = (idx) => {
    setQIdx(idx !== undefined ? idx : 0);
    setStepInputs({});
    setStepStatus({});
    setActiveStep(0);
    setShowHints({});
    setCompleted(false);
  };

  const checkStep = (i) => {
    const q = filtered[qIdx];
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isStr = isNaN(numExp);
    const isCorrect = isStr ? val.toLowerCase() === expected.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (!isCorrect) setProgress(p => recordAttempt(p, q.id, false));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        setProgress(p => {
          let updated = recordAttempt(p, q.id, true);
          const done = [...(updated.completedQuestions || [])];
          if (!done.includes(q.id)) done.push(q.id);
          return {...updated, completedQuestions: done};
        });
      }
    }
  };

  const submitTest = () => {
    setTestSubmitted(true);
    filtered.forEach((q) => {
      const userAns = (testAnswers[q.id] || '').trim();
      const numVal = parseFloat(userAns);
      const numExp = parseFloat(q.correct);
      const isStr = isNaN(numExp);
      const isCorrect = isStr ? userAns.toLowerCase() === q.correct.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
      setProgress(p => recordAttempt(p, q.id, isCorrect));
    });
    // Save test history
    const results = filtered.map(q => {
      const userAns = (testAnswers[q.id] || '').trim();
      const numVal = parseFloat(userAns);
      const numExp = parseFloat(q.correct);

      const correct = isStr ? userAns.toLowerCase() === q.correct.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
      return {qId:q.id, correct, userAnswer:userAns};

    const correctCount = results.filter(r=>r.correct).length;
    setProgress(p => ({...p, testHistory:[...(p.testHistory||[]), {date:new Date().toISOString(), score:correctCount, total:filtered.length, pct:Math.round(correctCount/filtered.length*100), category:'Lab Day', details:results}]}));
  };

function SmartStudy({ progress, setProgress }) {
  const [tab, setTab] = useState('overview');
  const [practiceFilter, setPracticeFilter] = useState('weak');
  const [qIdx, setQIdx] = useState(0);
  const [stepInputs, setStepInputs] = useState({});
  const [stepStatus, setStepStatus] = useState({});
  const [activeStep, setActiveStep] = useState(0);
  const [showHints, setShowHints] = useState({});
  const [completed, setCompleted] = useState(false);
  const [hlOn, setHlOn] = useState(progress.settings?.defaultXRay || false);
  const [editFormula, setEditFormula] = useState(null);
  const [editNote, setEditNote] = useState('');
  const [editQNote, setEditQNote] = useState(null);
  const [editQText, setEditQText] = useState('');

  const stats = progress.questionStats || {};
  const notes = progress.approachNotes || {};
  const qNotes = progress.questionNotes || {};

  // Analyze learner profile
  const catStats = {};
  QUESTIONS.forEach(q => {
    if (!catStats[q.category]) catStats[q.category] = {attempts:0, correct:0};
    const s = stats[q.id];
    if (s) { catStats[q.category].attempts += s.attempts; catStats[q.category].correct += s.correct; }
  });

  const weakCats = Object.entries(catStats)
    .filter(([,s]) => s.attempts > 0 && (s.correct / s.attempts) < 0.7)
    .sort((a,b) => (a[1].correct/a[1].attempts) - (b[1].correct/b[1].attempts));

  const strongCats = Object.entries(catStats)
    .filter(([,s]) => s.attempts >= 3 && (s.correct / s.attempts) >= 0.8)
    .sort((a,b) => (b[1].correct/b[1].attempts) - (a[1].correct/a[1].attempts));

  // Questions sorted by weakness (most wrong first, then untried)
  const getWeakQuestions = () => {
    const scored = QUESTIONS.map(q => {
      const s = stats[q.id];
      if (!s) return {q, score: -1}; // untried = show after weak
      const pct = s.correct / s.attempts;
      return {q, score: pct};
    });
    return scored.sort((a,b) => a.score - b.score).map(s => s.q);
  };

  const getUntried = () => QUESTIONS.filter(q => !stats[q.id]);

  const getRecommended = () => {
    // Mix: weak questions, untried, then exam questions not mastered
    const weak = QUESTIONS.filter(q => { const s=stats[q.id]; return s && s.correct/s.attempts < 0.7; });
    const untried = QUESTIONS.filter(q => !stats[q.id]);
    const examNotMastered = QUESTIONS.filter(q => q.exam && (!stats[q.id] || stats[q.id].correct/stats[q.id].attempts < 0.9));
    const seen = new Set();
    const result = [];
    [...examNotMastered, ...weak, ...untried].forEach(q => { if (!seen.has(q.id)) { seen.add(q.id); result.push(q); }});
    return result;
  };

  const practiceQs = practiceFilter === 'weak' ? getWeakQuestions() :
    practiceFilter === 'untried' ? getUntried() :
    practiceFilter === 'recommended' ? getRecommended() : QUESTIONS;

  const reset = (idx) => {
    setQIdx(idx !== undefined ? idx : 0);
    setStepInputs({});
    setStepStatus({});
    setActiveStep(0);
    setShowHints({});
    setCompleted(false);
  };

  const checkStep = (i) => {
    const q = practiceQs[qIdx];
    const val = (stepInputs[i] || '').trim();
    const expected = q.steps[i].answer;
    const numVal = parseFloat(val);
    const numExp = parseFloat(expected);
    const isStr = isNaN(numExp);
    const isCorrect = isStr ? val.toLowerCase() === expected.toLowerCase() : (!isNaN(numVal) && Math.abs(numVal - numExp) < (numExp * 0.02 + 0.5));
    setStepStatus(p => ({...p, [i]: isCorrect ? 'correct' : 'wrong'}));
    if (!isCorrect) setProgress(p => recordAttempt(p, q.id, false));
    if (isCorrect && i === activeStep) {
      if (i < q.steps.length - 1) setActiveStep(i + 1);
      else {
        setCompleted(true);
        setProgress(p => {
          let updated = recordAttempt(p, q.id, true);
          const done = [...(updated.completedQuestions || [])];
          if (!done.includes(q.id)) done.push(q.id);
          return {...updated, completedQuestions: done};
        });
      }
    }
  };

  const saveFormulaNote = (fId) => {
    setProgress(p => ({...p, approachNotes: {...(p.approachNotes||{}), [fId]: editNote}}));
    setEditFormula(null);
    setEditNote('');
  };

  const saveQuestionNote = (qId) => {
    setProgress(p => ({...p, questionNotes: {...(p.questionNotes||{}), [qId]: editQText}}));
    setEditQNote(null);
    setEditQText('');
  };

  const tabs = [
    {id:'overview', label:'\uD83E\uDDE0 Overview'},
    {id:'practice', label:'\uD83C\uDFAF Adaptive Practice'},

  // OVERVIEW TAB

    const totalAttempts = Object.values(stats).reduce((a,s) => a + s.attempts, 0);

        ),

            )

      ),

              React.createElement('div', {style:{fontSize:'1.1rem'}}, q.exam ? '\uD83C\uDFAF' : s ? '\uD83D\uDD04' : '\u2753'),
              React.createElement('div', {style:{flex:1}},

              )

          })

      ) : React.createElement(React.Fragment, null,

// SETTINGS
// ============================
function SettingsPage({ progress, setProgress }) {
  const settings = progress.settings || {};

  const update = (key, val) => {
    setProgress(p => ({...p, settings: {...(p.settings||{}), [key]: val}}));
  };

  const resetAllData = () => {
    if (confirm('This will erase ALL your progress, notes, and settings. Are you sure?')) {
      setProgress(getDefaultProgress());
    }
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(progress, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'medmaster_backup.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          setProgress({...getDefaultProgress(), ...data});
        } catch { alert('Invalid backup file.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return React.createElement('div', null,
    React.createElement('h2', {style:{marginBottom:4}}, '\u2699\uFE0F Settings'),
    React.createElement('p', {style:{color:'var(--text2)', fontSize:'0.9rem', marginBottom:20}}, 'Customize your study experience.'),

    // Study Preferences
    React.createElement('div', {className:'settings-section'},
      React.createElement('h3', null, 'Study Preferences'),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Default X-Ray Mode'),
          React.createElement('div', {className:'setting-desc'}, 'Auto-enable highlighting in practice modes')
        ),
        React.createElement('label', {className:'toggle-switch', style:{marginLeft:12}},
          React.createElement('input', {type:'checkbox', checked:settings.defaultXRay||false, onChange:()=>update('defaultXRay', !settings.defaultXRay)}),
          React.createElement('div', {className:'toggle-track'}),
          React.createElement('div', {className:'toggle-knob'})
        )
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Show Formula Hints'),
          React.createElement('div', {className:'setting-desc'}, 'Show formula references in guided practice')
        ),
        React.createElement('label', {className:'toggle-switch', style:{marginLeft:12}},
          React.createElement('input', {type:'checkbox', checked:settings.showFormulaHints!==false, onChange:()=>update('showFormulaHints', settings.showFormulaHints===false)}),
          React.createElement('div', {className:'toggle-track'}),
          React.createElement('div', {className:'toggle-knob'})
        )
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Auto-Advance on Correct'),
          React.createElement('div', {className:'setting-desc'}, 'Automatically go to next question when you finish')
        ),
        React.createElement('label', {className:'toggle-switch', style:{marginLeft:12}},
          React.createElement('input', {type:'checkbox', checked:settings.autoProceed||false, onChange:()=>update('autoProceed', !settings.autoProceed)}),
          React.createElement('div', {className:'toggle-track'}),
          React.createElement('div', {className:'toggle-knob'})
        )
      )
    ),

    // Test Defaults
    React.createElement('div', {className:'settings-section'},
      React.createElement('h3', null, 'Test Defaults'),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Default Time Limit'),
          React.createElement('div', {className:'setting-desc'}, 'Pre-selected time for Test Mode')
        ),
        React.createElement('select', {className:'setting-select', value:settings.testTimeLimit||30, onChange:e=>update('testTimeLimit', parseInt(e.target.value))},
          [15,30,45,60].map(n => React.createElement('option', {key:n, value:n}, n + ' min'))
        )
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Default Question Count'),
          React.createElement('div', {className:'setting-desc'}, 'Pre-selected number of questions')
        ),
        React.createElement('select', {className:'setting-select', value:settings.testNumQuestions||10, onChange:e=>update('testNumQuestions', parseInt(e.target.value))},
          [5,10,15,20].map(n => React.createElement('option', {key:n, value:n}, n + ' questions'))
        )
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Speed Round Timer'),
          React.createElement('div', {className:'setting-desc'}, 'Seconds per card in Pharm speed rounds')
        ),
        React.createElement('select', {className:'setting-select', value:settings.timerSeconds||10, onChange:e=>update('timerSeconds', parseInt(e.target.value))},
          [5,8,10,15,20].map(n => React.createElement('option', {key:n, value:n}, n + 's'))
        )
      )
    ),

    // Data Management
    React.createElement('div', {className:'settings-section'},
      React.createElement('h3', null, 'Data Management'),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Export Progress'),
          React.createElement('div', {className:'setting-desc'}, 'Download a backup of all your data')
        ),
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:exportData}, '\u2B07 Export')
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Import Progress'),
          React.createElement('div', {className:'setting-desc'}, 'Restore from a backup file')
        ),
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:importData}, '\u2B06 Import')
      ),
      React.createElement('div', {className:'setting-row'},
        React.createElement('div', null,
          React.createElement('div', {className:'setting-label'}, 'Reset All Data'),
          React.createElement('div', {className:'setting-desc'}, 'Erase everything and start fresh')
        ),
        React.createElement('button', {className:'danger-btn', onClick:resetAllData}, '\uD83D\uDDD1 Reset')
      )
    )
  );
}

// ============================
// MAIN APP
// ============================
function App() {
  const [page, setPage] = useState('home');
  const [showCalc, setShowCalc] = useState(false);
  const [progress, setProgress] = useProgress();

  const renderPage = () => {
    switch(page) {
      case 'home': return React.createElement(HomeScreen, {onNav: setPage, progress});
      case 'learn': return React.createElement(FormulaLab);
      case 'guided': return React.createElement(GuidedPractice, {progress, setProgress});
      case 'test': return React.createElement(TestMode, {progress, setProgress});
      case 'analyze': return React.createElement(QuestionAnalyzer);
      case 'dashboard': return React.createElement(Dashboard, {progress});
      case 'missed': return React.createElement(MissedBank, {progress, setProgress});
      case 'pharm': return React.createElement(PharmHub);
      case 'labday': return React.createElement(LabDayTest, {progress, setProgress});
      case 'smart': return React.createElement(SmartStudy, {progress, setProgress});
      case 'settings': return React.createElement(SettingsPage, {progress, setProgress});
      default: return React.createElement(HomeScreen, {onNav: setPage, progress});
    }
  };

  return React.createElement('div', {className:'app'},
    React.createElement('nav', {className:'nav'},
      React.createElement('div', {className:'nav-brand', onClick:()=>setPage('home'), style:{cursor:'pointer'}}, 'MedMaster'),
      page !== 'home' && React.createElement(React.Fragment, null,
        React.createElement('button', {className:'nav-btn'+(page==='labday'?' active':''), style:page==='labday'?{background:'var(--red)'}:{background:'rgba(239,68,68,0.15)', color:'var(--red)'}, onClick:()=>setPage('labday')}, '\uD83E\uDDEA Lab Day'),
        React.createElement('button', {className:'nav-btn'+(page==='learn'?' active':''), onClick:()=>setPage('learn')}, 'Formulas'),
        React.createElement('button', {className:'nav-btn'+(page==='guided'?' active':''), onClick:()=>setPage('guided')}, 'Guided'),
        React.createElement('button', {className:'nav-btn'+(page==='test'?' active':''), onClick:()=>setPage('test')}, 'Test'),
        React.createElement('button', {className:'nav-btn'+(page==='analyze'?' active':''), onClick:()=>setPage('analyze')}, 'Analyzer'),
        React.createElement('button', {className:'nav-btn'+(page==='pharm'?' active':''), style:page==='pharm'?{background:'var(--accent2)'}:{}, onClick:()=>setPage('pharm')}, '\uD83D\uDC8A Pharm'),
        React.createElement('button', {className:'nav-btn'+(page==='smart'?' active':''), style:page==='smart'?{background:'linear-gradient(135deg, var(--accent), var(--accent2))'}:{}, onClick:()=>setPage('smart')}, '\uD83E\uDDE0 Smart'),
        React.createElement('button', {className:'nav-btn'+(page==='dashboard'?' active':''), onClick:()=>setPage('dashboard')}, 'Stats'),
        React.createElement('button', {className:'nav-btn'+(page==='missed'?' active':''), onClick:()=>setPage('missed')},
          'Missed', (progress.missedQuestions || []).length > 0 ? ' (' + progress.missedQuestions.length + ')' : ''
        ),
        React.createElement('button', {className:'nav-btn'+(page==='settings'?' active':''), onClick:()=>setPage('settings')}, '\u2699\uFE0F')
      )
    ),
    renderPage(),
    React.createElement(Calculator, {show: showCalc, onToggle: () => setShowCalc(s => !s)})
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>

<!-- Auto-update checker -->
<script>
(function() {
  var currentVersion = document.querySelector('meta[name="app-version"]').content;
  var checkInterval = 30000; // check every 30 seconds

  function checkForUpdate() {
    fetch(window.location.href + '?_nocache=' + Date.now(), { cache: 'no-store' })
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var match = html.match(/name="app-version"\s+content="(\d+)"/);
        if (match && match[1] !== currentVersion) {
          showUpdateBanner();
        }
      })
      .catch(function() { /* silent fail */ });
  }

  function showUpdateBanner() {
    if (document.getElementById('update-banner')) return;
    var banner = document.createElement('div');
    banner.id = 'update-banner';
    banner.className = 'update-banner';
    banner.innerHTML = '\u26A1 A new version is available! Click here to refresh.';
    banner.onclick = function() { window.location.reload(true); };
    document.body.prepend(banner);
  }

  setInterval(checkForUpdate, checkInterval);
})();
</script>
</body>
