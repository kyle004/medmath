// ============================
// PRESENCE SYSTEM HOOK
// ============================
function usePresence(authUser, firebaseReady, currentPage, isAdmin) {
  const [onlineUsers, setOnlineUsers] = useState([]);
  const [onlineCount, setOnlineCount] = useState(0);
  const myIdRef = useRef(null);
  const presenceRefRef = useRef(null);
  const connectedAtRef = useRef(Date.now());
  const sessionKeyRef = useRef(null);

  useEffect(() => {
    if (!firebaseReady || !firebaseDb || !authUser) return;

    // Use Firebase Auth UID as the user ID
    myIdRef.current = authUser.uid;
    const myId = myIdRef.current;
    const username = authUser.displayName || 'Anonymous';
    const presenceRef = firebaseDb.ref('presence/' + myId);
    presenceRefRef.current = presenceRef;
    const allPresenceRef = firebaseDb.ref('presence');
    const connectedRef = firebaseDb.ref('.info/connected');
    connectedAtRef.current = Date.now();

    // Check if banned
    firebaseDb.ref('bannedUsers/' + myId).once('value', (snap) => {
      if (snap.val()) {
        console.warn('User is banned from presence.');
        return;
      }
    });

    // Set presence on connect
    const onConnected = connectedRef.on('value', (snap) => {
      if (snap.val() === true) {
        presenceRef.set({
          username: username,
          online: true,
          lastSeen: firebase.database.ServerValue.TIMESTAMP,
          connectedAt: connectedAtRef.current,
          page: currentPage || 'home',
          device: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
        });
        presenceRef.onDisconnect().update({
          online: false,
          lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
      }
    });

    // Listen to presence — admin gets full list, regular users just get count
    let onPresence;
    let presenceListenRef = allPresenceRef; // what to .off() on cleanup
    if (isAdmin) {
      onPresence = allPresenceRef.on('value', (snap) => {
        const data = snap.val() || {};
        const users = Object.entries(data).map(([id, u]) => ({id, ...u}));
        setOnlineUsers(users);
        setOnlineCount(users.filter(u => u.online).length);
      });
    } else {
      // Lightweight: only listen for online users to get count
      presenceListenRef = allPresenceRef.orderByChild('online').equalTo(true);
      onPresence = presenceListenRef.on('value', (snap) => {
        const count = snap.numChildren();
        setOnlineCount(count);
      });
    }

    // Update presence every 60s (heartbeat)
    const heartbeat = setInterval(() => {
      presenceRef.update({ lastSeen: firebase.database.ServerValue.TIMESTAMP });
    }, 60000);

    // Log visit + session start to analytics (throttled: 1 visit per session)
    try {
      const visitKey = 'medmaster_visit_' + new Date().toDateString();
      const visitCount = parseInt(sessionStorage.getItem(visitKey) || '0');
      if (visitCount === 0) {
        firebaseDb.ref('analytics/visits').push({
          username, userId: myId, timestamp: firebase.database.ServerValue.TIMESTAMP,
          device: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
        });
      }
      sessionStorage.setItem(visitKey, String(visitCount + 1));
      // Log session start (one per browser session)
      if (!sessionStorage.getItem('medmaster_session_logged')) {
        const sessRef = firebaseDb.ref('analytics/sessions').push({
          userId: myId, username, startTime: firebase.database.ServerValue.TIMESTAMP,
          device: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
          endTime: null, durationMs: null
        });
        sessionKeyRef.current = sessRef.key;
        sessionStorage.setItem('medmaster_session_logged', sessRef.key);
      } else {
        sessionKeyRef.current = sessionStorage.getItem('medmaster_session_logged');
      }
    } catch(e) {}

    // On disconnect, log session end
    if (sessionKeyRef.current) {
      try {
        const sessEndRef = firebaseDb.ref('analytics/sessions/' + sessionKeyRef.current);
        sessEndRef.onDisconnect().update({
          endTime: firebase.database.ServerValue.TIMESTAMP
        });
      } catch(e) {}
    }

    return () => {
      connectedRef.off('value', onConnected);
      presenceListenRef.off('value', onPresence);
      clearInterval(heartbeat);
      presenceRef.update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
      // Finalize session
      if (sessionKeyRef.current) {
        try {
          firebaseDb.ref('analytics/sessions/' + sessionKeyRef.current).update({
            endTime: firebase.database.ServerValue.TIMESTAMP,
            durationMs: Date.now() - connectedAtRef.current
          });
        } catch(e) {}
      }
    };
  }, [authUser, firebaseReady, isAdmin]);

  // Update page in presence when navigation changes
  useEffect(() => {
    if (presenceRefRef.current && currentPage) {
      presenceRefRef.current.update({ page: currentPage });
    }
  }, [currentPage]);

  return { onlineUsers, onlineCount, myId: myIdRef.current };
}

// ============================
// PROGRESS SYNC HOOK — bidirectional cloud sync
// ============================
function useProgressSync(progress, setProgress, authUser, firebaseReady) {
  const timerRef = useRef(null);
  const loadedRef = useRef(false);
  const skipNextUpload = useRef(false);

  // LOAD: On first auth, pull progress from Firebase and merge with local
  useEffect(() => {
    if (!firebaseReady || !firebaseDb || !authUser || loadedRef.current) return;
    loadedRef.current = true;

    firebaseDb.ref('userProgress/' + authUser.uid).once('value', snap => {
      const cloud = snap.val();
      if (!cloud) return; // no cloud data, keep local
      try {
        const cloudProgress = JSON.parse(cloud.data || '{}');
        const cloudTime = cloud.lastSync || 0;
        const localTime = progress._lastSync || 0;
        // Merge: cloud wins if newer, otherwise keep local
        if (cloudTime > localTime) {
          skipNextUpload.current = true; // don't re-upload what we just downloaded
          setProgress(prev => ({...prev, ...cloudProgress, _lastSync: cloudTime}));
        }
      } catch(e) { console.warn('Cloud progress parse error:', e); }
    });
  }, [authUser, firebaseReady]);

  // SAVE: Debounced upload of progress + stats summary
  useEffect(() => {
    if (!firebaseReady || !firebaseDb || !authUser) return;
    if (skipNextUpload.current) { skipNextUpload.current = false; return; }

    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      const myId = authUser.uid;
      const username = authUser.displayName || 'Anonymous';
      const now = Date.now();

      // Save full progress data (exclude settings to keep it lean)
      const toSync = {...progress, _lastSync: now};
      delete toSync.settings; // don't sync settings to cloud
      firebaseDb.ref('userProgress/' + myId).set({
        data: JSON.stringify(toSync),
        lastSync: now
      }).catch(() => {});

      // Also update the stats summary for admin panel
      const stats = progress.questionStats || {};
      const totalAttempts = Object.values(stats).reduce((s, q) => s + q.attempts, 0);
      const totalCorrect = Object.values(stats).reduce((s, q) => s + q.correct, 0);
      const questionsAttempted = Object.keys(stats).length;
      const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
      const testHistory = progress.testHistory || [];
      const lastTest = testHistory.length > 0 ? testHistory[testHistory.length - 1] : null;
      const avgTestScore = testHistory.length > 0
        ? Math.round(testHistory.reduce((s, t) => s + (t.score || 0), 0) / testHistory.length)
        : null;

      firebaseDb.ref('userStats/' + myId).set({
        username,
        lastSync: firebase.database.ServerValue.TIMESTAMP,
        totalAttempts,
        totalCorrect,
        questionsAttempted,
        accuracy,
        testsCompleted: testHistory.length,
        avgTestScore,
        lastTestScore: lastTest ? lastTest.score : null,
        lastTestDate: lastTest ? lastTest.date : null,
        missedCount: (progress.missedQuestions || []).length,
        completedCount: (progress.completedQuestions || []).length,
        studyStreak: progress.studyStreak || 0
      }).catch(() => {});
    }, 3000);

    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [progress, authUser, firebaseReady]);
}

// ============================
// STUDY STREAK TRACKER
// ============================
function updateStudyStreak(progress, setProgress) {
  const today = new Date().toDateString();
  const lastStudy = progress.lastStudyDate;
  if (lastStudy === today) return; // already logged today

  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const currentStreak = progress.studyStreak || 0;
  const newStreak = lastStudy === yesterday ? currentStreak + 1 : 1;

  setProgress(p => ({...p, lastStudyDate: today, studyStreak: newStreak}));
}

// ============================
// MESSAGE SYSTEM HOOK
// ============================
function useMessages(firebaseReady) {
  const [messages, setMessages] = useState([]);

  useEffect(() => {
    if (!firebaseReady || !firebaseDb) return;
    const msgRef = firebaseDb.ref('messages');
    // Only listen to messages from last 24 hours
    const since = Date.now() - 86400000;
    const query = msgRef.orderByChild('timestamp').startAt(since);

    const onMsg = query.on('child_added', (snap) => {
      const msg = {id: snap.key, ...snap.val()};
      setMessages(prev => {
        if (prev.find(m => m.id === msg.id)) return prev;
        return [...prev, msg].slice(-50); // keep last 50
      });
    });

    return () => query.off('child_added', onMsg);
  }, [firebaseReady]);

  const sendMessage = (text, type, target) => {
    if (!firebaseDb) return;
    firebaseDb.ref('messages').push({
      text,
      type: type || 'broadcast',
      target: target || 'all',
      from: 'admin',
      timestamp: firebase.database.ServerValue.TIMESTAMP
    });
  };

  return { messages, sendMessage };
}

    warning: { icon: '\u26A0\uFE0F', color: '#f59e0b', label: 'Warning' },
    urgent:  { icon: '\uD83D\uDEA8', color: 'var(--red)', label: 'Urgent' },
    success: { icon: '\u2705', color: 'var(--green)', label: 'Good News' },
  };

  useEffect(() => {
    const newMsgs = messages.filter(m => {
      if (seenRef.current.has(m.id)) return false;
      if (m.target && m.target !== 'all' && m.target !== myId) return false;
      // Only show messages from last 10 seconds
      if (m.timestamp && Date.now() - m.timestamp > 10000) {
        seenRef.current.add(m.id);
        return false;
      }
      return true;
    });
    if (newMsgs.length > 0) {
      newMsgs.forEach(m => seenRef.current.add(m.id));
      setVisible(prev => [...prev, ...newMsgs]);
      // Auto-remove: urgent stays 8s, others 5s
      const urgentMsgs = newMsgs.filter(m => m.msgStyle === 'urgent');
      const normalMsgs = newMsgs.filter(m => m.msgStyle !== 'urgent');
      if (normalMsgs.length > 0) setTimeout(() => {
        setVisible(prev => prev.filter(m => !normalMsgs.find(n => n.id === m.id)));
      }, 5000);
      if (urgentMsgs.length > 0) setTimeout(() => {
        setVisible(prev => prev.filter(m => !urgentMsgs.find(n => n.id === m.id)));
      }, 8000);
    }
  }, [messages]);

  if (visible.length === 0) return null;
  return React.createElement('div', {className:'toast-container'},
    visible.map(m => {
      const style = toastStyles[m.msgStyle] || toastStyles.info;
      return React.createElement('div', {key:m.id, className:'toast toast-admin',
        style: m.msgStyle === 'urgent' ? {borderColor:'var(--red)', animation:'toast-shake 0.4s ease-in-out'} : {}},
        React.createElement('div', {style:{fontWeight:700, fontSize:'0.8rem', color:style.color, marginBottom:4}}, style.icon + ' ' + style.label),
        React.createElement('div', null, m.text)
      );
    })
  );
}

// ============================
// ADMIN PANEL
// ============================
function AdminPanel({ onlineUsers, sendMessage, myId }) {
  const [tab, setTab] = useState('users');
  const [msgText, setMsgText] = useState('');
  const [directTarget, setDirectTarget] = useState('all');
  const [msgStyle, setMsgStyle] = useState('info');
  const [msgHistory, setMsgHistory] = useState([]);
  const [visitStats, setVisitStats] = useState(null);
  const [selectedUser, setSelectedUser] = useState(null);

  const online = onlineUsers.filter(u => u.online);
  const offline = onlineUsers.filter(u => !u.online).sort((a,b) => (b.lastSeen||0) - (a.lastSeen||0));
  const now = Date.now();

  // Load class-wide stats for admin analytics
  const [classStats, setClassStats] = useState(null);
  useEffect(() => {
    if (!firebaseDb) return;
    firebaseDb.ref('userStats').once('value', snap => {
      const data = snap.val() || {};
      const users = Object.values(data);
      if (users.length === 0) { setClassStats(null); return; }
      const totalStudents = users.length;
      const avgAccuracy = Math.round(users.reduce((s, u) => s + (u.accuracy || 0), 0) / totalStudents);
      const totalQuestions = users.reduce((s, u) => s + (u.totalAttempts || 0), 0);
      const avgStreak = Math.round(users.reduce((s, u) => s + (u.studyStreak || 0), 0) / totalStudents * 10) / 10;
      const struggling = users.filter(u => (u.accuracy || 0) < 60 && (u.totalAttempts || 0) > 5);
      const topStudents = [...users].sort((a, b) => (b.accuracy || 0) - (a.accuracy || 0)).slice(0, 5);
      setClassStats({totalStudents, avgAccuracy, totalQuestions, avgStreak, struggling, topStudents, allUsers: users});
    });
  }, [tab]);

  // CSV Export
  const exportCSV = () => {
    if (!classStats) return;
    const header = 'Username,Accuracy,Questions Attempted,Total Attempts,Tests Completed,Avg Test Score,Missed Count,Study Streak\n';
    const rows = classStats.allUsers.map(u =>
      [u.username, u.accuracy || 0, u.questionsAttempted || 0, u.totalAttempts || 0, u.testsCompleted || 0, u.avgTestScore || 0, u.missedCount || 0, u.studyStreak || 0].join(',')
    ).join('\n');
    const blob = new Blob([header + rows], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'medmaster_class_stats_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  // Load visit analytics
  useEffect(() => {
    if (!firebaseDb) return;
    firebaseDb.ref('analytics/visits').orderByChild('timestamp').startAt(Date.now() - 7*86400000).once('value', snap => {
      const data = snap.val() || {};
      const visits = Object.values(data);
      const uniqueUsers = new Set(visits.map(v => v.username));
      const today = visits.filter(v => v.timestamp > Date.now() - 86400000);
      const todayUnique = new Set(today.map(v => v.username));
      setVisitStats({
        totalVisits7d: visits.length,
        uniqueUsers7d: uniqueUsers.size,
        todayVisits: today.length,
        todayUnique: todayUnique.size,
        peakOnline: onlineUsers.length // current snapshot as baseline
      });
    });
  }, []);

  const pageLabels = {home:'Home', learn:'Formula Lab', guided:'Guided Practice', challenge:'Challenge', test:'Test Mode', analyze:'Analyzer', dashboard:'Stats', missed:'Missed Bank', pharm:'Pharmacology', labday:'Lab Day', smart:'Smart Study', settings:'Settings', admin:'Admin'};

  const formatDuration = (ms) => {
    if (!ms || ms < 0) return 'just now';
    const mins = Math.floor(ms / 60000);
    if (mins < 1) return '<1m';
    if (mins < 60) return mins + 'm';
    return Math.floor(mins/60) + 'h ' + (mins%60) + 'm';
  };

  const sendMsg = () => {
    if (!msgText.trim()) return;
    const type = directTarget === 'all' ? 'broadcast' : 'direct';
    if (!firebaseDb) return;
    firebaseDb.ref('messages').push({
      text: msgText.trim(),
      type: type,
      msgStyle: msgStyle,
      target: directTarget,
      from: 'admin',
      timestamp: firebase.database.ServerValue.TIMESTAMP
    });
    setMsgHistory(prev => [...prev, {text: msgText.trim(), target: directTarget, style: msgStyle, time: new Date().toLocaleTimeString()}]);
    setMsgText('');
  };

  const quickMessages = [
    { text: 'Study session starting now! Join in!', style: 'info', icon: '\uD83D\uDCDA' },
    { text: 'Great work everyone! Keep it up!', style: 'success', icon: '\uD83C\uDF89' },
    { text: 'New questions have been added. Refresh your page!', style: 'info', icon: '\u2728' },
    { text: 'Review session in 10 minutes!', style: 'warning', icon: '\u23F0' },
  ];

  const cleanupStale = () => {
    if (!firebaseDb) return;
    const cutoff = Date.now() - 7 * 86400000; // 7 days
    const stale = onlineUsers.filter(u => !u.online && u.lastSeen && u.lastSeen < cutoff);
    stale.forEach(u => firebaseDb.ref('presence/' + u.id).remove());
  };

  const handleUserAction = (action, user) => {
    if (!firebaseDb) return;
    if (action === 'kick') {
      firebaseDb.ref('presence/' + user.id).update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    } else if (action === 'ban') {
      firebaseDb.ref('presence/' + user.id).update({ online: false, banned: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
      firebaseDb.ref('bannedUsers/' + user.id).set({ username: user.username, bannedAt: firebase.database.ServerValue.TIMESTAMP });
    } else if (action === 'clearStats') {
      firebaseDb.ref('userStats/' + user.id).remove();
    } else if (action === 'dm') {
      setSelectedUser(null);
      setTab('message');
      setDirectTarget(user.id);
    }
  };

  const tabList = ['users', 'rooms', 'message', 'analytics', 'history', 'config'];

  // --- Room Management State ---
  const [adminRooms, setAdminRooms] = useState({});
  const [expandedRoom, setExpandedRoom] = useState(null);
  const [roomChat, setRoomChat] = useState([]);
  const [adminNewRoom, setAdminNewRoom] = useState('');

  // Load all rooms for admin
  useEffect(() => {
    if (!firebaseDb || tab !== 'rooms') return;
    const ref = firebaseDb.ref('rooms');
    const onVal = ref.on('value', snap => setAdminRooms(snap.val() || {}));
    return () => ref.off('value', onVal);
  }, [tab]);

  // Load chat for expanded room
  useEffect(() => {
    if (!firebaseDb || !expandedRoom) { setRoomChat([]); return; }
    const ref = firebaseDb.ref('rooms/' + expandedRoom + '/chat').orderByChild('timestamp').limitToLast(100);
    const onVal = ref.on('value', async (snap) => {
      const data = snap.val() || {};
      const msgs = Object.entries(data).map(([k, v]) => ({id: k, ...v})).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      // Try to decrypt
      const roomData = adminRooms[expandedRoom];
      if (roomData && roomData.encKey) {
        for (let m of msgs) {
          if (m.encrypted && m.text) {
            m.text = await RoomCrypto.decrypt(m.text, roomData.encKey);
          }
        }
      }
      setRoomChat(msgs);
    });
    return () => ref.off('value', onVal);
  }, [expandedRoom, adminRooms]);

  const adminDeleteRoom = (roomId) => {
    if (!firebaseDb) return;
    firebaseDb.ref('rooms/' + roomId).remove();
    if (expandedRoom === roomId) setExpandedRoom(null);
  };

  const adminKickFromRoom = (roomId, uid) => {
    if (!firebaseDb) return;
    firebaseDb.ref('rooms/' + roomId + '/members/' + uid).remove();
    firebaseDb.ref('rooms/' + roomId + '/voice/participants/' + uid).remove();
  };

  const adminClearChat = (roomId) => {
    if (!firebaseDb) return;
    firebaseDb.ref('rooms/' + roomId + '/chat').remove();
  };

  const adminDeleteMessage = (roomId, msgId) => {
    if (!firebaseDb) return;
    firebaseDb.ref('rooms/' + roomId + '/chat/' + msgId).remove();
  };

  const adminLockRoom = (roomId, locked) => {
    if (!firebaseDb) return;
    firebaseDb.ref('rooms/' + roomId + '/locked').set(locked);
  };

  const adminCreateRoom = () => {
    if (!adminNewRoom.trim() || !firebaseDb) return;
    const roomId = 'room_' + Date.now();
    RoomCrypto.generateRoomKey().then(encKey => {
      firebaseDb.ref('rooms/' + roomId).set({
        name: adminNewRoom.trim(),
        createdBy: 'Admin',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        encKey: encKey,
        members: {}
      });
      setAdminNewRoom('');
    });
  };

  const adminRenameRoom = (roomId, newName) => {
    if (!firebaseDb || !newName.trim()) return;
    firebaseDb.ref('rooms/' + roomId + '/name').set(newName.trim());
  };
  const [currentInviteCode, setCurrentInviteCode] = useState('');
  const [newInviteCode, setNewInviteCode] = useState('');
  const [inviteCodeSaved, setInviteCodeSaved] = useState(false);

  // Site config state for admin editing
  const DEFAULT_SITE_CONFIG = {
    features: {
      home: true, learn: true, guided: true, challenge: true, smart: true,
      test: true, labday: true, analyze: true,
      pharm: true, missed: true, dashboard: true,
      flashcards: true, formulas: true,
      leaderboard: true, rooms: true
    },
    appearance: { appName: 'MedMaster', appEmoji: '💊', subtitle: '', accentColor: '', welcomeMessage: '' },
    maintenance: { enabled: false, message: 'Site is under maintenance. Check back soon!' },

function FirebaseSetup({ settings, update }) {
  const [configText, setConfigText] = useState(settings.firebaseConfig || '');
  const [status, setStatus] = useState(settings.firebaseConfig ? 'saved' : 'empty');
  const [authUser, setAuthUser] = useState(null);

  useEffect(() => {
    if (firebaseAuth) {
      return firebaseAuth.onAuthStateChanged(user => setAuthUser(user));
    }
  }, []);

  const saveConfig = () => {
    try {
      const parsed = JSON.parse(configText);
      if (!parsed.apiKey || !parsed.databaseURL) {
        setStatus('error');
        return;
      }
      localStorage.setItem(FIREBASE_SAVE_KEY, configText);
      update('firebaseConfig', configText);
      if (initFirebase(configText)) {
        setStatus('saved');
      } else {
        setStatus('error');
      }
    } catch {
      setStatus('error');
    }
  };

  const signIn = async () => {
    if (!firebaseAuth) return;
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await firebaseAuth.signInWithPopup(provider);
      setAuthUser(result.user);
      // Auto-save UID as admin
      update('adminUid', result.user.uid);
    } catch(e) {
      console.error('Sign-in error:', e);
    }
  };

  const signOut = () => {
    if (firebaseAuth) firebaseAuth.signOut();
    setAuthUser(null);
  };

  return React.createElement(React.Fragment, null,
    // Config input
    React.createElement('div', {className:'setting-row', style:{flexDirection:'column', alignItems:'flex-start', gap:8}},
      React.createElement('div', null,
        React.createElement('div', {className:'setting-label'}, 'Firebase Config'),
        React.createElement('div', {className:'setting-desc'}, 'Paste the firebaseConfig JSON object from your Firebase console')
      ),
      React.createElement('textarea', {
        style:{width:'100%', padding:'10px 14px', background:'var(--bg)', border:'1px solid ' + (status==='error'?'var(--red)':'var(--surface2)'), borderRadius:8, color:'var(--text)', fontSize:'0.8rem', fontFamily:'monospace', minHeight:90, resize:'vertical'},
        placeholder:'{\n  "apiKey": "...",\n  "authDomain": "...",\n  "databaseURL": "...",\n  "projectId": "...",\n  ....\n}',
        value:configText, onChange:e=>{setConfigText(e.target.value); setStatus('changed');}
      }),
      React.createElement('div', {style:{display:'flex', gap:8, alignItems:'center'}},
        React.createElement('button', {className:'btn btn-primary btn-sm', onClick:saveConfig}, 'Save & Connect'),
        status === 'saved' && React.createElement('span', {style:{fontSize:'0.8rem', color:'var(--green)'}}, '\u2705 Connected'),
        status === 'error' && React.createElement('span', {style:{fontSize:'0.8rem', color:'var(--red)'}}, '\u274C Invalid config — make sure databaseURL is included')
      )
    ),

    // Auth section
    status === 'saved' && React.createElement('div', {className:'setting-row', style:{marginTop:12, flexDirection:'column', alignItems:'flex-start', gap:8}},
      React.createElement('div', null,
        React.createElement('div', {className:'setting-label'}, 'Admin Sign-In'),
        React.createElement('div', {className:'setting-desc'}, 'Sign in with Google to access the admin panel. Your UID becomes the admin key.')
      ),
      !authUser ? React.createElement('button', {className:'btn btn-primary', style:{display:'flex', alignItems:'center', gap:8}, onClick:signIn},
        '\uD83D\uDD10 Sign in with Google'
      ) : React.createElement('div', {style:{display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}},
        React.createElement('div', null,
          React.createElement('div', {style:{fontWeight:600}}, authUser.displayName),

        ),

        settings.adminUid === authUser.uid && React.createElement('span', {style:{fontSize:'0.8rem', color:'var(--green)', fontWeight:600}}, '\u2705 Admin'),
        React.createElement('button', {className:'btn btn-outline btn-sm', onClick:signOut}, 'Sign Out')
      )
    )
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('MedMaster crashed:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg)', color:'var(--text)', padding:32}},
        React.createElement('div', {style:{textAlign:'center', maxWidth:400}},
          React.createElement('div', {style:{fontSize:'3rem', marginBottom:16}}, '\uD83D\uDEE0\uFE0F'),
          React.createElement('h2', {style:{marginBottom:8}}, 'Something went wrong'),
          React.createElement('p', {style:{color:'var(--text2)', marginBottom:20, fontSize:'0.9rem'}}, 'MedMaster hit an unexpected error. Your progress is saved.'),
          React.createElement('button', {className:'btn btn-primary', style:{padding:'12px 32px', fontSize:'1rem'},
            onClick:() => window.location.reload()}, 'Reload App'),
          React.createElement('details', {style:{marginTop:20, textAlign:'left', fontSize:'0.8rem', color:'var(--text3)'}},
            React.createElement('summary', {style:{cursor:'pointer'}}, 'Error details'),
            React.createElement('pre', {style:{marginTop:8, padding:12, background:'var(--surface)', borderRadius:8, overflow:'auto', maxHeight:200, whiteSpace:'pre-wrap'}},
              this.state.error ? this.state.error.toString() : 'Unknown error')
          )
        )
      );
    }
    return this.props.children;
  }
}

function App() {
  const [page, setPage] = useState('home');
  const [showCalc, setShowCalc] = useState(false);
  const [progress, setProgress] = useProgress();

  // Firebase state
  const [firebaseReady, setFirebaseReady] = useState(!!firebaseApp);
  const [authUser, setAuthUser] = useState(null); // Firebase Auth user object
  const [authLoading, setAuthLoading] = useState(true); // true until auth state resolves
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Check Firebase readiness whenever settings change
  useEffect(() => {
    const cfg = progress.settings?.firebaseConfig;
    if (cfg && !firebaseApp) {
      const ok = initFirebase(cfg);
      if (ok) setFirebaseReady(true);
    } else if (firebaseApp) {
      setFirebaseReady(true);
    }
  }, [progress.settings?.firebaseConfig]);

  // Listen to Firebase Auth state
  useEffect(() => {
    if (!firebaseReady || !firebaseAuth) { setAuthLoading(false); return; }
    const unsub = firebaseAuth.onAuthStateChanged(user => {
      setAuthUser(user);
      setAuthLoading(false);
    });
    return unsub;
  }, [firebaseReady]);

  // Derived values
  const username = authUser ? (authUser.displayName || 'Anonymous') : '';

  // Check admin status from Firebase /admins node
  const [isAdmin, setIsAdmin] = useState(false);
  // Super admin — only this email can see/access the Admin Panel
  const SUPER_ADMIN_EMAIL = 'codingky@gmail.com';
  const isSuperAdmin = authUser && authUser.email === SUPER_ADMIN_EMAIL;
  useEffect(() => {
    if (!firebaseReady || !firebaseDb || !authUser) { setIsAdmin(false); return; }
    const adminRef = firebaseDb.ref('admins/' + authUser.uid);
    const onVal = adminRef.on('value', snap => {
      setIsAdmin(snap.val() === true);
    });
    return () => adminRef.off('value', onVal);
  }, [authUser, firebaseReady]);

  // Site config — live from Firebase, controls features/appearance/maintenance/announcements
  const DEFAULT_SITE_CONFIG = {
    features: {
      home: true, learn: true, guided: true, challenge: true, smart: true,
      test: true, labday: true, analyze: true,
      pharm: true, missed: true, dashboard: true,
      flashcards: true, formulas: true,
      leaderboard: true, rooms: true
    },
    appearance: {
      appName: 'MedMaster',
      appEmoji: '💊',
      subtitle: '',
      accentColor: '',
      welcomeMessage: ''
    },
    maintenance: { enabled: false, message: 'Site is under maintenance. Check back soon!' },
    announcement: { enabled: false, text: '', style: 'info' }
  };
  const [siteConfig, setSiteConfig] = useState(DEFAULT_SITE_CONFIG);
  useEffect(() => {
    if (!firebaseReady || !firebaseDb) return;
    const ref = firebaseDb.ref('appConfig/siteConfig');
    const onVal = ref.on('value', snap => {
      const val = snap.val();
      if (!val) { setSiteConfig(DEFAULT_SITE_CONFIG); return; }
      setSiteConfig({
        features: { ...DEFAULT_SITE_CONFIG.features, ...(val.features || {}) },
        appearance: { ...DEFAULT_SITE_CONFIG.appearance, ...(val.appearance || {}) },
        maintenance: { ...DEFAULT_SITE_CONFIG.maintenance, ...(val.maintenance || {}) },
        announcement: { ...DEFAULT_SITE_CONFIG.announcement, ...(val.announcement || {}) }
      });
    });
    return () => ref.off('value', onVal);
  }, [firebaseReady]);

  // Hooks only activate when auth user + firebase are ready
  const { onlineUsers, onlineCount, myId } = usePresence(authUser, firebaseReady, page, isAdmin);
  const { messages, sendMessage } = useMessages(firebaseReady);
  useProgressSync(progress, setProgress, authUser, firebaseReady);

  // Track study streak on load + post streak activity
  useEffect(() => {
    if (authUser) {
      updateStudyStreak(progress, setProgress);
      // Post streak activity if streak >= 3
      if (progress.studyStreak >= 3) {
        postActivity(authUser, 'streak', {days: progress.studyStreak});
      }
    }
  }, [authUser]);

  // Auto-post test completions to activity feed
  const lastTestCountRef = useRef((progress.testHistory || []).length);
  useEffect(() => {
    const tests = progress.testHistory || [];
    if (tests.length > lastTestCountRef.current && authUser) {
      const latest = tests[tests.length - 1];
      postActivity(authUser, 'test_score', {
        score: latest.pct || latest.score || 0,
        questions: latest.total || 0
      });
    }
    lastTestCountRef.current = tests.length;
  }, [progress.testHistory]);

  const handleAuth = (user) => {
    setAuthUser(user);
    // Migrate old localStorage username if present
    const oldName = localStorage.getItem('medmaster_username');
    if (oldName && !user.displayName) {
      user.updateProfile({ displayName: oldName }).catch(()=>{});
    }
  };

  const handleSignOut = () => {
    firebaseAuth.signOut();
    setAuthUser(null);
    setPage('home');
  };

  const renderPage = () => {
    // Block non-admin access to disabled features
    if (!isAdmin && siteConfig.features[page] === false && page !== 'home' && page !== 'settings' && page !== 'admin') {
      return React.createElement('div', {style:{textAlign:'center', padding:60, color:'var(--text3)'}},

      );
    }
    switch(page) {
      case 'home': return React.createElement(HomeScreen, {onNav: setPage, progress});
      case 'learn': return React.createElement(FormulaLab);
      case 'guided': return React.createElement(GuidedPractice, {progress, setProgress});
      case 'challenge': return React.createElement(ChallengePractice, {progress, setProgress});
      case 'test': return React.createElement(TestMode, {progress, setProgress});
      case 'analyze': return React.createElement(QuestionAnalyzer);
      case 'dashboard': return React.createElement(Dashboard, {progress});
      case 'missed': return React.createElement(MissedBank, {progress, setProgress});
      case 'pharm': return React.createElement(PharmHub, {progress, setProgress});
      case 'labday': return React.createElement(LabDayTest, {progress, setProgress, isSuperAdmin});
      case 'smart': return React.createElement(SmartStudy, {progress, setProgress});
      case 'rooms': return React.createElement(StudyRooms, {authUser, isAdmin});
      case 'flashcards': return React.createElement(FlashcardHub, {progress, setProgress});
      case 'formulas': return React.createElement(FormulaCreator, {progress, setProgress});
      case 'leaderboard': return React.createElement(Leaderboard, {authUser});
      case 'settings': return React.createElement(SettingsPage, {progress, setProgress, onSignOut: handleSignOut, authUser, isAdmin});
      case 'admin': return isSuperAdmin ? React.createElement(AdminPanel, {onlineUsers, sendMessage, myId}) : React.createElement(HomeScreen, {onNav: setPage, progress});
      default: return React.createElement(HomeScreen, {onNav: setPage, progress});
    }
  };

  // Show loading spinner while auth state resolves
  if (authLoading) {
    return React.createElement('div', {className:'app', style:{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh'}},
      React.createElement('div', {style:{textAlign:'center', color:'var(--text3)'}},
        React.createElement('div', {style:{fontSize:'2rem', marginBottom:12}}, '\uD83D\uDC8A'),
        React.createElement('div', null, 'Loading MedMaster...')
      )
    );
  }

  // Auth gate — if not signed in, show ONLY the auth screen (no app behind it)
  if (!authUser && firebaseReady) {
    return React.createElement(AuthScreen, {onAuth: handleAuth});
  }

  // Maintenance mode gate — block non-admins
  if (siteConfig.maintenance.enabled && !isAdmin) {
    return React.createElement('div', {className:'app', style:{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh'}},
      React.createElement('div', {style:{textAlign:'center', maxWidth:420, padding:32}},
        React.createElement('div', {style:{fontSize:'3rem', marginBottom:16}}, '🛠️'),
        React.createElement('h2', {style:{marginBottom:12, color:'var(--text)'}}, 'Under Maintenance'),
        React.createElement('p', {style:{color:'var(--text3)', lineHeight:1.6}}, siteConfig.maintenance.message),
        React.createElement('button', {className:'btn btn-outline', style:{marginTop:24}, onClick: handleSignOut}, 'Sign Out')
      )
    );
  }

  const missedCount = (progress.missedQuestions || []).length;

  const navTo = (p) => { setPage(p); setSidebarOpen(false); };

  const sidebarItem = (id, icon, label, badge) =>
    React.createElement('button', {key:id, className:'sidebar-item' + (page===id ? ' active' : ''), onClick:()=>navTo(id)},
      React.createElement('span', {className:'si-icon'}, icon),
      React.createElement('span', {className:'si-label'}, label),
      badge ? React.createElement('span', {className:'si-badge'}, badge) : null
    );

  return React.createElement('div', {className:'app'},
    // Toast notifications
    firebaseReady && React.createElement(ToastContainer, {messages, myId}),

    // Mobile hamburger toggle
    React.createElement('button', {className:'sidebar-toggle', onClick:()=>setSidebarOpen(s=>!s)}, '\u2630'),

    // Sidebar overlay (mobile)
    React.createElement('div', {className:'sidebar-overlay' + (sidebarOpen ? ' open' : ''), onClick:()=>setSidebarOpen(false)}),

    // Sidebar
    React.createElement('aside', {className:'sidebar' + (sidebarOpen ? ' open' : '')},
      // Brand
      React.createElement('div', {className:'sidebar-brand'},
        React.createElement('h1', {onClick:()=>navTo('home')}, (siteConfig.appearance.appEmoji || '\uD83D\uDC8A') + ' ' + (siteConfig.appearance.appName || 'MedMaster')),
        onlineCount > 0 && React.createElement('span', {style:{fontSize:'0.75rem', color:'var(--green)', fontWeight:600}}, onlineCount + ' online')
      ),
      React.createElement('div', {className:'sidebar-user'}, 'Hi, ' + username),

      // Nav items \u2014 filtered by siteConfig.features (admins always see everything)
      React.createElement('div', {className:'sidebar-nav'},
        (() => {
          const f = siteConfig.features;
          const show = (id) => isAdmin || f[id] !== false;
          const items = [];
          // Study section
          const studyItems = [
            show('home') && sidebarItem('home', '\uD83C\uDFE0', 'Home'),
            show('learn') && sidebarItem('learn', '\uD83D\uDCD0', 'Formula Lab'),
            show('guided') && sidebarItem('guided', '\uD83C\uDFAF', 'Guided Practice'),
            show('challenge') && sidebarItem('challenge', '\u26A1', 'Challenge'),
            show('smart') && sidebarItem('smart', '\uD83E\uDDE0', 'Smart Study')
          ].filter(Boolean);
          if (studyItems.length) { items.push(React.createElement('div', {className:'sidebar-section', key:'s-study'}, 'Study')); items.push(...studyItems); }
          // Test section
          const testItems = [
            show('test') && sidebarItem('test', '\uD83D\uDCDD', 'Test Mode'),
            show('labday') && sidebarItem('labday', '\uD83E\uDDEA', 'Lab Day'),
            show('analyze') && sidebarItem('analyze', '\uD83D\uDD2C', 'Analyzer')
          ].filter(Boolean);
          if (testItems.length) { items.push(React.createElement('div', {className:'sidebar-section', key:'s-test'}, 'Test')); items.push(...testItems); }
          // Review section
          const reviewItems = [
            show('pharm') && sidebarItem('pharm', '\uD83D\uDC8A', 'Pharmacology'),
            show('missed') && sidebarItem('missed', '\u274C', 'Missed Questions', missedCount > 0 ? missedCount : null),
            show('dashboard') && sidebarItem('dashboard', '\uD83D\uDCCA', 'My Stats')
          ].filter(Boolean);
          if (reviewItems.length) { items.push(React.createElement('div', {className:'sidebar-section', key:'s-review'}, 'Review')); items.push(...reviewItems); }
          // Tools section
          const toolItems = [
            show('flashcards') && sidebarItem('flashcards', '\uD83D\uDCDD', 'Flashcards'),
            show('formulas') && sidebarItem('formulas', '\u2728', 'Formula Builder')
          ].filter(Boolean);
          if (toolItems.length) { items.push(React.createElement('div', {className:'sidebar-section', key:'s-tools'}, 'Tools')); items.push(...toolItems); }
          // Social section
          const socialItems = [
            show('leaderboard') && sidebarItem('leaderboard', '\uD83C\uDFC6', 'Leaderboard'),
            show('rooms') && sidebarItem('rooms', '\uD83D\uDC65', 'Study Rooms')
          ].filter(Boolean);
          if (socialItems.length) { items.push(React.createElement('div', {className:'sidebar-section', key:'s-social'}, 'Social')); items.push(...socialItems); }
          // Admin section \u2014 only visible to super admin (codingky@gmail.com)
          if (isSuperAdmin) {
            items.push(React.createElement('div', {className:'sidebar-section', key:'s-admin'}, 'Admin'));
            items.push(sidebarItem('admin', '\uD83D\uDD12', 'Admin Panel'));
          }
          return items;
        })()
      ),

      // Bottom section
      React.createElement('div', {className:'sidebar-bottom'},
        sidebarItem('settings', '\u2699\uFE0F', 'Settings')
      )
    ),

    // Spacer to push content right of sidebar on desktop
    React.createElement('div', {className:'sidebar-spacer'}),

    // Main content
    React.createElement('main', {className:'app-main'},
      // Announcement banner
      siteConfig.announcement.enabled && siteConfig.announcement.text && React.createElement('div', {
        style:{
          padding:'10px 16px', marginBottom:16, borderRadius:10, fontSize:'0.9rem', lineHeight:1.5,
          display:'flex', alignItems:'center', gap:10,
          background: siteConfig.announcement.style === 'warning' ? 'rgba(245,158,11,0.15)' :
                     siteConfig.announcement.style === 'success' ? 'rgba(34,197,94,0.15)' :
                     siteConfig.announcement.style === 'error' ? 'rgba(239,68,68,0.15)' : 'rgba(59,130,246,0.15)',
          color: siteConfig.announcement.style === 'warning' ? '#f59e0b' :
                 siteConfig.announcement.style === 'success' ? 'var(--green)' :
                 siteConfig.announcement.style === 'error' ? 'var(--red)' : 'var(--accent)',
          border: '1px solid ' + (siteConfig.announcement.style === 'warning' ? 'rgba(245,158,11,0.3)' :
                 siteConfig.announcement.style === 'success' ? 'rgba(34,197,94,0.3)' :
                 siteConfig.announcement.style === 'error' ? 'rgba(239,68,68,0.3)' : 'rgba(59,130,246,0.3)')
        }
      },
        React.createElement('span', {style:{fontSize:'1.1rem'}},
          siteConfig.announcement.style === 'warning' ? '⚠️' :
          siteConfig.announcement.style === 'success' ? '✅' :
          siteConfig.announcement.style === 'error' ? '🚨' : 'ℹ️'),
        React.createElement('span', {style:{flex:1}}, siteConfig.announcement.text)
      ),
      // Welcome message (if set)
      page === 'home' && siteConfig.appearance.welcomeMessage && React.createElement('div', {
        style:{padding:'12px 16px', marginBottom:16, borderRadius:10, background:'var(--surface)', border:'1px solid var(--surface2)', fontSize:'0.92rem', color:'var(--text2)', lineHeight:1.5}
      }, siteConfig.appearance.welcomeMessage),
      renderPage()
    ),

    React.createElement(Calculator, {show: showCalc, onToggle: () => setShowCalc(s => !s)})
  );
}

ReactDOM.render(React.createElement(ErrorBoundary, null, React.createElement(App)), document.getElementById('root'));
</script>

<!-- Auto-update checker -->
<script>
(function() {
  var currentVersion = document.querySelector('meta[name="app-version"]').content;
  var checkInterval = 300000; // check every 5 minutes

  function checkForUpdate() {
    var base = window.location.href.replace(/[^/]*$/, '');
    fetch(base + 'version.json?_t=' + Date.now(), { cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.version && data.version !== currentVersion) {
          showUpdateBanner();
        }
      })
      .catch(function() { /* silent fail */ });
  }

  function showUpdateBanner() {
    if (document.getElementById('update-banner')) return;
    var banner = document.createElement('div');
    banner.id = 'update-banner';
    banner.className = 'update-banner';
    banner.innerHTML = '\u26A1 A new version is available! Click here to refresh.';
    banner.onclick = function() { window.location.reload(true); };
    document.body.prepend(banner);
  }

  setInterval(checkForUpdate, checkInterval);
})();
</script>
</body>
</html>
